<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta name="theme-color" content="#171719">
  <title>Админ панель</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #171719; color: white; font-family: system-ui; padding: 16px; padding-bottom: 30px; touch-action: pan-y; }
    h1 { font-size: 24px; margin-bottom: 16px; font-weight: 600; }
    .refresh-btn { background: #4cb4e9; border: none; padding: 12px 24px; border-radius: 30px; color: white; cursor: pointer; margin-bottom: 20px; font-size: 14px; font-weight: 500; }
    .stats { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat-card { background: #222226; padding: 14px; border-radius: 20px; flex: 1; text-align: center; border: 1px solid #2a2a2e; }
    .stat-value { font-size: 24px; font-weight: 700; color: #4cb4e9; }
    .stat-label { font-size: 11px; color: #9e9e9e; margin-top: 5px; }
    .tabs { display: flex; gap: 12px; background: #222226; padding: 6px; border-radius: 40px; margin-bottom: 20px; border: 1px solid #2a2a2e; }
    .tab { flex: 1; text-align: center; padding: 10px; border-radius: 30px; font-size: 14px; font-weight: 500; cursor: pointer; color: #9e9e9e; }
    .tab.active { background: #4cb4e9; color: white; }
    .orders-list { display: flex; flex-direction: column; gap: 12px; }
    .order-card { background: #222226; border: 1px solid #2a2a2e; border-radius: 16px; padding: 14px; cursor: pointer; transition: all 0.15s; }
    .order-card:active { transform: scale(0.98); background: #2a2a2e; }
    .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .order-card-id { font-size: 15px; font-weight: 600; background: #2a2a2e; padding: 4px 12px; border-radius: 20px; }
    .order-card-status { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: rgba(251,191,36,0.15); color: #fbbf24; }
    .order-card-date { font-size: 11px; color: #9e9e9e; margin-bottom: 8px; }
    .order-card-products { font-size: 13px; color: #9e9e9e; margin-bottom: 8px; }
    .order-card-total { font-size: 16px; font-weight: 700; color: #4cb4e9; }
    .empty-state { text-align: center; padding: 60px 20px; color: #9e9e9e; }
    .loader { text-align: center; padding: 40px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #2a2a2e; border-top-color: #4cb4e9; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Страница заказа */
    .page { display: none; }
    .page.active-page { display: block; }
    .content-card { background: #18181b; border: 1px solid #2a2a2e; border-radius: 20px; padding: 16px; margin-bottom: 16px; }
    .order-detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2a2e; font-size: 14px; }
    .order-detail-row:last-child { border-bottom: none; }
    .order-detail-label { color: #9e9e9e; }
    .order-detail-value { font-weight: 500; text-align: right; }
    .status-select { width: 100%; background: #2a2a2e; color: white; border: 1px solid #3a3a3e; border-radius: 30px; padding: 14px; font-size: 14px; margin: 15px 0; }
    .update-status-btn { background: #4cb4e9; border: none; border-radius: 30px; padding: 14px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
    .back-btn { background: #2a2a2e; border: none; border-radius: 30px; padding: 14px; color: white; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; }
  </style>
</head>
<body>

<div id="mainView">
  <h1>Управление заказами</h1>
  <button class="refresh-btn" id="refreshBtn">Обновить список</button>

  <div class="stats">
    <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Всего заказов</div></div>
    <div class="stat-card"><div class="stat-value" style="color:#fbbf24" id="statPending">0</div><div class="stat-label">Невыполненные</div></div>
    <div class="stat-card"><div class="stat-value" style="color:#4ade80" id="statDone">0</div><div class="stat-label">Выполненные</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="pending">Невыполненные</div>
    <div class="tab" data-tab="done">Выполненные</div>
  </div>

  <div id="ordersContainer" class="orders-list"><div class="loader"><div class="spinner"></div>Загрузка...</div></div>
</div>

<div id="orderDetailView" class="page" style="display:none">
  <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
    <button id="backBtn" style="background:#2a2a2e; border:none; border-radius:30px; padding:8px 16px; color:white; cursor:pointer;">← Назад</button>
    <h2 id="detailTitle" style="margin:0">Заказ</h2>
  </div>
  <div id="detailContent"></div>
</div>

<script>
  const API = 'https://gemstorm-app-production.up.railway.app';
  let allOrders = [];
  let currentTab = 'pending';
  let currentOrder = null;

  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    try { tg.setHeaderColor('#171719'); tg.setBackgroundColor('#171719'); } catch(e) {}
  }

  function formatPrice(p) { return Math.round(p).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + 'руб'; }
  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  async function loadOrders() {
    const container = document.getElementById('ordersContainer');
    container.innerHTML = '<div class="loader"><div class="spinner"></div>Загрузка...</div>';
    try {
      const response = await fetch(`${API}/api/orders`);
      allOrders = await response.json();
      updateStats();
      renderOrders();
    } catch(e) { container.innerHTML = '<div class="empty-state">Ошибка загрузки</div>'; }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allOrders.length;
    document.getElementById('statPending').textContent = allOrders.filter(o => o.status_code !== 'done').length;
    document.getElementById('statDone').textContent = allOrders.filter(o => o.status_code === 'done').length;
  }

  function renderOrders() {
    const container = document.getElementById('ordersContainer');
    let filtered = allOrders;
    if (currentTab === 'pending') filtered = allOrders.filter(o => o.status_code !== 'done');
    else filtered = allOrders.filter(o => o.status_code === 'done');

    if (!filtered.length) { container.innerHTML = '<div class="empty-state">Нет заказов</div>'; return; }

    container.innerHTML = filtered.map((order) => {
      let items = [];
      try { items = JSON.parse(order.items || '[]'); } catch(e) {}
      let statusText = (order.status || 'Ожидание кода').replace(/[🟡✅❌🔵⚙⏳]/g, '').trim();
      return `
        <div class="order-card" data-order-id="${order.id}">
          <div class="order-card-header">
            <span class="order-card-id">Заказ ${order.order_number}</span>
            <span class="order-card-status">${statusText}</span>
          </div>
          <div class="order-card-date">${order.date} ${order.time || ''}</div>
          <div class="order-card-products">${items.map(i => `${i.name} x${i.qty}`).join(', ')}</div>
          <div class="order-card-total">${formatPrice(order.total)}</div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.order-card').forEach(card => {
      card.addEventListener('click', () => {
        const orderId = parseInt(card.dataset.orderId);
        const order = allOrders.find(o => o.id === orderId);
        if (order) showOrderDetail(order);
      });
    });
  }

  function showOrderDetail(order) {
    currentOrder = order;
    document.getElementById('mainView').style.display = 'none';
    document.getElementById('orderDetailView').style.display = 'block';
    document.getElementById('detailTitle').textContent = `Заказ ${order.order_number}`;
    
    let items = [];
    try { items = JSON.parse(order.items || '[]'); } catch(e) {}
    
    const itemsHtml = items.map(i => `
      <div style="display:flex;justify-content:space-between;padding:8px 0;">
        <span>${escapeHtml(i.name)} x${i.qty}</span>
        <span style="color:#4cb4e9">${formatPrice(i.price * i.qty)}</span>
      </div>
    `).join('');
    
    document.getElementById('detailContent').innerHTML = `
      <div class="content-card">
        <div class="order-detail-row"><span class="order-detail-label">Статус</span><span class="order-detail-value" style="color:#4cb4e9">${(order.status || 'Ожидание кода').replace(/[🟡✅❌🔵⚙⏳]/g, '').trim()}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">Дата</span><span class="order-detail-value">${order.date} ${order.time || ''}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">Способ оплаты</span><span class="order-detail-value">${order.payment_method || '—'}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">Отправитель</span><span class="order-detail-value">${escapeHtml(order.sender_name || '—')}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">Почта</span><span class="order-detail-value">${escapeHtml(order.email || '—')}</span></div>
        <div class="order-detail-row"><span class="order-detail-label">Telegram</span><span class="order-detail-value">@${escapeHtml(order.user_username || '—')}</span></div>
        ${order.promo ? `<div class="order-detail-row"><span class="order-detail-label">Промокод</span><span class="order-detail-value">${order.promo} (скидка ${order.promo_discount}%)</span></div>` : ''}
        ${order.verification_code ? `<div class="order-detail-row"><span class="order-detail-label">Код</span><span class="order-detail-value" style="color:#4ade80">${escapeHtml(order.verification_code)}</span></div>` : ''}
      </div>
      
      <div style="margin-top:16px;background:#222226;border:1px solid #2a2a2e;border-radius:16px;padding:12px;">
        ${itemsHtml}
        <div style="display:flex;justify-content:space-between;padding:10px 0 0 0;margin-top:8px;font-weight:700;">
          <span>Стоимость</span>
          <span style="color:#4cb4e9">${formatPrice(order.total)}</span>
        </div>
      </div>
      
      <select class="status-select" id="adminStatusSelect">
        <option value="pending" ${order.status_code === 'pending' ? 'selected' : ''}>Ожидание кода</option>
        <option value="processing" ${order.status_code === 'processing' ? 'selected' : ''}>Ожидает выполнения</option>
        <option value="done" ${order.status_code === 'done' ? 'selected' : ''}>Заказ выполнен</option>
        <option value="notfound" ${order.status_code === 'notfound' ? 'selected' : ''}>Перевод не найден</option>
      </select>
      <button class="update-status-btn" id="adminUpdateStatusBtn">Сохранить статус</button>
      <button class="back-btn" id="detailBackBtn">Назад к списку</button>
    `;
    
    document.getElementById('adminUpdateStatusBtn').addEventListener('click', async () => {
      const select = document.getElementById('adminStatusSelect');
      const newStatusCode = select.value;
      const statusMap = {
        'pending': 'Ожидание кода',
        'processing': 'Ожидает выполнения',
        'done': 'Заказ выполнен',
        'notfound': 'Перевод не найден'
      };
      const newStatus = statusMap[newStatusCode];
      
      try {
        await fetch(`${API}/api/update-status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: order.id, status: newStatus, statusCode: newStatusCode })
        });
        await loadOrders();
        showOrderDetail({ ...order, status: newStatus, status_code: newStatusCode });
        if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred("light");
      } catch(e) { alert('Ошибка'); }
    });
    
    document.getElementById('detailBackBtn').addEventListener('click', () => {
      document.getElementById('orderDetailView').style.display = 'none';
      document.getElementById('mainView').style.display = 'block';
      loadOrders();
    });
  }

  document.getElementById('refreshBtn').addEventListener('click', () => loadOrders());
  document.getElementById('backBtn').addEventListener('click', () => {
    document.getElementById('orderDetailView').style.display = 'none';
    document.getElementById('mainView').style.display = 'block';
    loadOrders();
  });
  
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderOrders();
    });
  });

  loadOrders();
  setInterval(loadOrders, 30000);
</script>
</body>
</html>

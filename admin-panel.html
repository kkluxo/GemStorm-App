<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta name="theme-color" content="#171719">
  <title>GemStorm — Админ панель</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #171719;
      color: white;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 16px;
      padding-bottom: 30px;
      touch-action: pan-y;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .refresh-btn {
      background: #4cb4e9;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .refresh-btn:active { opacity: 0.7; }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #222226;
      padding: 14px;
      border-radius: 20px;
      flex: 1;
      text-align: center;
      border: 1px solid #2a2a2e;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #4cb4e9;
    }

    .stat-label {
      font-size: 11px;
      color: #9e9e9e;
      margin-top: 5px;
    }

    /* Слайдер переключатель */
    .tabs {
      display: flex;
      gap: 12px;
      background: #222226;
      padding: 6px;
      border-radius: 40px;
      margin-bottom: 20px;
      border: 1px solid #2a2a2e;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: #9e9e9e;
    }

    .tab.active {
      background: #4cb4e9;
      color: white;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .order-card {
      background: #222226;
      border: 1px solid #2a2a2e;
      border-radius: 24px;
      padding: 16px;
      transition: all 0.15s;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .order-number {
      font-size: 16px;
      font-weight: 600;
      background: #2a2a2e;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-waiting { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .status-processing { background: rgba(76, 180, 233, 0.15); color: #4cb4e9; }
    .status-done { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
    .status-notfound { background: rgba(248, 113, 113, 0.15); color: #f87171; }

    .order-info {
      color: #9e9e9e;
      font-size: 13px;
      margin-top: 8px;
    }

    .order-total {
      font-size: 18px;
      font-weight: 700;
      color: #4cb4e9;
      margin-top: 12px;
    }

    .status-controls {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-select {
      background: #2a2a2e;
      color: white;
      border: 1px solid #3a3a3e;
      border-radius: 30px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      flex: 1;
    }

    .update-status-btn {
      background: #4cb4e9;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .update-status-btn.loading { opacity: 0.5; pointer-events: none; }
    .empty-state { text-align: center; padding: 60px 20px; color: #9e9e9e; }
    .loader { text-align: center; padding: 40px; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2a2a2e;
      border-top-color: #4cb4e9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .code-row {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #2a2a2e;
      font-size: 13px;
      color: #4ade80;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h1>📋 Управление заказами</h1>
<button class="refresh-btn" id="refreshBtn">🔄 Обновить список</button>

<div class="stats">
  <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Всего заказов</div></div>
  <div class="stat-card"><div class="stat-value" style="color:#fbbf24" id="statPending">0</div><div class="stat-label">Невыполненные</div></div>
  <div class="stat-card"><div class="stat-value" style="color:#4ade80" id="statDone">0</div><div class="stat-label">Выполненные</div></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="pending">📋 Невыполненные</div>
  <div class="tab" data-tab="done">✅ Выполненные</div>
</div>

<div id="ordersContainer" class="orders-list"><div class="loader"><div class="spinner"></div>Загрузка...</div></div>

<script>
  const API = 'https://gemstorm-app-production.up.railway.app';
  let allOrders = [];
  let currentTab = 'pending';

  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    try { tg.setHeaderColor('#171719'); tg.setBackgroundColor('#171719'); } catch(e) {}
  }

  function formatPrice(p) { return Math.round(p).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + '₽'; }

  async function updateStatus(orderId, statusCode, buttonElement) {
    const statusMap = {
      'pending': 'Ожидание кода',
      'processing': 'В обработке',
      'done': 'Заказ выполнен',
      'notfound': 'Перевод не найден'
    };
    const status = statusMap[statusCode];
    if (!status) return;

    if (buttonElement) {
      buttonElement.classList.add('loading');
      buttonElement.textContent = '⏳ Сохранение...';
      try {
        const response = await fetch(`${API}/api/update-status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, status, statusCode })
        });
        if (response.ok) {
          const order = allOrders.find(o => o.id === orderId);
          if (order) { order.status = status; order.status_code = statusCode; }
          updateSingleOrderInDOM(orderId, status, statusCode);
          updateStats();
          renderOrders();
          if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred("light");
        } else alert('Ошибка');
      } catch(e) { alert('Ошибка соединения'); }
      finally { buttonElement.classList.remove('loading'); buttonElement.textContent = '✓ Сохранить'; }
    }
  }

  function updateSingleOrderInDOM(orderId, newStatus, newStatusCode) {
    const orderCard = document.querySelector(`.order-card[data-order-id="${orderId}"]`);
    if (!orderCard) return;
    const statusBadge = orderCard.querySelector('.status-badge');
    if (statusBadge) {
      statusBadge.textContent = newStatus;
      statusBadge.className = `status-badge status-${newStatusCode === 'pending' ? 'waiting' : newStatusCode === 'done' ? 'done' : newStatusCode === 'notfound' ? 'notfound' : 'processing'}`;
    }
    const select = orderCard.querySelector('.status-select');
    if (select) select.value = newStatusCode;
  }

  async function loadOrders() {
    const container = document.getElementById('ordersContainer');
    container.innerHTML = '<div class="loader"><div class="spinner"></div>Загрузка...</div>';
    try {
      const response = await fetch(`${API}/api/orders`);
      allOrders = await response.json();
      updateStats();
      renderOrders();
    } catch(e) { container.innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>'; }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allOrders.length;
    document.getElementById('statPending').textContent = allOrders.filter(o => o.status_code === 'pending' || o.status_code === 'processing' || o.status_code === 'notfound').length;
    document.getElementById('statDone').textContent = allOrders.filter(o => o.status_code === 'done').length;
  }

  function renderOrders() {
    const container = document.getElementById('ordersContainer');
    let filtered = allOrders;
    if (currentTab === 'pending') filtered = allOrders.filter(o => o.status_code !== 'done');
    else filtered = allOrders.filter(o => o.status_code === 'done');

    if (!filtered.length) { container.innerHTML = '<div class="empty-state">📭 Нет заказов</div>'; return; }

    container.innerHTML = filtered.map((order, idx) => {
      let items = [];
      try { items = JSON.parse(order.items || '[]'); } catch(e) {}
      let statusClass = order.status_code === 'pending' ? 'waiting' : (order.status_code === 'done' ? 'done' : (order.status_code === 'notfound' ? 'notfound' : 'processing'));
      return `
        <div class="order-card" data-order-id="${order.id}">
          <div class="order-header">
            <span class="order-number">#${idx + 1}</span>
            <span class="status-badge status-${statusClass}">${order.status || 'Ожидание кода'}</span>
          </div>
          <div class="order-info">👤 ${escapeHtml(order.sender_name || '—')} | @${escapeHtml(order.user_username || '—')}</div>
          <div class="order-info">📧 ${escapeHtml(order.email || '—')}</div>
          <div class="order-info">💳 ${escapeHtml(order.payment_method || '—')}</div>
          <div class="order-info">📦 ${items.map(i => `${escapeHtml(i.name)} ×${i.qty}`).join(', ')}</div>
          <div class="order-info">📅 ${order.date || '—'} ${order.time || ''}</div>
          ${order.verification_code ? `<div class="code-row">🔑 Код: ${escapeHtml(order.verification_code)}</div>` : ''}
          <div class="order-total">${formatPrice(order.total)}</div>
          <div class="status-controls">
            <select class="status-select" data-order-id="${order.id}">
              <option value="pending" ${order.status_code === 'pending' ? 'selected' : ''}>⏳ Ожидание кода</option>
              <option value="processing" ${order.status_code === 'processing' ? 'selected' : ''}>⚙ В обработке</option>
              <option value="done" ${order.status_code === 'done' ? 'selected' : ''}>✅ Заказ выполнен</option>
              <option value="notfound" ${order.status_code === 'notfound' ? 'selected' : ''}>❌ Перевод не найден</option>
            </select>
            <button class="update-status-btn" data-order-id="${order.id}">✓ Сохранить</button>
          </div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.update-status-btn').forEach(btn => {
      const orderId = parseInt(btn.dataset.orderId);
      const select = document.querySelector(`.status-select[data-order-id="${orderId}"]`);
      btn.addEventListener('click', async () => { if (select) await updateStatus(orderId, select.value, btn); });
    });
  }

  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

  document.getElementById('refreshBtn').addEventListener('click', () => loadOrders());
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderOrders();
      if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred("light");
    });
  });

  loadOrders();
  setInterval(loadOrders, 30000);
</script>
</body>
</html>

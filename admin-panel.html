<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta name="theme-color" content="#171719">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>GemStorm — Админ панель</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #171719;
      color: white;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 16px;
      padding-bottom: 30px;
      touch-action: pan-y pinch-zoom; /* запрещаем zoom, но оставляем скролл */
    }

    /* Запрещаем зум на мобильных */
    @media (max-width: 768px) {
      body {
        touch-action: pan-y;
      }
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .refresh-btn {
      background: #4cb4e9;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .refresh-btn:active {
      opacity: 0.7;
    }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #222226;
      padding: 14px;
      border-radius: 14px;
      flex: 1;
      text-align: center;
      border: 1px solid #2a2a2e;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #4cb4e9;
    }

    .stat-label {
      font-size: 11px;
      color: #9e9e9e;
      margin-top: 5px;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .order-card {
      background: #222226;
      border: 1px solid #2a2a2e;
      border-radius: 16px;
      padding: 14px;
      transition: all 0.15s;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .order-number {
      font-size: 16px;
      font-weight: 600;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-pending {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
    }

    .status-processing {
      background: rgba(76, 180, 233, 0.15);
      color: #4cb4e9;
    }

    .status-done {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
    }

    .status-canceled {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
    }

    .order-info {
      color: #9e9e9e;
      font-size: 13px;
      margin-top: 6px;
    }

    .order-total {
      font-size: 18px;
      font-weight: 700;
      color: #4cb4e9;
      margin-top: 10px;
    }

    .status-controls {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-select {
      background: #2a2a2e;
      color: white;
      border: 1px solid #3a3a3e;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      flex: 1;
      min-width: 120px;
    }

    .update-status-btn {
      background: #4cb4e9;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .update-status-btn:active {
      opacity: 0.7;
    }

    .update-status-btn.loading {
      opacity: 0.5;
      pointer-events: none;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9e9e9e;
    }

    .loader {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2a2a2e;
      border-top-color: #4cb4e9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<h1>📋 Управление заказами</h1>
<button class="refresh-btn" id="refreshBtn">🔄 Обновить список</button>

<div class="stats">
  <div class="stat-card">
    <div class="stat-value" id="statTotal">0</div>
    <div class="stat-label">Всего заказов</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" style="color:#fbbf24" id="statPending">0</div>
    <div class="stat-label">Ожидают</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" style="color:#4ade80" id="statDone">0</div>
    <div class="stat-label">Выполнено</div>
  </div>
</div>

<div id="ordersContainer" class="orders-list">
  <div class="loader"><div class="spinner"></div>Загрузка заказов...</div>
</div>

<script>
  const API = 'https://gemstorm-app-production.up.railway.app';
  let allOrders = [];

  // Настройка Telegram WebApp
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.disableVerticalSwipes?.();
    try {
      tg.setHeaderColor('#171719');
      tg.setBackgroundColor('#171719');
    } catch(e) {}
    document.body.style.backgroundColor = '#171719';
  }

  // Форматирование цены
  function formatPrice(p) {
    return Math.round(p).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + '₽';
  }

  // Обновление статуса без перезагрузки страницы
  async function updateStatus(orderId, statusCode, buttonElement) {
    const statusTextMap = {
      'pending': '🟡 Ожидает проверки',
      'processing': '🔵 В обработке',
      'done': '✅ Выполнен',
      'canceled': '❌ Отменен'
    };
    
    const status = statusTextMap[statusCode];
    if (!status) return;

    // Показываем загрузку на кнопке
    if (buttonElement) {
      buttonElement.classList.add('loading');
      const originalText = buttonElement.textContent;
      buttonElement.textContent = '⏳ Сохранение...';
      
      try {
        const response = await fetch(`${API}/api/update-status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, status, statusCode })
        });
        
        if (response.ok) {
          // Обновляем статус в локальном массиве
          const order = allOrders.find(o => o.id === orderId);
          if (order) {
            order.status = status;
            order.status_code = statusCode;
          }
          
          // Обновляем отображение этого заказа
          updateSingleOrderInDOM(orderId, status, statusCode);
          
          // Обновляем статистику
          updateStats();
          
          // Встряска (haptic feedback)
          if (window.Telegram?.WebApp?.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred("light");
          }
        } else {
          alert('Ошибка при обновлении статуса');
        }
      } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка соединения');
      } finally {
        buttonElement.classList.remove('loading');
        buttonElement.textContent = '✓ Сохранить';
      }
    }
  }

  // Обновляем один заказ в DOM без перезагрузки всей страницы
  function updateSingleOrderInDOM(orderId, newStatus, newStatusCode) {
    const orderCard = document.querySelector(`.order-card[data-order-id="${orderId}"]`);
    if (!orderCard) return;
    
    const statusBadge = orderCard.querySelector('.status-badge');
    if (statusBadge) {
      statusBadge.textContent = newStatus;
      // Обновляем класс
      statusBadge.classList.remove('status-pending', 'status-processing', 'status-done', 'status-canceled');
      if (newStatusCode === 'pending') statusBadge.classList.add('status-pending');
      else if (newStatusCode === 'processing') statusBadge.classList.add('status-processing');
      else if (newStatusCode === 'done') statusBadge.classList.add('status-done');
      else if (newStatusCode === 'canceled') statusBadge.classList.add('status-canceled');
    }
    
    // Обновляем выбранное значение в select
    const select = orderCard.querySelector('.status-select');
    if (select) {
      select.value = newStatusCode;
    }
  }

  // Загрузка всех заказов
  async function loadOrders() {
    const container = document.getElementById('ordersContainer');
    container.innerHTML = '<div class="loader"><div class="spinner"></div>Загрузка заказов...</div>';
    
    try {
      const response = await fetch(`${API}/api/orders`);
      allOrders = await response.json();
      
      updateStats();
      renderOrders();
    } catch (error) {
      console.error('Ошибка:', error);
      container.innerHTML = '<div class="empty-state">❌ Ошибка загрузки заказов.<br>Проверьте соединение.</div>';
    }
  }

  // Обновление статистики
  function updateStats() {
    document.getElementById('statTotal').textContent = allOrders.length;
    document.getElementById('statPending').textContent = allOrders.filter(o => o.status_code === 'pending').length;
    document.getElementById('statDone').textContent = allOrders.filter(o => o.status_code === 'done').length;
  }

  // Рендер всех заказов
  function renderOrders() {
    const container = document.getElementById('ordersContainer');
    
    if (!allOrders.length) {
      container.innerHTML = '<div class="empty-state">📭 Нет заказов</div>';
      return;
    }
    
    container.innerHTML = allOrders.map(order => {
      let items = [];
      try { items = JSON.parse(order.items || '[]'); } catch(e) {}
      
      let statusClass = '';
      if (order.status_code === 'pending') statusClass = 'status-pending';
      else if (order.status_code === 'processing') statusClass = 'status-processing';
      else if (order.status_code === 'done') statusClass = 'status-done';
      else if (order.status_code === 'canceled') statusClass = 'status-canceled';
      else statusClass = 'status-pending';
      
      return `
        <div class="order-card" data-order-id="${order.id}">
          <div class="order-header">
            <span class="order-number">Заказ #${order.order_number}</span>
            <span class="status-badge ${statusClass}">${order.status || '🟡 Ожидает проверки'}</span>
          </div>
          <div class="order-info">👤 ${escapeHtml(order.sender_name || '—')} | @${escapeHtml(order.user_username || '—')}</div>
          <div class="order-info">📧 ${escapeHtml(order.email || '—')}</div>
          <div class="order-info">💳 ${escapeHtml(order.payment_method || '—')}</div>
          <div class="order-info">📦 ${items.map(i => `${escapeHtml(i.name)} ×${i.qty}`).join(', ')}</div>
          <div class="order-info">📅 ${order.date || '—'} ${order.time || ''}</div>
          <div class="order-total">${formatPrice(order.total)}</div>
          <div class="status-controls">
            <select class="status-select" data-order-id="${order.id}">
              <option value="pending" ${order.status_code === 'pending' ? 'selected' : ''}>🟡 Ожидает</option>
              <option value="processing" ${order.status_code === 'processing' ? 'selected' : ''}>🔵 В обработке</option>
              <option value="done" ${order.status_code === 'done' ? 'selected' : ''}>✅ Выполнен</option>
              <option value="canceled" ${order.status_code === 'canceled' ? 'selected' : ''}>❌ Отменён</option>
            </select>
            <button class="update-status-btn" data-order-id="${order.id}">✓ Сохранить</button>
          </div>
        </div>
      `;
    }).join('');
    
    // Навешиваем обработчики на кнопки обновления статуса
    document.querySelectorAll('.update-status-btn').forEach(btn => {
      const orderId = parseInt(btn.dataset.orderId);
      const select = document.querySelector(`.status-select[data-order-id="${orderId}"]`);
      
      btn.addEventListener('click', async () => {
        if (!select) return;
        const newStatusCode = select.value;
        await updateStatus(orderId, newStatusCode, btn);
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Обработчики
  document.getElementById('refreshBtn').addEventListener('click', () => {
    if (window.Telegram?.WebApp?.HapticFeedback) {
      window.Telegram.WebApp.HapticFeedback.impactOccurred("light");
    }
    loadOrders();
  });
  
  // Автообновление каждые 30 секунд
  setInterval(loadOrders, 30000);
  
  // Загружаем заказы при старте
  loadOrders();
</script>

</body>
</html>

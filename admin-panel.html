    return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

  function updateMenuSlider(pageId) {
    const slider = document.getElementById('menuSlider');
    if (!slider) return;
    const pages = ['orders', 'users', 'reviews'];
    const index = pages.indexOf(pageId);
    if (index === -1) { slider.style.opacity = '0'; return; }
    slider.style.opacity = '1';
    if (index === 0) { slider.style.left = '3px'; slider.style.width = 'calc(33.33% - 3px)'; }
    else if (index === 2) { slider.style.left = 'calc(66.66%)'; slider.style.width = 'calc(33.33% - 3px)'; }

  function renderOrders() {
  const container = document.getElementById('ordersList');

      const tc = getStatusTextClass(order.status_code);

  // Страница отзывов (админ)
  async function renderReviewsPage() {
    const container = document.getElementById('reviewsContent');
    if (!container) return;
    container.innerHTML = '<div class="review-empty">Загрузка...</div>';
    try {
      const r = await fetch(`${API}/api/reviews`);
      const list = await r.json();
      if (!list.length) { container.innerHTML = '<div class="review-empty">Отзывов нет</div>'; return; }
      container.innerHTML = list.map(rv => {
        const avatar = rv.photo_url
          ? `<img style="width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;" src="${rv.photo_url}" alt="avatar">`
          : `<div class="review-avatar">👤</div>`;
        const dt = rv.created_at ? new Date(rv.created_at) : null;
        const dateStr = dt ? `${dt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})} ${dt.toLocaleDateString('ru-RU')}` : '';
        let items = []; try { items = JSON.parse(rv.order_items || '[]'); } catch(e) {}
        const itemsHtml = items.map(i => `<div class="review-item-row"><span class="review-item-name">${escapeHtml(i.name)}</span><span class="review-item-price">${formatPrice(i.price)}</span></div>`).join('');
        return `<div class="review-card-wrapper" data-review-id="${rv.id}">
          <div class="review-card">
            <div class="review-header">
              ${avatar}
              <div><div class="review-author-name">${escapeHtml(rv.user_name || 'Пользователь')}</div><div class="review-date">${dateStr}</div></div>
              ${rv.order_number ? `<span class="review-order-badge">#${rv.order_number}</span>` : ''}
              <button class="review-delete-btn" data-id="${rv.id}"><img src="https://storage.botpapa.me/files/19b700d0-4a0d-11f1-bef9-f1ec7a2c6e45.png" alt="delete"></button>
            </div>
            <div class="review-text">${escapeHtml(rv.text)}</div>
          </div>
          ${itemsHtml ? `<div class="review-items-card">${itemsHtml}</div>` : ''}
        </div>`;
      }).join('');

      container.querySelectorAll('.review-delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          hapticLight();
          const reviewId = btn.dataset.id;
          const confirm = window.Telegram?.WebApp
            ? window.Telegram.WebApp.showConfirm('Удалить отзыв?', async (ok) => { if (ok) await deleteReview(reviewId); })
            : (window.confirm('Удалить отзыв?') ? deleteReview(reviewId) : null);
        });
      });
    } catch(e) {
      container.innerHTML = '<div class="review-empty">Ошибка загрузки</div>';
    }
  }

      <div class="stat-period-card">
        <div class="stat-period-title">За всё время</div>
        <div class="stat-row"><span class="stat-label">Всего заказов</span><span class="stat-value">${s.all.orders}</span></div>
        <div class="stat-row"><span class="stat-label">Общий оборот</span><span class="stat-value">${formatPrice(s.all.revenue)}</span></div>
        <div class="stat-row"><span class="stat-label">Всего пользователей</span><span class="stat-value">${s.all.total_users}</span></div>
        <div class="stat-row"><span class="stat-label">Активных пользователей</span><span class="stat-value">${s.all.active_users}</span></div>
        <div class="stat-row"><span class="stat-label">Средний чек</span><span class="stat-value">${formatPrice(s.all.avg_order)}</span></div>
        <div class="stat-row"><span class="stat-label">Топ товар</span><span class="stat-value">${escapeHtml(s.all.top_product)}</span></div>
      </div>`;
  } catch(e) {
    container.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
  }
}

  // Кнопка назад
  function initBackButton() {
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.BackButton.onClick(() => {
  hapticLight();
  const oldFixed = document.getElementById('adminFixedBar');
  if (oldFixed) oldFixed.remove();
  if (document.getElementById('stats-page').classList.contains('active-page')) {
    showAdminPage('profile');
  } else {
    showAdminPage('orders');
  }
});
    }
  }

  // Меню навигации
  document.querySelectorAll('.menu-item').forEach(btn => {
    btn.addEventListener('click', () => { hapticLight(); showAdminPage(btn.dataset.page); });
  });

  // Аватар в меню
  const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
  if (tgUser?.photo_url) {
    document.getElementById('profileMenuAvatar').src = tgUser.photo_url;
  }

  // Запуск
  initBackButton();
  showAdminPage('orders');
  loadOrders();
  setInterval(loadOrders, 30000);
</script>
</body>
</html>

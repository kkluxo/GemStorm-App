<!-- Админ-панель (только для админа) -->
  <div id="adminPanel" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0f0f11; z-index: 1000; overflow-y: auto;">
    <div style="position: sticky; top: 0; background: #0f0f11; padding: 16px; border-bottom: 1px solid #2a2a2e;">
      <h2 style="margin: 0; color: white;">📋 Управление заказами</h2>
      <button id="closeAdminBtn" style="position: absolute; right: 16px; top: 16px; background: #222; color: white; border: none; padding: 8px 16px; border-radius: 8px;">✖ Закрыть</button>
    </div>
    <div style="padding: 16px;">
      <button id="adminRefreshBtn" style="background: #4cb4e9; border: none; padding: 10px 20px; border-radius: 10px; margin-bottom: 16px;">🔄 Обновить</button>
      <div id="adminStats" style="display: flex; gap: 10px; margin-bottom: 16px;">
        <div style="background: #222; padding: 10px; border-radius: 10px; flex: 1; text-align: center;"><span id="statTotal">0</span><br>Всего</div>
        <div style="background: #222; padding: 10px; border-radius: 10px; flex: 1; text-align: center;"><span id="statPending">0</span><br>Ожидают</div>
        <div style="background: #222; padding: 10px; border-radius: 10px; flex: 1; text-align: center;"><span id="statDone">0</span><br>Выполнено</div>
      </div>
      <div id="adminOrdersList"></div>
    </div>
  </div>

  <script>
    // Админ-панель
    const ADMIN_ID_ADMIN = 7509324385;
    
    function isAdminUser() {
      const user = window.Telegram?.WebApp?.initDataUnsafe?.user;
      return user && user.id == ADMIN_ID_ADMIN;
    }
    
    // Если админ — добавляем кнопку в меню
    if (isAdminUser()) {
      const bottomMenu = document.querySelector('.bottom-menu');
      if (bottomMenu) {
        const adminBtn = document.createElement('button');
        adminBtn.className = 'menu-item';
        adminBtn.innerHTML = '<span class="menu-label">👑 Админ</span>';
        adminBtn.onclick = function() {
          document.getElementById('adminPanel').style.display = 'block';
          loadAdminOrders();
        };
        bottomMenu.appendChild(adminBtn);
      }
    }
    
    async function loadAdminOrders() {
      const container = document.getElementById('adminOrdersList');
      container.innerHTML = 'Загрузка...';
      
      try {
        const response = await fetch('https://gemstorm-app-production.up.railway.app/api/orders');
        const orders = await response.json();
        
        document.getElementById('statTotal').textContent = orders.length;
        document.getElementById('statPending').textContent = orders.filter(o => o.status_code === 'pending').length;
        document.getElementById('statDone').textContent = orders.filter(o => o.status_code === 'done').length;
        
        if (!orders.length) {
          container.innerHTML = '<div style="text-align:center;padding:40px;color:#999">📭 Нет заказов</div>';
          return;
        }
        
        container.innerHTML = orders.map(order => {
          let items = [];
          try { items = JSON.parse(order.items || '[]'); } catch(e) {}
          return `
            <div style="background:#222; padding:12px; border-radius:12px; margin-bottom:10px;">
              <div style="display:flex; justify-content:space-between;">
                <b>Заказ #${order.order_number}</b>
                <span style="color:#fbbf24">${order.status || 'Ожидает'}</span>
              </div>
              <div style="color:#999; font-size:12px; margin-top:5px;">👤 ${order.sender_name || '—'} | @${order.user_username || '—'}</div>
              <div style="color:#999; font-size:12px;">📦 ${items.map(i => `${i.name} ×${i.qty}`).join(', ')}</div>
              <div style="margin-top:8px;"><b>${order.total} руб</b></div>
            </div>
          `;
        }).join('');
      } catch(e) {
        container.innerHTML = '❌ Ошибка загрузки';
      }
    }
    
    document.getElementById('closeAdminBtn')?.addEventListener('click', function() {
      document.getElementById('adminPanel').style.display = 'none';
    });
    
    document.getElementById('adminRefreshBtn')?.addEventListener('click', loadAdminOrders);
  </script>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta name="theme-color" content="#171719">
  <title>Geltan Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ВСЁ ДЛЯ ПОЛЬЗОВАТЕЛЕЙ -->
<div id="userApp">
  <div id="catalog-page" class="page active-page">
    <div class="header-row">
      <img class="header-icon-img" src="https://storage.botpapa.me/files/fd86aa00-4a0c-11f1-bef9-f1ec7a2c6e45.png" alt="catalog">
      <div class="page-title">Каталог</div>
    </div>
    <div class="search-section">
      <div class="search-bar">
        <img class="search-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%239ca3af'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z'%3E%3C/path%3E%3C/svg%3E" />
        <input type="text" class="search-input" id="searchInput" placeholder="Найти товар">
      </div>
      <div class="filter-btn" id="openFilterBtn">
        <img class="filter-icon" src="https://storage.botpapa.me/files/bc7cbf30-49e0-11f1-bef9-f1ec7a2c6e45.png" alt="filter">
      </div>
    </div>
    <div id="catalogGrid" class="products-grid"></div>
  </div>

  <div id="cart-page" class="page">
    <div class="header-row">
      <img class="header-icon-img" src="https://storage.botpapa.me/files/0d3678e0-4a0d-11f1-bef9-f1ec7a2c6e45.png" alt="cart">
      <div class="page-title">Корзина</div>
    </div>
    <div id="cartItemsList"></div>
  </div>

  <div id="orders-page" class="page">
    <div class="header-row">
      <img class="header-icon-img" src="https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png" alt="orders">
      <div class="page-title">Заказы</div>
    </div>
    <div id="ordersList"></div>
  </div>

  <div id="profile-page" class="page">
    <div class="header-row">
      <img class="header-icon-img" src="https://storage.botpapa.me/files/12337af0-4a0d-11f1-bef9-f1ec7a2c6e45.png" alt="profile">
      <div class="page-title">Профиль</div>
    </div>
    <div id="profileContent"></div>
  </div>

  <div id="filter-page" class="page">
    <div class="header-row">
      <img class="header-icon-img" src="https://storage.botpapa.me/files/9478fb40-49de-11f1-bef9-f1ec7a2c6e45.png" alt="filter">
      <div class="page-title">Фильтры</div>
    </div>
    <div id="filterOptionsContainer"></div>
  </div>

  <div id="checkout-page" class="page">
    <div class="header-row">
      <img class="header-icon-img" src="https://storage.botpapa.me/files/0d3678e0-4a0d-11f1-bef9-f1ec7a2c6e45.png" alt="cart">
      <div class="page-title">Оформление</div>
    </div>
    <div id="checkoutFormContent"></div>
  </div>

  <div id="payment-page" class="page">
    <div class="header-row">
      <img class="header-icon-img" src="https://storage.botpapa.me/files/62edaf00-4a27-11f1-bef9-f1ec7a2c6e45.png" alt="payment">
      <div class="page-title">Оплата</div>
    </div>
    <div id="paymentContent"></div>
  </div>

  <div id="order-detail-page" class="page">
    <div class="header-row">
      <img class="header-icon-img" src="https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png" alt="order">
      <div class="page-title" id="orderDetailTitle">Заказ</div>
    </div>
    <div id="orderDetailContent"></div>
  </div>

  <div id="cartCheckoutFixed" class="cart-checkout-fixed" style="display:none"></div>

  <div class="bottom-menu">
    <button class="menu-item" data-page="catalog">
      <img class="menu-icon menu-icon-inactive" src="https://storage.botpapa.me/files/fa0bb410-4a0c-11f1-bef9-f1ec7a2c6e45.png">
      <img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/fd86aa00-4a0c-11f1-bef9-f1ec7a2c6e45.png">
      <span class="menu-label">Каталог</span>
    </button>
    <button class="menu-item" data-page="cart">
      <img class="menu-icon menu-icon-inactive" src="https://storage.botpapa.me/files/00feb9c0-4a0d-11f1-bef9-f1ec7a2c6e45.png">
      <img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/0d3678e0-4a0d-11f1-bef9-f1ec7a2c6e45.png">
      <span class="menu-label">Корзина</span>
    </button>
    <button class="menu-item" data-page="orders">
      <img class="menu-icon menu-icon-inactive" src="https://storage.botpapa.me/files/8a684130-49e6-11f1-bef9-f1ec7a2c6e45.png" style="width:28px;height:28px">
      <img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png" style="width:28px;height:28px">
      <span class="menu-label">Заказы</span>
    </button>
    <button class="menu-item" data-page="profile">
      <img class="menu-icon menu-icon-inactive" src="https://storage.botpapa.me/files/1656bed0-4a0d-11f1-bef9-f1ec7a2c6e45.png">
      <img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/12337af0-4a0d-11f1-bef9-f1ec7a2c6e45.png">
      <span class="menu-label">Профиль</span>
    </button>
  </div>
</div>

<!-- ТОЛЬКО ДЛЯ АДМИНА -->
<div id="adminApp" style="display:none; min-height:100vh; background:#0f0f11;">
  <div style="position:sticky; top:0; background:#0f0f11; padding:16px; border-bottom:1px solid #2a2a2e;">
    <h2 style="margin:0; color:white;">📋 Управление заказами</h2>
    <button id="adminRefreshBtn" style="margin-top:10px; background:#4cb4e9; border:none; padding:8px 16px; border-radius:10px;">🔄 Обновить</button>
  </div>
  <div style="padding:16px;">
    <div style="display:flex; gap:10px; margin-bottom:16px;">
      <div style="background:#222; padding:10px; border-radius:10px; flex:1; text-align:center;"><span id="statTotal">0</span><br>Всего</div>
      <div style="background:#222; padding:10px; border-radius:10px; flex:1; text-align:center;"><span id="statPending">0</span><br>Ожидают</div>
      <div style="background:#222; padding:10px; border-radius:10px; flex:1; text-align:center;"><span id="statDone">0</span><br>Выполнено</div>
    </div>
    <div id="adminOrdersList"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/catalog.js"></script>
<script src="js/checkout.js"></script>
<script src="js/orders.js"></script>
<script src="js/profile.js"></script>
<script src="js/app.js"></script>

<script>
  // Простое определение админа
  const ADMIN_ID = 7509324385;
  const tg = window.Telegram?.WebApp;
  const user = tg?.initDataUnsafe?.user;
  const isAdmin = user && user.id == ADMIN_ID;
  
  if (isAdmin) {
    // Админ: показываем только админку
    document.getElementById('userApp').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    
    // Загружаем заказы
    async function loadOrders() {
      const container = document.getElementById('adminOrdersList');
      container.innerHTML = 'Загрузка...';
      try {
        const res = await fetch('https://gemstorm-app-production.up.railway.app/api/orders');
        const orders = await res.json();
        
        document.getElementById('statTotal').innerText = orders.length;
        document.getElementById('statPending').innerText = orders.filter(o => o.status_code === 'pending').length;
        document.getElementById('statDone').innerText = orders.filter(o => o.status_code === 'done').length;
        
        if (!orders.length) {
          container.innerHTML = '<div style="text-align:center;padding:40px;color:#999">📭 Нет заказов</div>';
          return;
        }
        
        container.innerHTML = orders.map(order => {
          let items = [];
          try { items = JSON.parse(order.items || '[]'); } catch(e) {}
          return `
            <div style="background:#222; padding:12px; border-radius:12px; margin-bottom:10px;">
              <div style="display:flex; justify-content:space-between;">
                <b>Заказ #${order.order_number}</b>
                <span style="color:#fbbf24">${order.status || 'Ожидает'}</span>
              </div>
              <div style="color:#999; font-size:12px; margin-top:5px;">👤 ${order.sender_name || '—'} | @${order.user_username || '—'}</div>
              <div style="color:#999; font-size:12px;">📦 ${items.map(i => `${i.name} ×${i.qty}`).join(', ')}</div>
              <div style="margin-top:8px;"><b>${order.total} руб</b></div>
            </div>
          `;
        }).join('');
      } catch(e) {
        container.innerHTML = '❌ Ошибка загрузки';
      }
    }
    
    document.getElementById('adminRefreshBtn').onclick = loadOrders;
    loadOrders();
  } else {
    // Пользователь: показываем магазин
    document.getElementById('userApp').style.display = 'block';
    document.getElementById('adminApp').style.display = 'none';
    
    // Запускаем обычное приложение
    setTimeout(() => {
      if (typeof renderCatalog === 'function') renderCatalog();
      if (typeof renderCartPage === 'function') renderCartPage();
      if (typeof renderOrdersPage === 'function') renderOrdersPage();
      if (typeof renderFilterModal === 'function') renderFilterModal();
      if (typeof renderProfilePage === 'function') renderProfilePage();
      if (typeof showPage === 'function') showPage('catalog');
    }, 100);
  }
</script>

</body>
</html>

  function saveCartToLocalStorage() { localStorage.setItem('cart', JSON.stringify(cart)); }
  function loadCartFromLocalStorage() { const savedCart = localStorage.getItem('cart'); if (savedCart) { cart = JSON.parse(savedCart); } }

  function canAddToCart(productId) {
    const prod = products.find(p => p.id == productId);
    if (!prod) return { allowed: false, reason: "Товар не найден" };
    const currentQty = cart[productId] || 0;
    if (prod.category === 'Кристаллы' && currentQty >= 3) {
      return { allowed: false, reason: "Максимум 3 кристалла" };
    }
    if (currentQty >= 1 && prod.category !== 'Кристаллы') {
      return { allowed: false, reason: "Можно заказать только 1 штуку" };
    }
    return { allowed: true, reason: "" };
  }

  function renderCartButtonHtml(productId) {
    const qty = cart[productId] || 0;
    if (qty > 0) {
      const prod = products.find(p => p.id == productId);
      const maxQty = prod?.category === 'Кристаллы' ? 3 : 1;
      const atLimit = qty >= maxQty;
      const plusOpacity = atLimit ? 'opacity:0.4;pointer-events:none;' : '';
      return `<div class="card-action-btn counter-btn">
        <span class="counter-minus" data-id="${productId}"><img src="https://storage.botpapa.me/files/975c4510-49de-11f1-bef9-f1ec7a2c6e45.png" alt="-"></span>
        <span class="counter-value">${qty}</span>
        <span class="counter-plus" data-id="${productId}" style="${plusOpacity}"><img src="https://storage.botpapa.me/files/9a5d01f0-49de-11f1-bef9-f1ec7a2c6e45.png" alt="+"></span>
      </div>`;
    }
    return `<div class="card-action-btn cart-add-btn" data-add="${productId}">В корзину</div>`;
  }

  function handleCartAction(pid, isIncrement) {
    if (isIncrement) {
      const check = canAddToCart(pid);
      if (!check.allowed) { alert(check.reason); return; }
      cart[pid] = (cart[pid] || 0) + 1;
    } else {
      if (cart[pid] === 1) delete cart[pid];
      else if (cart[pid] > 0) cart[pid]--;
    }
    if (document.getElementById("catalog-page").classList.contains("active-page")) { updateSingleCard(pid); }
    if (document.getElementById("cart-page").classList.contains("active-page")) { renderCartPage(); }
    else if (document.getElementById("checkout-page").classList.contains("active-page")) { renderCheckoutForm(); }
    else { document.getElementById("cartCheckoutFixed").style.display = "none"; }
    saveCartToLocalStorage();
  }

  function updateSingleCard(productId) {
    const card = document.querySelector(`.product-card[data-id="${productId}"]`);
    if (!card) return;
    const btnContainer = card.querySelector('.card-info > div:last-child');
    if (btnContainer) { btnContainer.outerHTML = renderCartButtonHtml(productId); attachCardEvents(); }
  }

  function renderCatalog() {
    const grid = document.getElementById("catalogGrid");
    if (!grid) return;
    let filtered = products.filter(p => p.visible === true && (currentFilter === "Все категории" || p.category === currentFilter));
    if (searchQuery.trim()) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state-icon" style="width:100%;"><div class="empty-title">Товары не найдены</div></div>`;
      return;
    }
    grid.innerHTML = filtered.map(p => `<div class="product-card" data-id="${p.id}"><img class="card-img" src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy"><div class="card-info"><div class="product-title">${escapeHtml(p.name)}</div><div class="price-row"><span class="current-price">${formatPrice(p.price)}</span><span class="old-price">${formatPrice(p.oldPrice)}</span></div>${renderCartButtonHtml(p.id)}</div></div>`).join("");
    attachCardEvents();
  }

  function attachCardEvents() {
    document.querySelectorAll('.product-card').forEach(card => {
      const cardId = parseInt(card.dataset.id);
      const actionBtn = card.querySelector('.card-action-btn');
      if (!actionBtn) return;
      if (actionBtn.classList.contains('cart-add-btn')) {
        actionBtn.replaceWith(actionBtn.cloneNode(true));
        const newBtn = card.querySelector('.cart-add-btn');
        newBtn?.addEventListener('click', (e) => { e.stopPropagation(); handleCartAction(cardId, true); hapticLight(); });
      } else if (actionBtn.classList.contains('counter-btn')) {
        const minus = actionBtn.querySelector('.counter-minus');
        const plus = actionBtn.querySelector('.counter-plus');
        minus?.replaceWith(minus.cloneNode(true));
        plus?.replaceWith(plus.cloneNode(true));
        const newMinus = actionBtn.querySelector('.counter-minus');
        const newPlus = actionBtn.querySelector('.counter-plus');
        newMinus?.addEventListener('click', (e) => { e.stopPropagation(); hapticLight(); handleCartAction(cardId, false); });
        newPlus?.addEventListener('click', (e) => { e.stopPropagation(); hapticLight(); handleCartAction(cardId, true); });
      }
    });
  }

  function renderCartPage() {
    const container = document.getElementById("cartItemsList");

  async function renderRoulettePage() {
    const container = document.getElementById("rouletteContent");
    if (!container) return;

    let slotIndices = [0, 1, 2];
    let isSpinning = false;
    let demoMode = true;

    function renderSlots() {
      return slotIndices.map((idx, pos) => {
        const item = rouletteItems[idx % rouletteItems.length];
        const isCenter = pos === 1;
        return `<div style="flex:1;background:#1e1e21;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 8px;border:${isCenter ? '2px solid #4cb4e9' : '1px solid #2B2B2D'};transition:border 0.3s;">
          <div style="font-size:42px;">🎟️</div>
          <div style="background:rgba(76,180,233,0.15);border-radius:20px;padding:5px 14px;font-size:15px;font-weight:600;color:#4cb4e9;">${item.label}</div>
        </div>`;
      }).join('');
    }

    container.innerHTML = `
      <div style="display:flex;gap:10px;margin-bottom:20px;" id="rouletteSlots">
        ${renderSlots()}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;background:#222225;border:1px solid #2B2B2D;border-radius:20px;padding:14px 18px;margin-bottom:20px;">
        <span style="font-size:16px;color:#cbcdcd;font-weight:500;">Демо режим</span>
        <div id="demoToggle" style="width:50px;height:28px;background:#4cb4e9;border-radius:20px;position:relative;cursor:pointer;transition:background 0.2s;">
          <div id="demoKnob" style="position:absolute;top:3px;right:3px;width:22px;height:22px;background:white;border-radius:50%;transition:all 0.2s;"></div>
        </div>
      </div>
      <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <span style="font-size:18px;font-weight:600;">Вы можете выиграть...</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
          ${rouletteItems.map(item => `
            <div style="background:#222225;border:1px solid #2B2B2D;border-radius:20px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;">
              <span style="font-size:13px;color:#9e9e9e;">${item.chance}%</span>
              <div style="font-size:32px;">🎟️</div>
              <div style="background:rgba(76,180,233,0.15);border-radius:20px;padding:4px 10px;font-size:14px;font-weight:600;color:#4cb4e9;">${item.label}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    const fixedBlock = document.getElementById("cartCheckoutFixed");
    if (fixedBlock) {
      fixedBlock.style.display = "block";
      fixedBlock.innerHTML = `<div class="checkout-card">
        <div class="checkout-buttons-row">
          <button class="checkout-button" id="spinBtn">Крутить (демо)</button>
          <button class="promo-btn" onclick="hapticLight();window.open('https://t.me/GemStormHelp','_blank')">
            <img src="https://storage.botpapa.me/files/bc747470-4a25-11f1-bef9-f1ec7a2c6e45.png" style="width:24px;height:24px;">
          </button>
        </div>
      </div>`;
    }

    document.getElementById("demoToggle")?.addEventListener("click", () => {
      hapticLight();
      demoMode = !demoMode;
      const toggle = document.getElementById("demoToggle");
      const knob = document.getElementById("demoKnob");
      if (toggle) toggle.style.background = demoMode ? '#4cb4e9' : '#3a3a3e';
      if (knob) { knob.style.right = demoMode ? '3px' : ''; knob.style.left = demoMode ? '' : '3px'; }
      const spinBtn = document.getElementById("spinBtn");
      if (spinBtn) spinBtn.textContent = demoMode ? 'Крутить (демо)' : 'Крутить колесо';
    });

    document.getElementById("spinBtn")?.addEventListener("click", async () => {
      if (isSpinning) return;
      hapticMedium();
      isSpinning = true;

      let result;
      const rand = Math.random() * 100;
      let cum = 0;
      for (const item of rouletteItems) { cum += item.chance; if (rand < cum) { result = item; break; } }
      if (!result) result = rouletteItems[rouletteItems.length - 1];

      const slotsEl = document.getElementById("rouletteSlots");
      let spinCount = 0;
      const totalSpins = 15 + Math.floor(Math.random() * 8);
      const spinInterval = setInterval(() => {
        spinCount++;
        slotIndices = slotIndices.map(i => (i + 1) % rouletteItems.length);
        if (slotsEl) slotsEl.innerHTML = renderSlots();
        if (spinCount >= totalSpins) {
          clearInterval(spinInterval);
          const winIdx = rouletteItems.indexOf(result);
          slotIndices = [(winIdx - 1 + rouletteItems.length) % rouletteItems.length, winIdx, (winIdx + 1) % rouletteItems.length];
          if (slotsEl) slotsEl.innerHTML = renderSlots();
          isSpinning = false;
          setTimeout(() => alert(`Демо результат: промокод на ${result.label}!`), 300);
        }
      }, spinCount < totalSpins * 0.5 ? 80 : spinCount < totalSpins * 0.8 ? 120 : 200);
    });
  }

  async function loadUserOrders() {
    try {
      const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
      if (!tgUser?.id) return;
      const r = await fetch(`https://gemstorm.up.railway.app/api/user-orders?userId=${tgUser.id}`);
      if (r.ok) orders = await r.json();
    } catch(e) { console.error('Ошибка загрузки заказов:', e); }
  }

  function renderOrdersPage() {
    const container = document.getElementById("ordersList");
    if (!container) return;
    loadUserOrders().then(() => {
      if (!orders.length) {
        container.innerHTML = `<div class="empty-state-icon"><div class="empty-title">Заказов еще нет</div></div>`;
        return;
      }
      container.innerHTML = orders.map((o) => `<div class="order-card"><div class="order-card-header"><span class="order-card-id">Заказ #${o.order_number}</span><span class="order-card-status">${o.status}</span></div><div class="order-card-date">${o.date}</div><div class="order-card-total">${formatPrice(o.total)}</div></div>`).join('');
    });
  }

  async function renderReviewsPage() {
    const container = document.getElementById("reviewsContent");
    if (!container) return;
    container.innerHTML = `<div class="review-empty">Загрузка отзывов...</div>`;
    try {
      const r = await fetch('https://gemstorm.up.railway.app/api/reviews');
      if (!r.ok) throw new Error();
      const list = await r.json();
      if (!list.length) {
        container.innerHTML = `<div class="review-empty">Пока нет отзывов</div>`;
        return;
      }
      container.innerHTML = list.map(rv => `<div class="review-card"><div class="review-header"><div class="review-avatar">👤</div><div><div class="review-author-name">${escapeHtml(rv.user_name || 'Пользователь')}</div></div></div><div class="review-text">${escapeHtml(rv.text)}</div></div>`).join('');
    } catch(e) {
      container.innerHTML = `<div class="review-empty">Не удалось загрузить отзывы</div>`;
    }
  }

      document.getElementById("promoCategorySelect")?.addEventListener("change", function() { promoOrderData.category = this.value; });
      document.getElementById("promoGoCheckoutBtn")?.addEventListener("click", () => { orderMode = "promo_deal"; showPage("checkout"); });

  function renderSettingsPage() {

    setTimeout(() => {
      document.getElementById("closeSettingsBtn")?.addEventListener("click", () => { showPage("catalog"); });

  }

  const pageConfigs = {
    'catalog': { icon: 'https://storage.botpapa.me/files/00f09750-5110-11f1-bef9-f1ec7a2c6e45.png', title: 'Каталог' },
    'cart': { icon: 'https://storage.botpapa.me/files/0d3678e0-4a0d-11f1-bef9-f1ec7a2c6e45.png', title: 'Корзина' },
    'orders': { icon: 'https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png', title: 'Заказы' },
    'profile': { icon: 'https://storage.botpapa.me/files/49df3ed0-5110-11f1-bef9-f1ec7a2c6e45.png', title: 'Профиль' },
    'filter': { icon: 'https://storage.botpapa.me/files/9478fb40-49de-11f1-bef9-f1ec7a2c6e45.png', title: 'Фильтры' },
    'checkout': { icon: 'https://storage.botpapa.me/files/0d3678e0-4a0d-11f1-bef9-f1ec7a2c6e45.png', title: 'Оформление' },
    'payment': { icon: 'https://storage.botpapa.me/files/62edaf00-4a27-11f1-bef9-f1ec7a2c6e45.png', title: 'Оплата' },
    'order-detail': { icon: 'https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png', title: 'Заказ' },
    'reviews': { icon: 'https://storage.botpapa.me/files/f665c4e0-510f-11f1-bef9-f1ec7a2c6e45.png', title: 'Отзывы' },
    'buy-promo': { icon: 'https://storage.botpapa.me/files/9deb9760-5167-11f1-bef9-f1ec7a2c6e45.png', title: 'Покупка акций' },
    'write-review': { icon: 'https://storage.botpapa.me/files/f665c4e0-510f-11f1-bef9-f1ec7a2c6e45.png', title: 'Оставить отзыв' },
    'gifts': { icon: 'https://storage.botpapa.me/files/501ffee0-51e9-11f1-bef9-f1ec7a2c6e45.png', title: 'Подарки' },
    'settings': { icon: 'https://storage.botpapa.me/files/e4196b10-5f66-11f1-af2e-f7a93121b83b.png', title: 'Настройки' },
    'roulette': { icon: 'https://storage.botpapa.me/files/9deb9760-5167-11f1-bef9-f1ec7a2c6e45.png', title: 'Рулетка призов' }
  };

  function injectPageHeader() {
    const activePage = document.querySelector('.page.active-page');
    if (!activePage) return;
    const pageId = activePage.id.replace('-page', '');
    const cfg = pageConfigs[pageId];
    if (!cfg) return;
    const old = activePage.querySelector('.page-header-sticky');
    if (old) old.remove();
    activePage.insertAdjacentHTML('afterbegin', renderPageHeader(cfg.icon, cfg.title));
  }

  function updateMenuSlider(pageId) {
    const slider = document.getElementById("menuSlider");
    if (!slider) return;
    const pages = ["catalog", "cart", "orders"];
    const index = pages.indexOf(pageId);
    if (index === -1) { slider.style.left = "calc(100%)"; slider.style.opacity = "0"; return; }
    slider.style.opacity = "1";
    if (index === 0) slider.style.left = "3px";
    else if (index === 2) slider.style.left = "calc(66.66%)";
    else slider.style.left = "calc(33.33%)";
    slider.style.width = "calc(33.33% - 3px)";
  }

  function showPage(pageId, skipHistoryAdd = false) {
    let currentPageId = null;
    for (const page of document.querySelectorAll(".page")) {
      if (page.classList.contains("active-page")) {
        currentPageId = page.id.replace("-page", "");
        break;
      }
    }
    if (currentPageId && currentPageId !== pageId && !skipHistoryAdd) {
      navigationHistory.push(currentPageId);
    }
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
    const targetPage = document.getElementById(pageId + "-page");
    if (targetPage) targetPage.classList.add("active-page");
    const checkoutBlock = document.getElementById("cartCheckoutFixed");
    if (pageId === "catalog") { renderCatalog(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "cart") { renderCartPage(); }
    if (pageId === "orders") { renderOrdersPage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "profile") { renderProfilePage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "checkout") { renderCheckoutForm(); }
    if (pageId === "payment") { renderPaymentPage(); }
    if (pageId === "reviews") { renderReviewsPage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "gifts") { renderGiftsPage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "buy-promo") { renderBuyPromoPage(); }
    if (pageId === "roulette") { renderRoulettePage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "settings") { renderSettingsPage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    
    const mainPages = ["catalog", "cart", "orders", "profile"];
    if (mainPages.includes(pageId)) {
      document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
      const activeBtn = document.querySelector(`.menu-item[data-page="${pageId}"]`);
      if (activeBtn) activeBtn.classList.add("active");
      updateMenuSlider(pageId);
      localStorage.setItem("lastPage", pageId);
    }
    injectPageHeader();
    if (window.Telegram?.WebApp) {
      const tg = window.Telegram.WebApp;
      if (pageId === "catalog") tg.BackButton.hide();
      else tg.BackButton.show();
    }
    window.scrollTo({ top: 0 });
  }

  function initBackButtonHandler() {
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.BackButton.onClick(function() {
        if (navigationHistory.length > 0) { const previousPage = navigationHistory.pop(); showPage(previousPage, true); }
        else { showPage("catalog"); }
      });
    }
  }

  function initApp() {
    loadCartFromLocalStorage();
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      try { tg.setHeaderColor("#121214"); tg.setBackgroundColor("#121214"); } catch(e) {}
      initBackButtonHandler();
      tg.BackButton.hide();
    }
    const lastPage = localStorage.getItem("lastPage") || "catalog";
    showPage(lastPage);
    const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
    if (tgUser?.photo_url) {
      document.getElementById("profileMenuAvatar").src = tgUser.photo_url;
    }
    renderFilterModal();
  }

  function renderFilterModal() {
    const container = document.getElementById("filterOptionsContainer");
    if (!container) return;
    const categories = ["Все категории", ...new Set(products.map(p => p.category))];
    container.innerHTML = categories.map(cat => `<div class="filter-row" data-filter="${cat}"><span class="filter-text">${cat}</span>${currentFilter === cat ? '<span class="check-mark">✓</span>' : ''}</div>`).join("");
    container.querySelectorAll(".filter-row").forEach(row => {
      row.addEventListener("click", () => {
        currentFilter = row.dataset.filter;
        renderCatalog();
        renderFilterModal();
        showPage("catalog");
      });
    });
  }

  document.getElementById("openFilterBtn")?.addEventListener("click", () => { showPage("filter"); });
  document.getElementById("searchInput")?.addEventListener("input", (e) => { searchQuery = e.target.value; renderCatalog(); });
  document.querySelectorAll(".menu-item").forEach(btn => {
    btn.addEventListener("click", () => { hapticLight(); showPage(btn.dataset.page); });
  });
  document.addEventListener('click', function(e) {
    if (e.target.closest('#headerSettingsBtn')) { hapticLight(); showPage('settings'); }
  });

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
  initApp();
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <meta name="theme-color" content="#171719">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <title>Geltan Store — Каталог</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tg-theme-bg-color: #171719 !important;
      --brand-blue: #4cb4e9;
    }

    body {
      background-color: #171719;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding-bottom: 130px;
    }

    .page {
      display: none;
      padding: 16px 14px 0 14px;
      max-width: 600px;
      margin: 0 auto;
    }

    .page.active-page {
      display: block;
    }

    /* Предзагрузка иконок */
    .icons-preload {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    /* Нижнее меню */
    .bottom-menu {
      position: fixed;
      bottom: 18px;
      left: 18px;
      right: 18px;
      background: #202022f9;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 60px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 5px 12px 8px 12px;
      z-index: 1001;
      max-width: 600px;
      margin: 0 auto;
      width: calc(100% - 36px);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.1s;
      flex: 1;
      padding: 5px 0 2px 0;
    }

    .menu-icon {
      width: 28px;
      height: 28px;
      transition: all 0.1s;
      will-change: transform;
      transform: translateZ(0);
    }

    .menu-icon-inactive {
      display: block;
    }

    .menu-icon-active {
      display: none;
    }

    .menu-item.active .menu-icon-inactive {
      display: none;
    }

    .menu-item.active .menu-icon-active {
      display: block;
    }

    .menu-label {
      font-size: 11px;
      font-weight: 500;
      color: #9e9e9e;
    }

    .menu-item.active .menu-label {
      color: #4cb4e9;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 26px;
      height: 26px;
    }

    .page-title {
      font-size: 25px;
      font-weight: 500;
    }

    .search-section {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search-bar {
      flex: 1;
      background: #303032;
      height: 46px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      cursor: text;
    }

    .search-icon {
      width: 20px;
      height: 20px;
      filter: brightness(0) saturate(100%) invert(70%);
    }

    .search-input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 18px;
      font-weight: 500;
      width: 100%;
    }

    .search-input::placeholder {
      color: #a1a1aa;
      font-weight: 500;
      font-size: 16px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid #323234;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .filter-icon {
      width: 24px;
      height: 24px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      margin-bottom: 20px;
    }

    .product-card {
      background: #202022;
      border: 1px solid #2B2B2D;
      border-radius: 42px 42px 28px 28px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: 0.1s linear;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      padding: 7px;
      border-radius: 43px;
    }

    .card-info {
      padding: 0 8px 8px 8px;
    }

    .product-title {
      font-size: 18px;
      font-weight: 500;
      color: white;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      margin: 6px 0 10px 0;
    }

    .current-price {
      font-size: 19px;
      font-weight: 500;
      color: white;
    }

    .old-price {
      font-size: 16px;
      color: #9ca3af;
      text-decoration: line-through;
    }

    .card-action-btn {
      width: 100%;
      height: 38px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 500;
      font-size: 16px;
      transition: 0.1s;
      background: #4cb4e9;
      border: none;
      color: white;
    }

    .cart-add-btn {
      background: #4cb4e9;
      border: none;
      color: white;
    }

    .counter-btn {
      background: #202B32;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
      color: #4cb4e9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
    }

    .counter-minus, .counter-plus {
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .counter-minus img, .counter-plus img {
      width: 14px;
      height: 14px;
    }

    .counter-value {
      font-size: 16px;
      font-weight: 500;
      color: white;
    }

    .empty-state {
      text-align: center;
      margin-top: 50px;
      color: #a1a1aa;
      font-size: 18px;
    }

    /* СТИЛИ КАРТОЧКИ КОРЗИНЫ */
    .cart-item {
      background: #202022;
      border: 1px solid #2B2B2D;
      border-radius: 28px;
      padding: 10px;
      margin-bottom: 12px;
      display: flex;
      gap: 14px;
      align-items: center;
      position: relative;
    }

    .cart-img {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .cart-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 0;
      padding-right: 5px;
    }

    .cart-product-name {
      font-size: 18px;
      font-weight: 500;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 10px;
    }

    .cart-product-price {
      font-size: 18px;
      font-weight: 500;
      color: white;
    }

    .cart-product-category {
      font-size: 18px;
      color: #9e9e9e;
    }

    .cart-actions {
      position: absolute;
      bottom: 10px;
      right: 10px;
    }

    /* Кнопка количества */
    .cart-quantity {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #202B32;
      border-radius: 40px;
      padding: 6px 10px;
    }

    .cart-qty-btn {
      background: none;
      border: none;
      width: 24px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 30px;
    }

    .cart-qty-btn img {
      width: 16px;
      height: 16px;
    }

    .cart-qty-value {
      font-size: 16px;
      font-weight: 600;
      color: white;
      min-width: 22px;
      text-align: center;
    }

    /* ЗАКРЕПЛЁННЫЙ БЛОК ОФОРМЛЕНИЯ */
    .cart-checkout-fixed {
      position: fixed;
      bottom: 18px;
      left: 18px;
      right: 18px;
      z-index: 1000;
      max-width: 600px;
      margin: 0 auto;
      width: calc(100% - 36px);
    }

    .checkout-card {
      background: #202022f9;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 30px 30px 34px 34px;
      padding: 14px 14px 80px 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: 500;
    }

    .total-label {
      color: #cbd5e1;
      padding-left: 2px;
    }

    .total-price-wrapper {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding-right: 2px;
    }

    .total-price {
      color: white;
      font-weight: 550;
      font-size: 18px;
    }

    .total-old-price {
      color: #9ca3af;
      font-size: 16px;
      text-decoration: line-through;
      font-weight: 400;
    }

    /* СТРОКА С КНОПКАМИ */
    .checkout-buttons-row {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .checkout-button {
      flex: 1;
      min-width: 0;
      background: #4cb4e9;
      border: none;
      border-radius: 50px;
      padding: 12px;
      color: white;
      font-weight: 550;
      font-size: 18px;
      cursor: pointer;
      transition: 0.1s;
      text-align: center;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkout-button:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    /* Круглая кнопка промокода */
    .promo-btn {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50%;
      background: #202B32;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: 0.1s;
    }

    .promo-btn img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .promo-btn:active {
      opacity: 0.8;
      transform: scale(0.95);
    }

    /* Промокод режим */
    .promo-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .promo-input {
      flex: 1;
      min-width: 0;
      background: #303032;
      border: none;
      border-radius: 50px;
      padding: 0 16px;
      color: white;
      font-size: 18px;
      font-weight: 500;
      outline: none;
      height: 48px;
    }

    .promo-input::placeholder {
      color: #a1a1aa;
      font-size: 18px;
    }

    .promo-input.error {
      color: #ef4444;
      font-size: 18px;
    }

    /* Круглые кнопки в режиме промокода */
    .promo-action-btn {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: 0.1s;
    }

    .promo-action-btn.back-btn {
      background: rgba(239, 68, 68, 0.12);
    }

    .promo-action-btn.apply-btn {
      background: #202B32;
    }

    .promo-action-btn img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .promo-action-btn:active {
      opacity: 0.8;
      transform: scale(0.95);
    }

    /* Промокод лейбл */
    .promo-label {
      color: #cbd5e1;
      font-size: 18px;
      font-weight: 500;
      padding-left: 2px;
    }

    .cart-content-padding {
      padding-bottom: 110px;
    }

    .order-item {
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .order-id {
      font-weight: 600;
      color: #4cb4e9;
    }

    .order-status {
      color: #4cb4e9;
    }

    .order-products {
      font-size: 14px;
      color: #a1a1aa;
      margin-bottom: 8px;
    }

    .order-total {
      font-weight: 600;
      color: white;
    }

    .filter-options {
      margin-top: 20px;
      background: rgba(75,183,239,0.08);
      border-radius: 24px;
      padding: 4px 0;
    }

    .filter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }

    .filter-row:last-child {
      border-bottom: none;
    }

    .filter-text {
      font-size: 16px;
      font-weight: 500;
    }

    .check-mark {
      font-size: 18px;
      color: #4cb4e9;
      font-weight: 600;
    }

    /* Хедер иконки */
    .header-icon-img {
      width: 26px;
      height: 26px;
      object-fit: contain;
    }
  </style>
</head>

      <span class="menu-label">Профиль</span>
    </button>
  </div>

  <script>
    (function() {
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
        try {
          tg.setHeaderColor('#171719');
          tg.setBackgroundColor('#171719');
        } catch(e) {}
        document.body.style.backgroundColor = '#171719';
      }
    })();

    // Обновлённый список товаров
    const products = [
      // Brawl Stars (id 1-10)
      { id: 1, name: "Brawl Pass", price: 769, oldPrice: 799, image: "https://storage.botpapa.me/files/6b57bf60-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 2, name: "Улучш. до BP+", price: 429, oldPrice: 449, image: "https://storage.botpapa.me/files/6f97da10-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 3, name: "Brawl Pass Plus", price: 1099, oldPrice: 1169, image: "https://storage.botpapa.me/files/6f97da10-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 4, name: "Pro Pass", price: 2129, oldPrice: 2249, image: "https://storage.botpapa.me/files/72f535e0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 5, name: "30 гемов", price: 169, oldPrice: 179, image: "https://storage.botpapa.me/files/de7124e0-4a1d-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 6, name: "80 гемов", price: 429, oldPrice: 449, image: "https://storage.botpapa.me/files/e2281260-4a1d-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 7, name: "170 гемов", price: 849, oldPrice: 889, image: "https://storage.botpapa.me/files/e5928d90-4a1d-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 8, name: "360 гемов", price: 1699, oldPrice: 1779, image: "https://storage.botpapa.me/files/e8aa06c0-4a1d-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 9, name: "950 гемов", price: 4249, oldPrice: 4449, image: "https://storage.botpapa.me/files/ec10b160-4a1d-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 10, name: "2000 гемов", price: 8469, oldPrice: 8899, image: "https://storage.botpapa.me/files/767ed1d0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      // Clash Royale (id 11-12)
      { id: 11, name: "Pro Pass", price: 2129, oldPrice: 2249, image: "https://storage.botpapa.me/files/72f535e0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" },
      { id: 12, name: "2000 Gems", price: 4249, oldPrice: 4449, image: "https://storage.botpapa.me/files/767ed1d0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" }
    ];
    
    // Промокоды
    const promoCodes = {
      "SALE10": 10,
      "SALE20": 20,
      "GELTAN": 15,
      "WELCOME": 5
    };
    
    let cart = {};
    let orders = [];
    let currentFilter = "Все категории";
    let searchQuery = "";
    let appliedPromo = null;
    let isPromoMode = false;

    function formatPrice(p) { return Math.round(p).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + "₽"; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    function getDiscountedPrice(price) {
      if (!appliedPromo) return price;
      return Math.round(price * (1 - appliedPromo.discountPercent / 100));
    }

    function renderCartButtonHtml(productId) {
      const qty = cart[productId] || 0;
      if (qty > 0) {
        return `<div class="card-action-btn counter-btn"><span class="counter-minus" data-id="${productId}"><img src="https://storage.botpapa.me/files/975c4510-49de-11f1-bef9-f1ec7a2c6e45.png" alt="-"></span><span class="counter-value">${qty}</span><span class="counter-plus" data-id="${productId}"><img src="https://storage.botpapa.me/files/9a5d01f0-49de-11f1-bef9-f1ec7a2c6e45.png" alt="+"></span></div>`;
      }
      return `<div class="card-action-btn cart-add-btn" data-add="${productId}">В корзину</div>`;
    }

    function updateSingleCard(productId) {
      const card = document.querySelector(`.product-card[data-id="${productId}"]`);
      if (!card) return;
      const btnContainer = card.querySelector('.card-info > div:last-child');
      if (btnContainer) {
        btnContainer.outerHTML = renderCartButtonHtml(productId);
        attachCardEvents();
      }
    }

    function updateAllCards() {
      document.querySelectorAll('.product-card').forEach(card => {
        const cardId = parseInt(card.dataset.id);
        const btnContainer = card.querySelector('.card-info > div:last-child');
        if (btnContainer) {
          btnContainer.outerHTML = renderCartButtonHtml(cardId);
        }
      });
      attachCardEvents();
    }

    function attachCardEvents() {
      document.querySelectorAll('.product-card').forEach(card => {
        const cardId = parseInt(card.dataset.id);
        const actionBtn = card.querySelector('.card-action-btn');
        if (!actionBtn) return;
        if (actionBtn.classList.contains('cart-add-btn')) {
          actionBtn.replaceWith(actionBtn.cloneNode(true));
          const newBtn = card.querySelector('.cart-add-btn');
          newBtn?.addEventListener('click', (e) => { e.stopPropagation(); handleCartAction(cardId, true); });
        } else if (actionBtn.classList.contains('counter-btn')) {
          const minus = actionBtn.querySelector('.counter-minus');
          const plus = actionBtn.querySelector('.counter-plus');
          minus?.replaceWith(minus.cloneNode(true));
          plus?.replaceWith(plus.cloneNode(true));
          const newMinus = actionBtn.querySelector('.counter-minus');
          const newPlus = actionBtn.querySelector('.counter-plus');
          newMinus?.addEventListener('click', (e) => { e.stopPropagation(); handleCartAction(cardId, false); });
          newPlus?.addEventListener('click', (e) => { e.stopPropagation(); alert("Максимум 1 шт."); });
        }
      });
    }

    function handleCartAction(pid, isIncrement) {
      if (isIncrement) {
        if (cart[pid] >= 1) { alert("Максимум 1 шт."); return; }
        cart[pid] = (cart[pid] || 0) + 1;
      } else {
        if (cart[pid] === 1) delete cart[pid];
        else if (cart[pid] > 0) cart[pid]--;
      }
      updateSingleCard(pid);
      // Обновляем корзину только если мы на странице корзины
      if (document.getElementById("cart-page").classList.contains("active-page")) {
        renderCartPage();
      } else {
        // На других страницах только обновляем блок оформления (скрыт)
        const checkoutBlock = document.getElementById("cartCheckoutFixed");
        if (checkoutBlock) checkoutBlock.style.display = "none";
      }
    }

    function changeQty(pid, delta) {
      const cur = cart[pid] || 0;
      if (delta === -1 && cur === 1) delete cart[pid];
      else if (delta === -1 && cur > 1) cart[pid] = cur - 1;
      else if (delta === 1) { if (cur >= 1) { alert("Максимум 1 шт."); return; } cart[pid] = cur + 1; }
      updateSingleCard(pid);
      renderCartPage();
    }

    function createOrder() {
      const items = Object.entries(cart);
      if (!items.length) { alert("Корзина пуста"); return; }
      
      let total = items.reduce((s, [id, qty]) => s + (products.find(p => p.id == id).price * qty), 0);
      if (appliedPromo) {
        total = Math.round(total * (1 - appliedPromo.discountPercent / 100));
      }
      
      const order = { 
        id: orders.length + 1, 
        date: new Date().toLocaleDateString('ru-RU'), 
        items: items.map(([id, qty]) => ({ 
          name: products.find(p => p.id == id).name, 
          qty, 
          price: products.find(p => p.id == id).price 
        })), 
        total, 
        status: "Оплачен",
        promo: appliedPromo ? appliedPromo.code : null
      };
      
      orders.unshift(order);
      cart = {};
      appliedPromo = null;
      isPromoMode = false;
      
      updateAllCards();
      renderCartPage();
      renderOrdersPage();
      
      alert(`Заказ #${order.id} создан! Сумма: ${formatPrice(total)}`);
    }

    function renderCheckoutBlock() {
      const fixedBlock = document.getElementById("cartCheckoutFixed");
      const items = Object.entries(cart);
      
      // Показываем блок только если мы на странице корзины
      const isCartPageActive = document.getElementById("cart-page").classList.contains("active-page");
      
      if (!items.length || !isCartPageActive) {
        fixedBlock.style.display = "none";
        return;
      }
      
      fixedBlock.style.display = "block";
      
      const rawTotal = items.reduce((s, [id, qty]) => s + (products.find(p => p.id == id).price * qty), 0);
      const discountedTotal = appliedPromo ? Math.round(rawTotal * (1 - appliedPromo.discountPercent / 100)) : rawTotal;
      const hasDiscount = appliedPromo && discountedTotal < rawTotal;
      
      if (isPromoMode) {
        fixedBlock.innerHTML = `
          <div class="checkout-card">
            <div class="total-row">
              <span class="promo-label">Введите промокод на скидку</span>
            </div>
            <div class="promo-input-row">
              <input type="text" class="promo-input" id="promoInput" placeholder="Введите промокод" value="${appliedPromo ? appliedPromo.code : ''}">
              <button class="promo-action-btn back-btn" id="promoBackBtn">
                <img src="https://storage.botpapa.me/files/af0747c0-4a13-11f1-bef9-f1ec7a2c6e45.png" alt="Назад">
              </button>
              <button class="promo-action-btn apply-btn" id="promoApplyBtn">
                <img src="https://storage.botpapa.me/files/b254ec20-4a13-11f1-bef9-f1ec7a2c6e45.png" alt="Применить">
              </button>
            </div>
          </div>
        `;
        
        setTimeout(() => {
          const promoInput = document.getElementById("promoInput");
          const backBtn = document.getElementById("promoBackBtn");
          const applyBtn = document.getElementById("promoApplyBtn");
          
          backBtn?.addEventListener("click", () => {
            if (appliedPromo) {
              appliedPromo = null;
            }
            isPromoMode = false;
            renderCheckoutBlock();
            renderCartPage();
          });
          
          applyBtn?.addEventListener("click", () => {
            const code = promoInput?.value.trim().toUpperCase();
            if (promoCodes[code]) {
              appliedPromo = { code, discountPercent: promoCodes[code] };
              isPromoMode = false;
              renderCheckoutBlock();
              renderCartPage();
            } else {
              if (promoInput) {
                promoInput.classList.add("error");
                promoInput.value = "Промокод не найден";
                setTimeout(() => {
                  promoInput.classList.remove("error");
                  promoInput.value = appliedPromo ? appliedPromo.code : "";
                }, 2000);
              }
            }
          });
          
          promoInput?.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
              applyBtn?.click();
            }
          });
        }, 0);
        
      } else {
        let totalHtml = '';
        if (hasDiscount) {
          totalHtml = `
            <span class="total-price-wrapper">
              <span class="total-price">${formatPrice(discountedTotal)}</span>
              <span class="total-old-price">${formatPrice(rawTotal)}</span>
            </span>
          `;
        } else {
          totalHtml = `<span class="total-price-wrapper"><span class="total-price">${formatPrice(rawTotal)}</span></span>`;
        }
        
        fixedBlock.innerHTML = `
          <div class="checkout-card">
            <div class="total-row">
              <span class="total-label">Общая стоимость:</span>
              ${totalHtml}
            </div>
            <div class="checkout-buttons-row">
              <button class="checkout-button" id="checkoutBtn">Перейти к оформлению</button>
              <button class="promo-btn" id="openPromoBtn">
                <img src="https://storage.botpapa.me/files/a488c6d0-4a12-11f1-bef9-f1ec7a2c6e45.png" alt="Промокод">
              </button>
            </div>
          </div>
        `;
        
        setTimeout(() => {
          document.getElementById("checkoutBtn")?.addEventListener("click", createOrder);
          document.getElementById("openPromoBtn")?.addEventListener("click", () => {
            isPromoMode = true;
            renderCheckoutBlock();
          });
        }, 0);
      }
    }

    function renderCartPage() {
      const container = document.getElementById("cartItemsList");
      if (!container) return;
      
      const items = Object.entries(cart);
      if (!items.length) { 
        container.innerHTML = '<div class="empty-state">Корзина пуста 🛒</div>'; 
        document.getElementById("cartCheckoutFixed").style.display = "none";
        isPromoMode = false;
        appliedPromo = null;
        return; 
      }
      
      let html = '';
      for (let [id, qty] of items) {
        const prod = products.find(p => p.id == id);
        if (!prod) continue;
        
        html += `
          <div class="cart-item">
            <img class="cart-img" src="${prod.image}" alt="${escapeHtml(prod.name)}">
            <div class="cart-info">
              <div class="cart-product-name">${escapeHtml(prod.name)}</div>
              <div class="cart-product-price">${formatPrice(prod.price)}</div>
              <div class="cart-product-category">${escapeHtml(prod.category)}</div>
            </div>
            <div class="cart-actions">
              <div class="cart-quantity">
                <button class="cart-qty-btn" data-dec="${id}"><img src="https://storage.botpapa.me/files/975c4510-49de-11f1-bef9-f1ec7a2c6e45.png" alt="-"></button>
                <span class="cart-qty-value">${qty}</span>
                <button class="cart-qty-btn" data-inc="${id}"><img src="https://storage.botpapa.me/files/9a5d01f0-49de-11f1-bef9-f1ec7a2c6e45.png" alt="+"></button>
              </div>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
      
      document.querySelectorAll("[data-dec]").forEach(btn => {
        btn.addEventListener("click", () => changeQty(parseInt(btn.dataset.dec), -1));
      });
      document.querySelectorAll("[data-inc]").forEach(btn => {
        btn.addEventListener("click", () => changeQty(parseInt(btn.dataset.inc), 1));
      });
      
      // Показываем блок оформления только если мы на странице корзины
      if (document.getElementById("cart-page").classList.contains("active-page")) {
        renderCheckoutBlock();
      }
    }

    function renderOrdersPage() {
      const container = document.getElementById("ordersList");
      if (!container) return;
      if (!orders.length) { container.innerHTML = '<div class="empty-state">У вас пока нет заказов 📦</div>'; return; }
      container.innerHTML = orders.map(o => `
        <div class="order-item">
          <div class="order-header">
            <span class="order-id">Заказ #${o.id}</span>
            <span class="order-status">${o.status}</span>
          </div>
          <div style="color:#a1a1aa;font-size:14px;margin-bottom:8px;">${o.date}</div>
          <div class="order-products">${o.items.map(i => `${i.name} x ${i.qty}`).join(', ')}${o.promo ? ` (промокод: ${o.promo})` : ''}</div>
          <div class="order-total">${formatPrice(o.total)}</div>
        </div>
      `).join('');
    }

    function renderCatalog() {
      const grid = document.getElementById("catalogGrid");
      if (!grid) return;
      
      let filtered = products.filter(p => currentFilter === "Все категории" || p.category === currentFilter);
      if (searchQuery.trim()) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      
      if (!filtered.length) { 
        grid.innerHTML = '<div style="text-align:center;padding:40px;color:#a1a1aa">Товары не найдены</div>'; 
        return; 
      }
      
      grid.innerHTML = filtered.map(p => `
        <div class="product-card" data-id="${p.id}">
          <img class="card-img" src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy">
          <div class="card-info">
            <div class="product-title">${escapeHtml(p.name)}</div>
            <div class="price-row"><span class="current-price">${formatPrice(p.price)}</span><span class="old-price">${formatPrice(p.oldPrice)}</span></div>
            ${renderCartButtonHtml(p.id)}
          </div>
        </div>
      `).join("");
      attachCardEvents();
    }

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
      document.getElementById(pageId + "-page")?.classList.add("active-page");
      
      if (pageId === "catalog") renderCatalog();
      if (pageId === "cart") renderCartPage();
      if (pageId === "orders") renderOrdersPage();
      
      // Управление видимостью блока оформления
      const checkoutBlock = document.getElementById("cartCheckoutFixed");
      if (checkoutBlock) {
        if (pageId === "cart" && Object.keys(cart).length > 0) {
          // Блок покажется через renderCartPage -> renderCheckoutBlock
        } else {
          checkoutBlock.style.display = "none";
        }
      }
      
      document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
      document.querySelector(`.menu-item[data-page="${pageId}"]`)?.classList.add("active");
      window.scrollTo({ top: 0 });
    }

    function renderFilterModal() {
      const cats = ["Все категории", "Brawl Stars", "Clash Royale"];
      const container = document.getElementById("filterOptionsContainer");
      if (!container) return;
      container.innerHTML = cats.map(cat => `<div class="filter-row" data-filter="${cat}"><span class="filter-text">${cat}</span><span class="check-mark">${currentFilter === cat ? '✓' : ''}</span></div>`).join("");
      document.querySelectorAll(".filter-row").forEach(row => {
        row.addEventListener("click", () => { 
          currentFilter = row.dataset.filter; 
          renderFilterModal(); 
          renderCatalog(); 
          showPage("catalog"); 
        });
      });
    }

    // Инициализация событий
    document.getElementById("openFilterBtn")?.addEventListener("click", () => { 
      renderFilterModal(); 
      showPage("filter"); 
    });
    
    document.getElementById("searchInput")?.addEventListener("input", (e) => { 
      searchQuery = e.target.value; 
      renderCatalog(); 
    });
    
    document.querySelectorAll(".menu-item").forEach(btn => {
      btn.addEventListener("click", () => showPage(btn.dataset.page));
    });
    
    // Начальная инициализация
    document.querySelector('.menu-item[data-page="catalog"]')?.classList.add("active");
    renderCatalog(); 
    renderCartPage(); 
    renderOrdersPage(); 
    renderFilterModal();
    
    // Скрываем блок оформления при загрузке
    document.getElementById("cartCheckoutFixed").style.display = "none";
  </script>
</body>
</html>

  <title>GemStorm Store</title>
  <style>
    .page { display: none !important; }
    .page.active-page { display: block !important; }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tg-theme-bg-color: #141416 !important;
      --brand-blue: #4cb4e9;
    }

    body {
      background-color: #121214;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding-bottom: 130px;
    }
    
    body {
      padding-top: var(--tg-safe-area-inset-top, 0px);
    }

    body {
      -webkit-user-select: none;
      user-select: none;
    }

    #payment-page .form-select-readonly,
    #payment-page .card-number-text {
      -webkit-user-select: text;
      user-select: text;
    }

    body {
      touch-action: pan-y;
    }

    .page-header-sticky {
      position: relative;
      top: 0;
      z-index: 500;
      margin: 0 -14px 8px -14px;
      padding: calc(var(--tg-content-safe-area-inset-top, 14px) + 8px) 14px 8px 14px;
      background: #121214;
    }

    .page-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      border: none;
      padding: 0;
      height: 43px;
      position: relative;
    }

    .page-header-inner::before {
      content: '';
      position: absolute;
      left: 21px;
      right: 21px;
      top: 0;
      bottom: 0;
      border-top: 1px solid rgba(255,255,255,0);
      border-bottom: 1px solid rgba(255,255,255,0);
      pointer-events: none;
      z-index: 0;
    }

    .page-header-title-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #212124;
      border: 1px solid #2B2B2D;
      border-radius: 50px;
      height: 43px;
      padding: 0 14px 0 10px;
      position: relative;
      z-index: 1;
      flex: 0 0 auto;
    }

    .page-header-title-btn img {
      width: 23px;
      height: 23px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .page-header-title-btn span {
      font-size: 18px;
      font-weight: 550;
      color: white;
      white-space: nowrap;
    }

    .page-header-settings-btn {
      width: 43px;
      height: 43px;
      min-width: 43px;
      background: #212124;
      border: 1px solid #2B2B2D;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-header-settings-btn img {
      width: 21px;
      height: 21px;
    }

    .browser-blocker {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #141416;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .browser-blocker-content {
      max-width: 300px;
    }

    .browser-blocker-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }

    .browser-blocker-title {
      font-size: 22px;
      font-weight: 600;
      color: white;
      margin-bottom: 12px;
    }

    .browser-blocker-text {
      font-size: 16px;
      color: #9e9e9e;
      line-height: 1.4;
    }
    
    .page {
      display: none;
      padding: 0 14px 20px 14px;
      max-width: 600px;
      margin: 0 auto;
    }

    .page.active-page {
      display: block;
    }

    .bottom-menu {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: rgba(37, 37, 40, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 60px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 5px 12px 8px 12px;
      z-index: 1001;
      max-width: 600px;
      margin: 0 auto;
      width: calc(100% - 32px);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .menu-slider {
      position: absolute;
      top: 3px;
      left: 3px;
      height: calc(100% - 6px);
      width: calc(33.33% - 3px);
      background: rgba(200, 200, 200, 0.1);
      border-radius: 50px;
      transition: left 0.2s cubic-bezier(0.4, 0, 0.2, 1), width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    body:has(.search-input:focus) .bottom-menu,
    body:has(.form-input:focus) .bottom-menu,
    body:has(.form-select-native:focus) .bottom-menu,
    body:has(.search-input:focus) .cart-checkout-fixed,
    body:has(.form-input:focus) .cart-checkout-fixed,
    body:has(.form-select-native:focus) .cart-checkout-fixed {
      display: none !important;
    }

    body:has(.promo-input:focus) .bottom-menu,
    body:has(#verificationCodeInput:focus) .bottom-menu,
    body:has(.promo-input:focus) .cart-checkout-fixed,
    body:has(#verificationCodeInput:focus) .cart-checkout-fixed {
      display: flex !important;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.1s;
      flex: 1;
      padding: 5px 0 2px 0;
    }

    .menu-icon {
      width: 28px;
      height: 28px;
      transition: all 0.1s;
    }

    .menu-icon-inactive {
      display: block;
    }

    .menu-icon-active {
      display: none;
    }

    .menu-item.active .menu-icon-inactive {
      display: none;
    }

    .menu-item.active .menu-icon-active {
      display: block;
    }

    .menu-label {
      font-size: 11px;
      font-weight: 500;
      color: #9e9e9e;
    }

    .menu-item.active .menu-label {
      color: #4cb4e9;
    }

    #profileMenuWrapper.active {
      background: #28282af9 !important;
    }

    .search-section {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search-bar {
      flex: 1;
      background: #212124;
      height: 46px;
      border-radius: 34px;
      border: 1px solid #2B2B2D;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }

    .search-icon {
      width: 20px;
      height: 20px;
      filter: brightness(0) saturate(100%) invert(70%);
    }

    .search-input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 18px;
      font-weight: 500;
      width: 100%;
    }

    .search-input::placeholder {
      color: #a1a1aa;
      font-size: 18px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid #323234;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .filter-icon {
      width: 24px;
      height: 24px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      margin-bottom: 20px;
    }

    .product-card {
      background: #222225;
      border: 1px solid #2B2B2D;
      border-radius: 42px 42px 28px 28px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.1s linear;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      padding: 6px;
      border-radius: 43px;
    }

    .card-info {
      padding: 0 8px 8px 8px;
    }

    .product-title {
      font-size: 18px;
      font-weight: 500;
      color: white;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 6px 0 10px 0;
    }

    .current-price {
      font-size: 19px;
      font-weight: 500;
      color: white;
    }

    .old-price {
      font-size: 16px;
      color: #9ca3af;
      text-decoration: line-through;
    }

    .card-action-btn {
      width: 100%;
      height: 39px;
      border-radius: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 500;
      font-size: 17px;
      transition: 0.1s;
      background: #4cb4e9;
      border: none;
      color: white;
    }

    .cart-add-btn {
      background: #4cb4e9;
      color: white;
    }

    .counter-btn {
      background: rgba(56, 150, 200, 0.1);
      color: #4cb4e9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
    }

    .counter-minus, .counter-plus {
      width: 16px;
      height: 16px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .counter-minus img, .counter-plus img {
      width: 14px;
      height: 14px;
    }

    .counter-value {
      font-size: 16px;
      font-weight: 500;
      color: white;
    }

    .empty-state-icon {
      text-align: center;
      margin-top: 120px;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      opacity: 0.4;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 18px;
      color: #a1a1aa;
      margin-bottom: 20px;
    }

    .empty-catalog-btn {
      background: #4cb4e9;
      border: none;
      border-radius: 34px;
      padding: 12px 24px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .cart-item {
      background: #222225;
      border: 1px solid #2B2B2D;
      border-radius: 31px 31px 29px 29px !important;
      padding: 9px;
      margin-bottom: 12px;
      display: flex;
      gap: 14px;
      align-items: center;
      position: relative;
    }
 
    .cart-item-wrapper {
      position: relative;
      margin-bottom: 12px;
    }

    .cart-item-wrapper .cart-item {
      margin-bottom: 0;
      position: relative;
      z-index: 2;
    }

    .cart-item-delivery {
      background: #141416;
      border: 1px solid #2B2B2D;
      border-radius: 0 0 29px 29px;
      padding: 14px 16px;
      margin-top: -28px;
      padding-top: 38px;

      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-item-delivery-label {
      font-size: 16px;
      color: #cbcdcd;
      font-weight: 500;
    }

    .cart-item-delivery-value {
      font-size: 16px;
      color: #9e9e9e;
      font-weight: 500;
    }

    .cart-img {
      width: 90px;
      height: 90px;
      border-radius: 22px !important;
      object-fit: cover;
      flex-shrink: 0;
    }

    .cart-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 0;
    }

    .cart-product-name {
      font-size: 18px;
      font-weight: 500;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100% - 50px);
    }

    .cart-product-price {
      font-size: 18px;
      font-weight: 500;
      color: white;
    }

    .cart-product-category {
      font-size: 18px;
      color: #9e9e9e;
    }

    .cart-actions {
      position: absolute;
      bottom: 10px;
      right: 10px;
    }

    .cart-quantity {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(56, 150, 200, 0.1);
      border-radius: 40px;
      padding: 6px 10px;
    }

    .cart-qty-btn {
      background: none;
      border: none;
      width: 22px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .cart-qty-btn img {
      width: 14px;
      height: 14px;
    }

    .cart-qty-value {
      font-size: 16px;
      font-weight: 500;
      color: white;
      min-width: 20px;
      text-align: center;
    }

    .cart-checkout-fixed {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      z-index: 1000;
      max-width: 600px;
      margin: 0 auto;
      width: calc(100% - 32px);
    }

    .checkout-card {
      background: #222225f9;
      backdrop-filter: blur(12px);
      border-radius: 34px;
      padding: 14px;
      padding-bottom: 80px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-left: 5px;
      padding-right: 5px;
    }

    .total-label {
      color: #cbd5e1;
      font-size: 18px;
      font-weight: 500;
    }

    .promo-label {
      color: #cbd5e1;
      font-size: 18px;
      font-weight: 500;
      padding-left: 5px;
    }

    .total-price-wrapper {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding-right: 3px;
    }

    .total-price {
      color: white;
      font-weight: 550;
      font-size: 18px;
    }

    .total-old-price {
      color: #9ca3af;
      font-size: 16px;
      text-decoration: line-through;
    }

    .checkout-buttons-row {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }

    .checkout-button {
      flex: 1;
      background: #4cb4e9;
      border: none;
      border-radius: 34px;
      padding: 12px;
      color: white;
      font-weight: 550;
      font-size: 18px;
      cursor: pointer;
      text-align: center;
      height: 48px;
    }

    .promo-btn {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50%;
      background: rgba(56, 150, 200, 0.1);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .promo-btn img {
      width: 24px;
      height: 24px;
    }

    .promo-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
      flex-wrap: nowrap;
    }

    .promo-input {
      flex: 1;
      min-width: 0;
      width: 100%;
      background: #303032;
      border: 1px solid #3a3a3e;
      border-radius: 34px;
      padding: 12px 12px;
      color: white;
      font-size: 18px;
      font-weight: 500;
      outline: none;
      height: 48px;
    }

    .promo-input::placeholder {
      color: #a1a1aa;
      font-size: 18px;
    }

    .promo-input.error {
      color: #ef4444;
    }

    .promo-action-btn {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .promo-action-btn.apply-btn {
      background: rgba(56, 150, 200, 0.1);
    }

    .promo-action-btn.back-btn {
      background: rgba(239, 68, 68, 0.12);
    }

    .promo-action-btn img {
      width: 22px;
      height: 22px;
    }

    .cart-content-padding {
      padding-bottom: 110px;
    }
   
    .cart-warn-btn {

      height: 36px;
      border-radius: 50%;

      display: flex;

      flex-shrink: 0;
      padding: 0;
      -webkit-appearance: none;
    }

      border-radius: 34px;

      font-size: 19px;
      font-weight: 500;
      outline: none;

    .form-input::placeholder {

    .form-input.error {

    .form-select-native {
      width: 100%;
      background: #3a3a3d;
      border: 1px solid transparent;
      border-radius: 34px;
      padding: 14px 16px;
      color: white;
      font-size: 19px;
      font-weight: 500;
      outline: none;

function waitForTelegram(callback, attempts) {
  attempts = attempts || 0;
  if (window.Telegram && window.Telegram.WebApp) {
    callback();
    return;
  }
  // Если SDK нет но данные есть в URL — запускаем без SDK
  if (attempts > 20 && window.location.hash.length > 100) {
    callback();
    return;
  }
  if (attempts > 50) {
    callback();
    return;
  }
  setTimeout(function() {
    waitForTelegram(callback, attempts + 1);
  }, 100);
}

// Откладываем весь старт приложения до загрузки Telegram SDK
document.addEventListener('DOMContentLoaded', function() {
  waitForTelegram(function() {
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      try { tg.requestFullscreen(); } catch(e) {}
      try { tg.setHeaderColor("#121214"); tg.setBackgroundColor("#121214"); } catch(e) {}
      try { if (tg.disableVerticalSwipes) tg.disableVerticalSwipes(); } catch(e) {}
    }

    // Парсим пользователя
    let user = tg?.initDataUnsafe?.user || null;
    if (!user && tg?.initData) {
      try {
        const params = new URLSearchParams(tg.initData);
        const userStr = params.get('user');
        if (userStr) user = JSON.parse(decodeURIComponent(userStr));
      } catch(e) {}
    }
    if (user) window.__tgUser = user;

    // Обновляем аватар в меню
    if (user?.photo_url) {
      const avatar = document.getElementById("profileMenuAvatar");
      if (avatar) avatar.src = user.photo_url;
    }
  });
});
</script>

  function handleCartAction(pid, isIncrement) {
    if (isIncrement) {
      const check = canAddToCart(pid);
      if (!check.allowed) { alert(check.reason); return; }
      cart[pid] = (cart[pid] || 0) + 1;
    } else {
      if (cart[pid] === 1) delete cart[pid];
      else if (cart[pid] > 0) cart[pid]--;
    }
    if (document.getElementById("catalog-page").classList.contains("active-page")) { updateSingleCard(pid); }
    if (document.getElementById("cart-page").classList.contains("active-page")) { renderCartPage(); }
    else if (document.getElementById("checkout-page").classList.contains("active-page")) { renderCheckoutForm(); }
    else { document.getElementById("cartCheckoutFixed").style.display = "none"; }
    saveCartToLocalStorage();
  }

  function changeQty(pid, delta) {
    hapticLight();
    if (delta === 1) {
      const check = canAddToCart(pid);
      if (!check.allowed) { alert(check.reason); return; }
      cart[pid] = (cart[pid] || 0) + 1;
    } else if (delta === -1) {
      const cur = cart[pid] || 0;
      if (cur === 1) delete cart[pid];
      else if (cur > 1) cart[pid] = cur - 1;
    }
    updateSingleCard(pid);
    renderCartPage();
    saveCartToLocalStorage();
  }

        let orderPromoDiscount = 0;
        let orderPromoItemName = null;
        let orderPromoItemCategory = null;

        if (orderMode === "promo_deal") {
          const dealRaw = promoOrderData.deal.price;
          const dealTotal = appliedPromoDeal ? Math.round(dealRaw * (1 - appliedPromoDeal.discountPercent / 100)) : dealRaw;
          orderItems = [{ id: 0, name: promoOrderData.deal.label, qty: 1, price: dealRaw }];
          total = dealTotal;
          orderPromo = appliedPromoDeal ? appliedPromoDeal.code : null;
          orderPromoDiscount = appliedPromoDeal ? appliedPromoDeal.discountPercent : 0;
          orderPromoItemName = promoOrderData.name;
          orderPromoItemCategory = promoOrderData.category;
        } else {
          const cartItems = Object.entries(cart);
          total = cartItems.reduce((s, [id, qty]) => s + (products.find(p => p.id == id).price * qty), 0);
          if (appliedPromo) total = Math.round(total * (1 - appliedPromo.discountPercent / 100));
          orderItems = cartItems.map(([id, qty]) => ({ id: parseInt(id), name: products.find(p => p.id == id).name, qty, price: products.find(p => p.id == id).price }));
          orderPromo = appliedPromo ? appliedPromo.code : null;
          orderPromoDiscount = appliedPromo ? appliedPromo.discountPercent : 0;
        }

        const order = {
          orderNumber: 0,
          date: new Date().toLocaleDateString('ru-RU'),
          time: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }),
          timestamp: Date.now(),
          items: orderItems,
          total: total,
          status: "Ожидает проверки",
          status_code: "pending",
          promo: orderPromo,
          promo_discount: orderPromoDiscount,
          payment_method: getPaymentMethodLabel(checkoutData.paymentMethod),
          sender_name: checkoutData.senderName,
          email: checkoutData.email,
          user_id: tgUser?.id,
          user_name: tgUser?.first_name,
          user_username: tgUser?.username,
          promo_item_name: orderPromoItemName,
          promo_item_category: orderPromoItemCategory
        };

        const success = await sendOrderToServer(order);
        if (success) {
          if (orderMode === "promo_deal") {
            promoOrderData = { deal: null, name: "", category: "" };
            orderMode = "cart";
          } else {
            cart = {};
            appliedPromo = null;
            isPromoMode = false;
            updateAllCards();
            renderCartPage();
          }
          checkoutData = { paymentMethod: checkoutData.paymentMethod, senderName: checkoutData.senderName, email: "" };
          localStorage.setItem('checkoutData', JSON.stringify(checkoutData));
          navigationHistory = [afterPaymentBackPage];
          showPage("orders", true);
        }
        if (btn) { btn.disabled = false; btn.textContent = "Я оплатил"; }
        isSubmitting = false;
      });
    }, 0);
  }

    try {

      if (!tgUser?.id) return;
      const r = await fetch(`https://gemstorm.up.railway.app/api/user-orders?userId=${tgUser.id}`);

  async function getUserTotalSpent() {
    try {
      const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
      if (!tgUser?.id) return 0;
      
      const response = await fetch(`https://gemstorm.up.railway.app/api/user-orders?userId=${tgUser.id}`);
      if (!response.ok) return 0;
      
      const userOrders = await response.json();
      const totalSpent = userOrders
        .filter(order => order.status_code === 'completed' || order.status_code === 'done')
        .reduce((sum, order) => sum + (order.total || 0), 0);
      
      return totalSpent;
    } catch(e) {
      console.error('Ошибка получения суммы заказов:', e);
      return 0;
    }
  }

  async function refreshOrderStatus(orderId) {

  function renderWriteReviewPage() {
    const container = document.getElementById("writeReviewContent");
    if (!container) return;
    const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
    const userId = tgUser?.id;
    const nickname = tgUser?.first_name || "Пользователь";
    const photoUrl = tgUser?.photo_url || "";

    let completedOrders = [];
    let reviewedOrderIds = [];
    try {
      fetch(`https://gemstorm.up.railway.app/api/user-orders?userId=${userId}`).then(r => r.json()).then(ordersRes => {
        fetch(`https://gemstorm.up.railway.app/api/reviews`).then(r => r.json()).then(reviewsRes => {
          const allCompleted = ordersRes.filter(o => o.status_code === 'done' || o.status_code === 'completed');
          reviewedOrderIds = reviewsRes
            .filter(r => String(r.user_id) === String(userId))
            .map(r => String(r.order_id));
          completedOrders = allCompleted.filter(o => !reviewedOrderIds.includes(String(o.id)));
          
          if (!completedOrders.length) {
            container.innerHTML = `<div class="review-empty">Нет заказов для отзыва</div>`;
            return;
          }

          const orderOptions = completedOrders.map(o =>
            `<option value="${o.id}" data-num="${o.order_number}">Заказ #${o.order_number}</option>`
          ).join('');

          container.innerHTML = `
            <div class="order-data-card">
              <div style="font-size:19px;font-weight:600;color:#fff;margin-bottom:14px;">Оставьте отзыв к заказу</div>
              <div class="form-section">
                <div class="form-label">Выберите заказ</div>
                <select class="form-select-native" id="reviewOrderSelect">
                  ${orderOptions}
                </select>
              </div>
              <div class="form-section" style="margin-bottom:0;">
                <div class="form-label">Ваш отзыв <span id="reviewCharCount" style="color:#9e9e9e;font-weight:400;font-size:14px;">0/70</span></div>
                <textarea class="review-textarea" id="reviewTextarea" placeholder="Напишите ваш отзыв..." maxlength="70" rows="3"></textarea>
              </div>
              <button class="checkout-button" id="reviewSubmitBtn" style="width:100%;height:48px;margin-top:10px;">Отправить отзыв</button>
            </div>`;

          setTimeout(() => {
            const textarea = document.getElementById('reviewTextarea');
            const counter = document.getElementById('reviewCharCount');

            textarea?.addEventListener('input', () => {
              let val = textarea.value.replace(/[\r\n]/g, '');
              if (val !== textarea.value) textarea.value = val;
              if (counter) counter.textContent = `${val.length}/70`;
            });

            textarea?.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') e.preventDefault();
            });

            document.getElementById('reviewSubmitBtn')?.addEventListener('click', async () => {
              const text = textarea?.value.trim();
              if (!text) { alert('Напишите текст отзыва'); return; }
              const selectEl = document.getElementById('reviewOrderSelect');
              const orderId = selectEl?.value;
              const orderNum = selectEl?.options[selectEl.selectedIndex]?.dataset.num;
              if (!orderId) { alert('Выберите заказ'); return; }
              hapticMedium();
              const btn = document.getElementById('reviewSubmitBtn');
              if (btn) { btn.disabled = true; btn.textContent = 'Отправка...'; }
              try {
                const res = await fetch('https://gemstorm.up.railway.app/api/reviews', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    userId: userId,
                    userName: nickname,
                    photoUrl: photoUrl,
                    text: text,
                    orderId: orderId,
                    orderNumber: orderNum
                  })
                });
                if (res.ok) {
                  hapticLight();
                  showPage('reviews');
                } else {
                  alert('Ошибка при отправке');
                }
              } catch(e) { alert('Ошибка соединения'); }
              if (btn) { btn.disabled = false; btn.textContent = 'Отправить отзыв'; }
            });
          }, 0);
        });
      });
    } catch(e) {
      container.innerHTML = `<div class="review-empty">Ошибка загрузки заказов</div>`;
    }
  }

  async function hasUserReviewed() {
    const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
    if (!tgUser?.id) return false;
    
    try {
      const response = await fetch(`https://gemstorm.up.railway.app/api/reviews`);
      if (!response.ok) return false;
      const reviews = await response.json();
      return reviews.some(r => String(r.user_id) === String(tgUser.id));
    } catch(e) {
      console.error('Ошибка проверки отзывов:', e);
      return false;
    }
  }

  function showPage(pageId, skipHistoryAdd = false) {
    let currentPageId = null;
    for (const page of document.querySelectorAll(".page")) {
      if (page.classList.contains("active-page")) {
        currentPageId = page.id.replace("-page", "");
        break;
      }
    }
    if (currentPageId && currentPageId !== pageId && !skipHistoryAdd) {
      const lastInHistory = navigationHistory[navigationHistory.length - 1];
      if (lastInHistory !== currentPageId) { navigationHistory.push(currentPageId); }
    }
    if (pageId === "catalog") { navigationHistory = []; }
    if (isPromoMode) {
      isPromoMode = false;
      if (!['checkout', 'payment'].includes(pageId)) {
        appliedPromo = null;
      }
    }
    if (pageId !== "reviews") {
      const rf = document.getElementById("reviewsFixedAction");
      if (rf) rf.remove();
    }
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
    const targetPage = document.getElementById(pageId + "-page");
    if (targetPage) targetPage.classList.add("active-page");
    const checkoutBlock = document.getElementById("cartCheckoutFixed");
    if (pageId === "catalog") { renderCatalog(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "cart") { if (orderMode === "promo_deal") orderMode = "cart"; renderCartPage(); }
    if (pageId === "orders") { renderOrdersPage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "profile") { renderProfilePage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "checkout") { renderCheckoutForm(); }
    if (pageId === "payment") { renderPaymentPage(); }
    if (pageId === "filter") { if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "order-detail") { if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "reviews") { renderReviewsPage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "gifts") { renderGiftsPage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "write-review") { renderWriteReviewPage(); if (checkoutBlock) checkoutBlock.style.display = "none"; }
    if (pageId === "buy-promo") { renderBuyPromoPage(); }
    if (pageId === "checkout") { afterPaymentBackPage = orderMode === "promo_deal" ? "buy-promo" : "cart"; }
    
    const mainPages = ["catalog", "cart", "orders", "profile"];
    if (mainPages.includes(pageId)) {
      document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
      const activeBtn = document.querySelector(`.menu-item[data-page="${pageId}"]`);
      if (activeBtn) activeBtn.classList.add("active");
      const profileWrapper = document.getElementById("profileMenuWrapper");
      if (profileWrapper) {
        if (pageId === "profile") profileWrapper.classList.add("active");
        else profileWrapper.classList.remove("active");
      }
      saveCurrentPage(pageId);
      const wasOnProfile = currentPageId === "profile";
      if (wasOnProfile && mainPages.includes(pageId)) {
        const slider = document.getElementById("menuSlider");
        if (slider) {
          slider.style.transition = "none";
          slider.style.left = "calc(100%)";
          slider.style.opacity = "1";
          setTimeout(() => {
            slider.style.transition = "";
            updateMenuSlider(pageId);
          }, 20);
        } else {
          updateMenuSlider(pageId);
        }
      } else {
        updateMenuSlider(pageId);
      }
    }
    
    injectPageHeader();
    
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      if (pageId === "catalog") { tg.BackButton.hide(); } else { tg.BackButton.show(); }
    }
    window.scrollTo({ top: 0 });
  }

  function initBackButtonHandler() {
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      tg.BackButton.onClick(function() {
        if (navigationHistory.length > 0) { const previousPage = navigationHistory.pop(); showPage(previousPage, true); } else { showPage("catalog"); }
      });
    }
  }

  function parseTgInitData() {
  try {
    // Сначала пробуем через SDK
    const tg = window.Telegram?.WebApp;
    if (tg?.initDataUnsafe?.user?.id) {
      return tg.initDataUnsafe.user;
    }
    if (tg?.initData) {
      const params = new URLSearchParams(tg.initData);
      const userStr = params.get('user');
      if (userStr) return JSON.parse(decodeURIComponent(userStr));
    }

    // SDK нет — парсим hash напрямую из URL
    const hash = window.location.hash.slice(1); // убираем #
    if (hash) {
      const params = new URLSearchParams(hash);
      const userStr = params.get('user');
      if (userStr) {
        return JSON.parse(decodeURIComponent(userStr));
      }
    }

    return null;
  } catch(e) {
    return null;
  }
}

  function initApp() {
  // Парсим пользователя сразу при старте
  const parsedUser = parseTgInitData();
  if (parsedUser) {
    window.__tgUser = parsedUser;
  }
  // ... остальной твой код initApp без изменений
  loadCartFromLocalStorage();
  const tgU = window.__tgUser || window.Telegram?.WebApp?.initDataUnsafe?.user;
    if (tgU?.id) {
    fetch('https://gemstorm.up.railway.app/api/track-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: String(tgU.id),
        userName: tgU.first_name || null,
        userUsername: tgU.username || null,
        photoUrl: tgU.photo_url || null
      })
    }).catch(() => {});
  }
  const savedCheckout = localStorage.getItem('checkoutData');
  if (savedCheckout) {
    try {
      const parsed = JSON.parse(savedCheckout);
      checkoutData = { ...checkoutData, ...parsed };
    } catch(e) {}
  }
  const lastPage = getLastPage();
  showPage(lastPage);
  const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
  if (tgUser?.photo_url) {
    const avatar = document.getElementById("profileMenuAvatar");
    if (avatar) avatar.src = tgUser.photo_url;
  }

  const tg = window.Telegram?.WebApp;
  const startParam = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get("startapp");
  const userId = tg?.initDataUnsafe?.user?.id;

  if (startParam && startParam.startsWith("ref") && userId) {
    const referrerId = parseInt(startParam.replace("ref", ""));
    if (referrerId && referrerId !== userId) {
      fetch("https://gemstorm.up.railway.app/api/register-referral", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, referrerId })
      }).catch(() => {});
    }
  }
}

  (function() {
    const tg = window.Telegram?.WebApp;
    const user = tg?.initDataUnsafe?.user;
    const ADMIN_ID = 7509324385;
    if (user && user.id == ADMIN_ID) { window.location.href = "admin-panel.html"; }
  })();

  waitForTelegram(function() {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    initBackButtonHandler();
    tg.BackButton.hide();
  }
  initApp();
});

  document.addEventListener("click", function(e) {
    if (e.target.tagName !== "INPUT" && e.target.tagName !== "TEXTAREA" && e.target.tagName !== "SELECT") {
      if (e.target.closest('#codeActionBlock')) return;
      if (document.activeElement && (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA" || document.activeElement.tagName === "SELECT")) {
        document.activeElement.blur();
      }
    }
  });

  const openFilterBtn = document.getElementById("openFilterBtn");
  if (openFilterBtn) {
    openFilterBtn.addEventListener("click", () => { hapticLight(); renderFilterModal(); showPage("filter"); });
  }
  const searchInputEl = document.getElementById("searchInput");
  if (searchInputEl) {
    searchInputEl.addEventListener("input", (e) => { searchQuery = e.target.value; renderCatalog(); });
  }
  document.querySelectorAll(".menu-item").forEach(btn => {
    btn.addEventListener("click", () => { hapticLight(); showPage(btn.dataset.page); });
  });

  let lastSliderIndex = 0;

  function updateMenuSlider(pageId) {
    const slider = document.getElementById("menuSlider");
    if (!slider) return;
    const pages = ["catalog", "cart", "orders"];
    const index = pages.indexOf(pageId);
    if (index === -1) {
      slider.style.left = "calc(100%)";
      slider.style.width = "calc(33.33% - 3px)";
      slider.style.opacity = "0";
      return;
    }
    slider.style.opacity = "1";
    lastSliderIndex = index;
    if (index === 0) {
      slider.style.left = "3px";
      slider.style.width = "calc(33.33% - 3px)";
    } else if (index === 2) {
      slider.style.left = "calc(66.66%)";
      slider.style.width = "calc(33.33% - 3px)";
    } else {
      slider.style.left = "calc(33.33%)";
      slider.style.width = "calc(33.33%)";
    }
  }

  function renderFilterModal() {
    const container = document.getElementById("filterOptionsContainer");
    if (!container) return;
    const categories = ["Все категории", ...new Set(products.map(p => p.category))];
    container.innerHTML = categories.map(cat => `<div class="filter-row" data-filter="${cat}"><span class="filter-text">${cat}</span>${currentFilter === cat ? '<span class="check-mark">✓</span>' : ''}</div>`).join("");
    container.querySelectorAll(".filter-row").forEach(row => {
      row.addEventListener("click", () => {
        currentFilter = row.dataset.filter;
        renderCatalog();
        renderFilterModal();
        showPage("catalog");
      });
    });
  }

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
  renderFilterModal();
// Обработчик для двойной кнопки в хедере
document.addEventListener('click', function(e) {
  const doubleBtn = e.target.closest('#headerDoubleBtn');
  if (!doubleBtn) return;
  
  // Определяем, на какую иконку нажали
  const isRefresh = e.target.closest('#headerRefreshIcon');
  const isSupport = e.target.closest('#headerSupportIcon');
  
  if (isRefresh) {
    hapticLight(); // вибрация при обновлении
    refreshCurrentPage();
  } else if (isSupport) {
    hapticLight();
    window.open('https://t.me/GemStormHelp', '_blank');
  }
});

// Функция обновления
function refreshCurrentPage() {
  const activePage = document.querySelector('.page.active-page');
  if (!activePage) return;
  
  const pageId = activePage.id.replace('-page', '');
  
  switch(pageId) {
    case 'catalog':
      renderCatalog();
      break;
    case 'cart':
      renderCartPage();
      renderCheckoutBlock();
      break;
    case 'orders':
      loadUserOrders().then(() => renderOrdersPage());
      break;
    case 'profile':
      renderProfilePage();
      break;
    case 'reviews':
      loadReviewsList();
      break;
    case 'gifts':
      renderGiftsPage();
      break;
    case 'buy-promo':
      renderBuyPromoPage();
      break;
    case 'order-detail':
      loadUserOrders().then(() => {
        const orderId = activePage.dataset.currentOrderId;
        if (orderId) {
          const updatedOrder = orders.find(o => o.id == orderId);
          if (updatedOrder) showOrderDetail(updatedOrder);
        }
      });
      break;
    default:
      if (typeof window[`render${pageId.charAt(0).toUpperCase() + pageId.slice(1)}Page`] === 'function') {
        window[`render${pageId.charAt(0).toUpperCase() + pageId.slice(1)}Page`]();
      }
  }
}
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}

body {
  background: #121214;
  color: white;
}

/* Контейнер */
.container {
  padding: 16px;
  padding-bottom: 100px;
}

/* Заголовок */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 550;
  margin-bottom: 16px;
}

/* Поиск */
.search-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.search {
  flex: 1;
  height: 50px;
  background: #2a2a2d;
  border-radius: 36px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  color: #aaa;
}

.search input {
  background: none;
  border: none;
  outline: none;
  color: white;
  margin-left: 10px;
  width: 100%;
  font-size: 16px;
}

/* Кнопка фильтра */
.filter-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 1px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Карточки */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.card {
  border: 1px solid white;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  border-radius: 28px;
}

.card-body {
  padding: 8px;
}

.title {
  font-size: 19px;
  margin-bottom: 4px;
}

.price {
  font-size: 19px;
  font-weight: 600;
}

.old {
  color: gray;
  text-decoration: line-through;
  margin-left: 5px;
}

.btn {
  margin-top: 8px;
  height: 36px;
  border-radius: 36px;
  border: 1px solid #4da6ff;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #4da6ff;
  cursor: pointer;
}

.counter {
  justify-content: space-between;
  padding: 0 12px;
  background: rgba(77,166,255,0.2);
}

.heart {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* Нижнее меню */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 70px;
  background: #121214;
  border-top: 1px solid #333;
  border-radius: 18px 18px 0 0;
  display: flex;
}

.nav-item {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: gray;
}

.nav-item.active {
  color: #4da6ff;
}

/* Страницы */
.page {
  display: none;
}

.page.active {
  display: block;
}

/* Фильтр */
.filter-page div {
  padding: 14px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.filter-page .active {
  color: #4da6ff;
}
</style>
</head>

<body>

<!-- Каталог -->
<div class="page active" id="catalog">
  <div class="container">

    <div class="header">🛍 Каталог</div>

    <div class="search-row">
      <div class="search">
        🔍 <input placeholder="Найти товар по названию">
      </div>
      <div class="filter-btn" onclick="openFilter()">⚙️</div>
    </div>

    <div class="grid" id="products"></div>

  </div>
</div>

<!-- Фильтр -->
<div class="page" id="filter">
  <div class="container filter-page">
    <div class="header">⚙️ Фильтры</div>

    <div onclick="setCategory('all')" id="cat-all">✔ Все категории</div>
    <div onclick="setCategory('brawl')" id="cat-brawl">Brawl Stars</div>
    <div onclick="setCategory('clash')" id="cat-clash">Clash Royale</div>

  </div>
</div>

<!-- Товар -->
<div class="page" id="productPage">
  <div class="container" id="productContent"></div>
</div>

<!-- Меню -->
<div class="nav">
  <div class="nav-item active">🏪<br>Каталог</div>
  <div class="nav-item">🛒<br>Корзина</div>
  <div class="nav-item">❤️<br>Избранное</div>
  <div class="nav-item">👤<br>Профиль</div>
</div>

<script>
const data = [
  {
    id:1,
    title:"Brawl Pass",
    price:"769₽",
    old:"799₽",
    img:"https://storage.botpapa.me/files/7cd0ec40-456b-11f1-bef9-f1ec7a2c6e45.jpeg"
  },
  {
    id:2,
    title:"Brawl Pass Plus",
    price:"1 099₽",
    old:"1 169₽",
    img:"https://storage.botpapa.me/files/7643fb60-456b-11f1-bef9-f1ec7a2c6e45.jpeg"
  },
  {
    id:3,
    title:"Pro Pass",
    price:"2 129₽",
    old:"2 249₽",
    img:"https://storage.botpapa.me/files/e7f57440-4571-11f1-bef9-f1ec7a2c6e45.jpeg"
  },
  {
    id:4,
    title:"2000 Gems",
    price:"4 249₽",
    old:"4 449₽",
    img:"https://storage.botpapa.me/files/eb4ed870-4571-11f1-bef9-f1ec7a2c6e45.jpeg"
  }
];

let cart = {};
let fav = [];

function render(){
  const el = document.getElementById("products");
  el.innerHTML = "";

  data.forEach(p=>{
    const inCart = cart[p.id];

    el.innerHTML += `
    <div class="card" onclick="openProduct(${p.id})">

      <div class="heart" onclick="event.stopPropagation();toggleFav(${p.id})">
        ${fav.includes(p.id) ? "❤️" : "🤍"}
      </div>

      <img src="${p.img}">

      <div class="card-body">
        <div class="title">${p.title}</div>

        <div>
          <span class="price">${p.price}</span>
          <span class="old">${p.old}</span>
        </div>

        ${
          inCart
          ? `<div class="btn counter" onclick="event.stopPropagation()">
               <span onclick="dec(${p.id})">-</span>
               <span>${inCart}</span>
               <span onclick="inc(${p.id})">+</span>
             </div>`
          : `<div class="btn" onclick="event.stopPropagation();add(${p.id})">🛒 В корзину</div>`
        }

      </div>
    </div>
    `;
  });
}

function add(id){
  cart[id]=1;
  render();
}

function inc(id){
  alert("Данный товар недоступен в большем количестве");
}

function dec(id){
  delete cart[id];
  render();
}

function toggleFav(id){
  if(fav.includes(id)){
    fav = fav.filter(i=>i!==id);
  } else {
    fav.push(id);
  }
  render();
}

function openFilter(){
  showPage("filter");
}

function setCategory(c){
  showPage("catalog");
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openProduct(id){
  const p = data.find(x=>x.id===id);

  document.getElementById("productContent").innerHTML = `
    <img src="${p.img}" style="width:100%;border-radius:36px;margin-bottom:12px">

    <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:550">
      <div>${p.title}</div>
      <div>${p.price} <span class="old">${p.old}</span></div>
    </div>

    <hr style="margin:12px 0;border-color:#333">

    <div style="display:flex;justify-content:space-between">
      <span>Способ получения</span>
      <span>Вход в аккаунт</span>
    </div>

    <hr style="margin:12px 0;border-color:#333">

    <div style="font-size:20px;font-weight:550;margin-bottom:8px">Описание</div>
    <div style="color:#ccc">Описание товара...</div>
  `;

  showPage("productPage");
}

render();
</script>

</body>
</html>

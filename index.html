<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Магазин</title>
    <style>
        * {
            border-radius: 28px !important;
        }
        
        :root {
            --kloktun-front: 255, 255, 255;
            --kloktun-front-secondary: 128, 128, 128;
            --kloktun-background-body: 28, 28, 30;
            --kloktun-stroke: 50, 50, 52;
        }
        
        body {
            background-color: rgb(var(--kloktun-background-body));
            color: rgb(var(--kloktun-front));
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
        }
        
        .container {
            padding: 16px;
        }
        
        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .header-icon {
            width: 24px;
            height: 24px;
            color: #0A2FFF;
        }
        
        .title {
            font-size: 24px;
            font-weight: 500;
        }
        
        /* Поиск */
        .search-bar {
            background: rgb(50, 50, 52);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 16px;
            outline: none;
        }
        
        .search-input::placeholder {
            color: rgb(var(--kloktun-front-secondary));
        }
        
        /* Товар */
        .product-card {
            background: rgb(50, 50, 52);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .product-info h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #0A2FFF;
        }
        
        .buy-btn {
            background: #0A2FFF;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Нижнее меню */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgb(var(--kloktun-background-body));
            border-top: 1px solid rgb(var(--kloktun-stroke));
            display: flex;
            padding: 8px 16px;
            padding-bottom: 12px;
            justify-content: space-around;
        }
        
        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: rgb(var(--kloktun-front-secondary));
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        
        .menu-item.active {
            color: #0A2FFF;
        }
        
        .menu-icon {
            width: 24px;
            height: 24px;
        }
        
        /* Корзина */
        .cart-summary {
            margin-top: 20px;
            padding: 16px;
            background: rgb(50, 50, 52);
            border-radius: 16px;
            text-align: center;
        }
        
        .total-price {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .checkout-btn {
            background: #0A2FFF;
            border: none;
            color: white;
            padding: 14px;
            border-radius: 28px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .empty-cart {
            text-align: center;
            padding: 40px;
            color: rgb(var(--kloktun-front-secondary));
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка как в BotPapa -->

                </svg>
            </div>
            <div class="title">Каталог</div>
        </div>
        
        <!-- Поиск -->
        <div class="search-bar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="color: rgb(128,128,128)">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M11.5 2.75C10.3509 2.75 9.21312 2.97633 8.15152 3.41605C7.08992 3.85578 6.12533 4.5003 5.31282 5.31282C4.5003 6.12533 3.85578 7.08992 3.41605 8.15152C2.97633 9.21312 2.75 10.3509 2.75 11.5C2.75 12.6491 2.97633 13.7869 3.41605 14.8485C3.85578 15.9101 4.5003 16.8747 5.31282 17.6872C6.12533 18.4997 7.08992 19.1442 8.15152 19.5839C9.21312 20.0237 10.3509 20.25 11.5 20.25C13.8206 20.25 16.0462 19.3281 17.6872 17.6872C19.3281 16.0462 20.25 13.8206 20.25 11.5C20.25 9.17936 19.3281 6.95376 17.6872 5.31282C16.0462 3.67187 13.8206 2.75 11.5 2.75Z" fill="currentColor"/>
            </svg>
            <input type="text" class="search-input" placeholder="Найти товар" id="searchInput">
        </div>
        
        <!-- Список товаров -->
        <div id="products-list"></div>
        
        <!-- Корзина -->
        <div id="cart-section" style="display: none;">
            <div id="cart-items"></div>
            <div class="cart-summary" id="cart-summary">
                <div>Общая стоимость</div>
                <div class="total-price" id="total-price">0 ₽</div>
                <button class="checkout-btn" id="checkout-btn">Оформить заказ</button>
            </div>
        </div>
    </div>
    
    <!-- Нижнее меню (иконки из BotPapa) -->
    <div class="bottom-menu">
        <div class="menu-item active" data-page="catalog">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M7.43499 1.25C6.86499 1.25 6.38199 1.25 5.98199 1.291C5.55599 1.335 5.16199 1.431 4.79099 1.661C4.41999 1.891 4.15699 2.2 3.92699 2.561C3.71199 2.901 3.49499 3.333 3.23999 3.843L3.22399 3.876L3.19699 3.936L1.79399 7.483C1.62699 7.906 1.44199 8.433 1.38699 8.971C1.33199 9.523 1.40799 10.154 1.83999 10.701C2.09726 11.0278 2.42531 11.292 2.79945 11.4737C3.17359 11.6554 3.58407 11.7499 3.99999 11.75C4.78799 11.75 5.49899 11.419 5.99999 10.887C6.25665 11.1599 6.56655 11.3773 6.91055 11.5258C7.25455 11.6742 7.62534 11.7505 7.99999 11.75C8.78799 11.75 9.49899 11.419 9.99999 10.887C10.2566 11.1599 10.5666 11.3773 10.9106 11.5258C11.2546 11.6742 11.6253 11.7505 12 11.75C12.788 11.75 13.499 11.419 14 10.887C14.2566 11.1599 14.5666 11.3773 14.9106 11.5258C15.2546 11.6742 15.6253 11.7505 16 11.75C16.788 11.75 17.499 11.419 18 10.887C18.2566 11.1599 18.5666 11.3773 18.9106 11.5258C19.2546 11.6742 19.6253 11.7505 20 11.75C20.877 11.75 21.658 11.339 22.16 10.702C22.592 10.154 22.668 9.522 22.613 8.972C22.559 8.432 22.373 7.906 22.207 7.483L20.803 3.935L20.776 3.875L20.76 3.843C20.505 3.333 20.289 2.9 20.073 2.561C19.843 2.2 19.582 1.891 19.21 1.661C18.838 1.431 18.445 1.335 18.019 1.291C17.619 1.25 17.135 1.25 16.565 1.25H7.43499Z" fill="currentColor"/>
                </svg>
            </div>
            <span>Каталог</span>
        </div>
        <div class="menu-item" data-page="cart">
            <div class="menu-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M2.249 2.29199C2.06123 2.22595 1.85491 2.23721 1.67544 2.32329C1.49596 2.40937 1.35804 2.56322 1.292 2.75099C1.22596 2.93876 1.23722 3.14508 1.3233 3.32455C1.40938 3.50403 1.56323 3.64195 1.751 3.70799L2.013 3.79899C2.68 4.03399 3.119 4.18899 3.442 4.34799C3.745 4.49699 3.879 4.61799 3.967 4.74599C4.057 4.87799 4.127 5.05999 4.167 5.42299C4.207 5.80299 4.208 6.29799 4.208 7.03799V9.75999C4.208 11.213 4.222 12.26 4.359 13.06C4.505 13.914 4.797 14.526 5.344 15.102C5.938 15.729 6.69 16.002 7.587 16.128C8.445 16.25 9.535 16.25 10.88 16.25H16.286C17.028 16.25 17.652 16.25 18.156 16.188C18.693 16.123 19.181 15.979 19.608 15.632C20.034 15.284 20.273 14.835 20.445 14.323C20.608 13.841 20.734 13.23 20.884 12.503L21.392 10.034L21.394 10.029L21.404 9.97699C21.569 9.15199 21.707 8.45799 21.742 7.89999C21.778 7.31399 21.711 6.73599 21.329 6.23999C21.094 5.93399 20.764 5.76099 20.463 5.65599C20.1378 5.54906 19.8018 5.47863 19.461 5.44599C18.774 5.36999 17.939 5.36999 17.121 5.36999H5.667C5.66399 5.33396 5.66066 5.29796 5.657 5.26199C5.603 4.76499 5.487 4.31199 5.204 3.89999C4.92 3.48399 4.542 3.21799 4.102 3.00099C3.69 2.79899 3.166 2.61499 2.549 2.39799L2.249 2.29199Z" fill="currentColor"/>
                </svg>
            </div>
            <span>Корзина</span>
        </div>
        <div class="menu-item" data-page="favorite">
            <div class="menu-icon">
                <svg viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 1.3335C7.16014 1.3335 6.35469 1.66713 5.76082 2.26099C5.16696 2.85486 4.83333 3.66031 4.83333 4.50016C4.83333 5.34001 5.16696 6.14547 5.76082 6.73933C6.35469 7.3332 7.16014 7.66683 8 7.66683C8.83985 7.66683 9.6453 7.3332 10.2392 6.73933C10.833 6.14547 11.1667 5.34001 11.1667 4.50016C11.1667 3.66031 10.833 2.85486 10.2392 2.26099C9.6453 1.66713 8.83985 1.3335 8 1.3335Z" fill="currentColor"/>
                </svg>
            </div>
            <span>Избранное</span>
        </div>
        <div class="menu-item" data-page="profile">
            <div class="menu-icon">
                <svg viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 1.3335C7.16014 1.3335 6.35469 1.66713 5.76082 2.26099C5.16696 2.85486 4.83333 3.66031 4.83333 4.50016C4.83333 5.34001 5.16696 6.14547 5.76082 6.73933C6.35469 7.3332 7.16014 7.66683 8 7.66683C8.83985 7.66683 9.6453 7.3332 10.2392 6.73933C10.833 6.14547 11.1667 5.34001 11.1667 4.50016C11.1667 3.66031 10.833 2.85486 10.2392 2.26099C9.6453 1.66713 8.83985 1.3335 8 1.3335Z" fill="currentColor"/>
                </svg>
            </div>
            <span>Профиль</span>
        </div>
    </div>

    <script>
        // Ваши товары (меняйте здесь)
        const products = [
            { id: 1, name: "Товар 1", price: 769 },
            { id: 2, name: "Товар 2", price: 1299 },
            { id: 3, name: "Товар 3", price: 499 },
            { id: 4, name: "Товар 4", price: 2499 }
        ];
        
        let cart = [];
        
        // Функции
        function renderProducts(filter = '') {
            const container = document.getElementById('products-list');
            const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-cart">Товары не найдены</div>';
                return;
            }
            
            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="product-price">${p.price} ₽</div>
                    </div>
                    <button class="buy-btn" onclick="addToCart(${p.id})">Купить</button>
                </div>
            `).join('');
        }
        
        function renderCart() {
            const container = document.getElementById('cart-items');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
            } else {
                container.innerHTML = cart.map((item, idx) => `
                    <div class="product-card">
                        <div class="product-info">
                            <h3>${item.name}</h3>
                            <div class="product-price">${item.price} ₽</div>
                        </div>
                        <button class="buy-btn" onclick="removeFromCart(${idx})">Удалить</button>
                    </div>
                `).join('');
            }
            
            document.getElementById('total-price').innerHTML = total + ' ₽';
        }
        
        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                cart.push({ ...product });
                renderCart();
                if (document.querySelector('[data-page="cart"]').classList.contains('active')) {
                    renderCart();
                }
                alert(`Добавлен: ${product.name}`);
            }
        };
        
        window.removeFromCart = function(idx) {
            cart.splice(idx, 1);
            renderCart();
        };
        
        // Поиск
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderProducts(e.target.value);
        });
        
        // Переключение страниц
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                
                // Обновляем активный класс
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                
                // Показываем нужную секцию
                if (page === 'catalog') {
                    document.getElementById('products-list').style.display = 'block';
                    document.getElementById('cart-section').style.display = 'none';
                    document.querySelector('.search-bar').style.display = 'flex';
                    renderProducts(document.getElementById('searchInput').value);
                } else if (page === 'cart') {
                    document.getElementById('products-list').style.display = 'none';
                    document.getElementById('cart-section').style.display = 'block';
                    document.querySelector('.search-bar').style.display = 'none';
                    renderCart();
                } else {
                    alert(`Страница "${page}" в разработке`);
                }
            });
        });
        
        // Оформление заказа
        document.getElementById('checkout-btn').addEventListener('click', () => {
            if (cart.length === 0) {
                alert('Корзина пуста');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            alert(`Заказ оформлен!\n\nТовары:\n${cart.map(p => p.name).join('\n')}\n\nИтого: ${total} ₽`);
            cart = [];
            renderCart();
        });
        
        // Инициализация
        renderProducts();
    </script>
</body>
</html>

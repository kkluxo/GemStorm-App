<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  
  <!-- ОБЯЗАТЕЛЬНО: Подключаем официальный скрипт Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <meta name="theme-color" content="#171719">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <title>StarGate Store — Каталог</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --brand-blue: #4BB7EF;
      --search-bg: #323234;
      --card-border: #2B2B2D;
      --counter-bg: #202B32;
    }

    body {
      background-color: #171719;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding-bottom: 94px;
    }

    .page {
      display: none;
      padding: 20px 14px 0 14px;
      max-width: 600px;
      margin: 0 auto;
      animation: fadeIn 0.2s ease;
    }

    .page.active-page {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* Нижнее меню */
    .bottom-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #171719;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 12px 14px 12px;
      z-index: 1000;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.1s;
      flex: 1;
      padding: 6px 0 2px 0;
    }

    .menu-icon {
      width: 28px;
      height: 28px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .menu-item.active .menu-icon {
      opacity: 1;
      filter: brightness(0) saturate(100%) invert(68%) sepia(48%) saturate(1162%) hue-rotate(165deg) brightness(96%) contrast(92%);
    }

    .menu-label {
      font-size: 11px;
      font-weight: 500;
      color: #9e9e9e;
    }

    .menu-item.active .menu-label {
      color: #4BB7EF;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 550;
    }

    /* Поиск + фильтр */
    .search-section {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search-bar {
      flex: 1;
      background: #323234;
      height: 50px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      cursor: text;
    }

    .search-input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 17px;
      font-weight: 400;
      width: 100%;
    }

    .search-input::placeholder {
      color: #8e8e93;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid #323234;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Карточки товаров */
    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      margin-bottom: 20px;
    }

    .product-card {
      background: #171719;
      border: 1px solid #2B2B2D;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: 0.1s linear;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 28px;
      display: block;
    }

    .card-info {
      padding: 8px;
    }

    .product-title {
      font-size: 17px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
      margin: 6px 0 10px 0;
    }

    .current-price {
      font-size: 17px;
      font-weight: 600;
      color: white;
    }

    .old-price {
      font-size: 14px;
      color: #8e8e93;
      text-decoration: line-through;
    }

    /* Кнопки */
    .card-action-btn {
      width: 100%;
      height: 36px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: 0.1s;
    }

    .cart-add-btn {
      background: transparent;
      border: 1px solid #4BB7EF;
      color: #4BB7EF;
    }

    .counter-btn {
      background: #202B32;
      border: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
    }

    .counter-minus, .counter-plus {
      font-size: 20px;
      font-weight: bold;
      background: none;
      border: none;
      color: #4BB7EF;
      cursor: pointer;
      width: 28px;
    }

    .counter-value {
      font-size: 16px;
      font-weight: 600;
      color: white;
    }

    /* Сердечко избранного */
    .favorite-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
    }

    /* Страница фильтров */
    .filter-options {
      margin-top: 20px;
      background: rgba(75,183,239,0.08);
      border-radius: 24px;
      padding: 8px 0;
    }

    .filter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }

    .filter-row:last-child {
      border-bottom: none;
    }

    .filter-text {
      font-size: 17px;
      font-weight: 500;
    }

    .check-mark {
      font-size: 20px;
      color: #4BB7EF;
      font-weight: 600;
    }

    /* Детальная страница */
    .product-detail-img {
      width: 100%;
      border-radius: 36px;
      margin-bottom: 20px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .detail-name {
      font-size: 20px;
      font-weight: 550;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 20px 0;
    }

    .delivery-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 17px;
    }

    .desc-title {
      font-size: 20px;
      font-weight: 550;
      margin-bottom: 12px;
    }

    .desc-text {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.4;
      color: #aeaeb2;
    }

    .sticky-bar {
      position: sticky;
      bottom: 94px;
      background: #171719;
      border-radius: 60px;
      padding: 10px 16px;
      display: flex;
      gap: 12px;
      margin: 20px 0 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .detail-cart-btn {
      flex: 2;
      background: #4BB7EF;
      border: none;
      border-radius: 40px;
      height: 48px;
      color: #171719;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .detail-counter-mode {
      flex: 2;
      background: #202B32;
      border-radius: 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      height: 48px;
    }

    .detail-fav {
      width: 48px;
      height: 48px;
      border-radius: 60px;
      background: rgba(220, 38, 38, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      margin-top: 50px;
      color: #8e8e93;
      font-size: 17px;
    }

    .cart-item {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .cart-img {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div id="catalog-page" class="page active-page">
    <div class="header-row">
      <div class="page-title">🛒 Каталог</div>
    </div>
    <div class="search-section">
      <div class="search-bar">
        <span style="font-size:18px">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Найти товар">
      </div>
      <div class="filter-btn" id="openFilterBtn">
        <span style="font-size:22px">⚙️</span>
      </div>
    </div>
    <div id="catalogGrid" class="products-grid"></div>
  </div>

  <div id="cart-page" class="page">
    <div class="header-row"><div class="page-title">🛒 Корзина</div></div>
    <div id="cartItemsList"></div>
  </div>

  <div id="favorites-page" class="page">
    <div class="header-row"><div class="page-title">❤️ Избранное</div></div>
    <div id="favoritesList"></div>
  </div>

  <div id="profile-page" class="page">
    <div class="header-row"><div class="page-title">👤 Профиль</div></div>
    <div class="empty-state">Ваш профиль: вход по аккаунту Telegram</div>
  </div>

  <div id="filter-page" class="page">
    <div class="header-row"><div class="page-title">⚙️ Фильтры</div></div>
    <div class="filter-options" id="filterOptionsContainer"></div>
  </div>

  <div id="detail-page" class="page"></div>

  <div class="bottom-menu">
    <button class="menu-item" data-page="catalog">
      <div class="menu-icon">🛍️</div>
      <span class="menu-label">Каталог</span>
    </button>
    <button class="menu-item" data-page="cart">
      <div class="menu-icon">🛒</div>
      <span class="menu-label">Корзина</span>
    </button>
    <button class="menu-item" data-page="favorites">
      <div class="menu-icon">❤️</div>
      <span class="menu-label">Избранное</span>
    </button>
    <button class="menu-item" data-page="profile">
      <div class="menu-icon">👤</div>
      <span class="menu-label">Профиль</span>
    </button>
  </div>

  <script>
    // Инициализация Telegram WebApp с отключением вертикальных свайпов
    (function() {
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // КЛЮЧЕВОЙ МЕТОД: отключаем закрытие свайпом вниз на iOS
        if (typeof tg.disableVerticalSwipes === 'function') {
          tg.disableVerticalSwipes();
          console.log('Vertical swipes disabled');
        } else {
          console.log('disableVerticalSwipes not available');
        }
        
        // Устанавливаем цвет шапки в тон приложения
        try {
          tg.setHeaderColor('#171719');
          tg.setBackgroundColor('#171719');
        } catch(e) {
          console.log('setHeaderColor error');
        }
        
        document.body.style.backgroundColor = '#171719';
      } else {
        console.log('Telegram WebApp not detected');
      }
    })();

    // Товары
    const products = [
      { id: 1, name: "Brawl Pass", price: 769, oldPrice: 799, image: "https://storage.botpapa.me/files/7cd0ec40-456b-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 2, name: "Brawl Pass Plus", price: 1099, oldPrice: 1169, image: "https://storage.botpapa.me/files/7643fb60-456b-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 3, name: "Pro Pass", price: 2129, oldPrice: 2249, image: "https://storage.botpapa.me/files/e7f57440-4571-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" },
      { id: 4, name: "2000 Gems", price: 4249, oldPrice: 4449, image: "https://storage.botpapa.me/files/eb4ed870-4571-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" }
    ];
    
    let cart = {};
    let favorites = new Set();
    let currentFilter = "Все категории";
    let searchQuery = "";

    function formatPrice(p) { 
      return p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + "₽"; 
    }

    // Рендер кнопки для карточки
    function renderCartButton(productId) {
      const qty = cart[productId] || 0;
      if (qty > 0) {
        return `<div class="card-action-btn counter-btn" data-id="${productId}">
          <span class="counter-minus">−</span>
          <span class="counter-value">${qty}</span>
          <span class="counter-plus">+</span>
        </div>`;
      } else {
        return `<div class="card-action-btn cart-add-btn" data-id="${productId}">
          🛒 В корзину
        </div>`;
      }
    }

    // Обновление только конкретной карточки (без моргания!)
    function updateSingleCard(productId) {
      const card = document.querySelector(`.product-card[data-id="${productId}"]`);
      if (!card) return;
      const product = products.find(p => p.id === productId);
      if (!product) return;
      
      // Обновляем кнопку
      const btnContainer = card.querySelector('.card-info > div:last-child');
      if (btnContainer) {
        btnContainer.outerHTML = renderCartButton(productId);
      }
      
      // Обновляем сердечко
      const heartSpan = card.querySelector('.favorite-icon');
      if (heartSpan) {
        if (favorites.has(productId)) {
          heartSpan.innerHTML = '❤️';
          heartSpan.style.filter = 'drop-shadow(0 0 2px #ff3b30)';
        } else {
          heartSpan.innerHTML = '🤍';
          heartSpan.style.filter = 'none';
        }
      }
      
      // Привязываем события к новым кнопкам
      attachCardEvents(card, productId);
    }
    
    function attachCardEvents(card, productId) {
      // Кнопка избранного
      const favBtn = card.querySelector('.favorite-icon');
      if (favBtn) {
        favBtn.onclick = (e) => {
          e.stopPropagation();
          toggleFavorite(productId);
        };
      }
      
      // Кнопка добавления в корзину / счетчик
      const actionBtn = card.querySelector('.card-action-btn');
      if (actionBtn) {
        if (actionBtn.classList.contains('cart-add-btn')) {
          actionBtn.onclick = (e) => {
            e.stopPropagation();
            handleCartAction(productId, true);
          };
        } else if (actionBtn.classList.contains('counter-btn')) {
          const minus = actionBtn.querySelector('.counter-minus');
          const plus = actionBtn.querySelector('.counter-plus');
          if (minus) minus.onclick = (e) => { e.stopPropagation(); handleCartAction(productId, false); };
          if (plus) plus.onclick = (e) => { e.stopPropagation(); alert("Данный товар недоступен к покупке в количестве более 1"); };
        }
      }
    }

    function renderCatalog() {
      let filtered = products.filter(p => currentFilter === "Все категории" || p.category === currentFilter);
      if (searchQuery.trim()) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      }
      const grid = document.getElementById("catalogGrid");
      if (!grid) return;
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #8e8e93;">Товары не найдены</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(p => `
        <div class="product-card" data-id="${p.id}">
          <img class="card-img" src="${p.image}" alt="${p.name}" loading="lazy">
          <div class="favorite-icon">${favorites.has(p.id) ? '❤️' : '🤍'}</div>
          <div class="card-info">
            <div class="product-title">${p.name}</div>
            <div class="price-row">
              <span class="current-price">${formatPrice(p.price)}</span>
              <span class="old-price">${formatPrice(p.oldPrice)}</span>
            </div>
            ${renderCartButton(p.id)}
          </div>
        </div>
      `).join("");
      
      // Привязываем события ко всем карточкам
      document.querySelectorAll('.product-card').forEach(card => {
        const cardId = parseInt(card.dataset.id);
        
        // Клик по карточке (открыть детали)
        card.onclick = (e) => {
          if (!e.target.closest('.card-action-btn') && !e.target.closest('.favorite-icon')) {
            renderDetailPage(cardId);
            showPage('detail');
          }
        };
        
        attachCardEvents(card, cardId);
      });
    }

    function handleCartAction(pid, isIncrement = true) {
      if (isIncrement) {
        if (cart[pid] && cart[pid] >= 1) {
          alert("Данный товар недоступен к покупке в количестве более 1");
          return;
        }
        cart[pid] = (cart[pid] || 0) + 1;
      } else {
        if (cart[pid] === 1) delete cart[pid];
        else if (cart[pid] > 0) cart[pid]--;
      }
      // Обновляем только одну карточку (без перерисовки всего каталога)
      updateSingleCard(pid);
      renderCartPage();
      if (document.getElementById("detail-page").classList.contains("active-page")) {
        renderDetailPage(pid);
      }
    }
    
    function renderCartPage() {
      const container = document.getElementById("cartItemsList");
      if (!container) return;
      const items = Object.entries(cart);
      if (items.length === 0) { 
        container.innerHTML = '<div class="empty-state">Корзина пуста 🛒</div>'; 
        return; 
      }
      let html = '';
      for (let [id, quantity] of items) {
        const prod = products.find(p => p.id == id);
        if(!prod) continue;
        html += `<div class="cart-item">
          <img class="cart-img" src="${prod.image}">
          <div>
            <div style="font-weight:500">${prod.name}</div>
            <div style="color:#4BB7EF">${formatPrice(prod.price)} x ${quantity}</div>
          </div>
        </div>`;
      }
      container.innerHTML = html;
    }

    function renderFavPage() {
      const container = document.getElementById("favoritesList");
      if (!container) return;
      const favProds = products.filter(p => favorites.has(p.id));
      if (favProds.length === 0) { 
        container.innerHTML = '<div class="empty-state">Нет избранных товаров 💔</div>'; 
        return; 
      }
      container.innerHTML = favProds.map(p => `
        <div class="cart-item">
          <img class="cart-img" src="${p.image}">
          <div>
            <div style="font-weight:500">${p.name}</div>
            <div style="color:#4BB7EF">${formatPrice(p.price)}</div>
          </div>
        </div>
      `).join("");
    }

    function toggleFavorite(pid) {
      if (favorites.has(pid)) favorites.delete(pid);
      else favorites.add(pid);
      updateSingleCard(pid);
      renderFavPage();
      if (document.getElementById("detail-page").classList.contains("active-page")) {
        renderDetailPage(pid);
      }
    }

    function renderDetailPage(prodId) {
      const prod = products.find(p => p.id === prodId);
      if (!prod) return;
      const qty = cart[prod.id] || 0;
      const isFav = favorites.has(prod.id);
      const detailHtml = `
        <img class="product-detail-img" src="${prod.image}">
        <div class="detail-header">
          <div class="detail-name">${prod.name}</div>
          <div><span class="current-price">${formatPrice(prod.price)}</span> <span class="old-price">${formatPrice(prod.oldPrice)}</span></div>
        </div>
        <div class="divider"></div>
        <div class="delivery-row"><span>Способ получения</span><span>Вход в аккаунт</span></div>
        <div class="divider"></div>
        <div class="desc-title">Описание</div>
        <div class="desc-text">Цифровой товар для Brawl Stars / Clash Royale. Мгновенная доставка после оплаты. Автоматическая выдача на указанный ID.</div>
        <div class="sticky-bar">
          ${qty > 0 ? 
            `<div class="detail-counter-mode">
              <span class="counter-minus" data-id="${prod.id}">−</span>
              <span class="counter-value">${qty}</span>
              <span class="counter-plus" data-id="${prod.id}">+</span>
            </div>` : 
            `<button class="detail-cart-btn" id="detailAddCartBtn">🛒 В корзину</button>`
          }
          <div class="detail-fav" data-id="${prod.id}">${isFav ? '❤️' : '🤍'}</div>
        </div>
      `;
      const detailPage = document.getElementById("detail-page");
      detailPage.innerHTML = detailHtml;
      
      const addBtn = document.getElementById("detailAddCartBtn");
      if (addBtn) addBtn.onclick = () => { handleCartAction(prod.id, true); };
      
      document.querySelectorAll(".counter-minus").forEach(el => {
        el.onclick = (e) => { e.stopPropagation(); handleCartAction(parseInt(el.dataset.id), false); };
      });
      document.querySelectorAll(".counter-plus").forEach(el => {
        el.onclick = (e) => { e.stopPropagation(); alert("Данный товар недоступен к покупке в количестве более 1"); };
      });
      
      const favDiv = detailPage.querySelector(".detail-fav");
      if(favDiv) favDiv.onclick = () => { toggleFavorite(prod.id); };
    }

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
      const targetPage = document.getElementById(pageId + "-page");
      if (targetPage) targetPage.classList.add("active-page");
      if (pageId === "catalog") renderCatalog();
      if (pageId === "cart") renderCartPage();
      if (pageId === "favorites") renderFavPage();
      document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
      const activeBtn = document.querySelector(`.menu-item[data-page="${pageId}"]`);
      if (activeBtn) activeBtn.classList.add("active");
      window.scrollTo({ top: 0 });
    }

    function renderFilterModal() {
      const cats = ["Все категории", "Brawl Stars", "Clash Royale"];
      const container = document.getElementById("filterOptionsContainer");
      container.innerHTML = cats.map(cat => `
        <div class="filter-row" data-filter="${cat}">
          <span class="filter-text">${cat}</span>
          <span class="check-mark">${currentFilter === cat ? '✓' : ''}</span>
        </div>
      `).join("");
      
      document.querySelectorAll(".filter-row").forEach(row => {
        row.onclick = () => {
          currentFilter = row.dataset.filter;
          renderFilterModal();
          renderCatalog();
          showPage("catalog");
        };
      });
    }

    // Обработчики
    document.getElementById("openFilterBtn").onclick = () => { renderFilterModal(); showPage("filter"); };
    document.getElementById("searchInput").oninput = (e) => { searchQuery = e.target.value; renderCatalog(); };
    
    document.querySelectorAll(".menu-item").forEach(btn => {
      btn.onclick = () => showPage(btn.dataset.page);
    });

    // Старт
    renderCatalog();
    renderCartPage();
    renderFavPage();
    renderFilterModal();
  </script>
</body>
</html>

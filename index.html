<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BotPapa Shop</title>
    <style>
        * {
            border-radius: 28px !important;
        }
        
        :root {
            --kloktun-front: 255, 255, 255;
            --kloktun-front-secondary: 128, 128, 128;
            --kloktun-background-body: 28, 28, 30;
            --kloktun-stroke: 50, 50, 52;
        }
        
        body {
            background-color: rgb(var(--kloktun-background-body));
            color: rgb(var(--kloktun-front));
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
        }
        
        .container {
            padding: 16px;
        }
        
        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .header-icon {
            width: 24px;
            height: 24px;
            color: #0A2FFF;
        }
        
        .title {
            font-size: 24px;
            font-weight: 500;
        }
        
        /* Поиск */
        .search-bar {
            background: rgb(50, 50, 52);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 16px;
            outline: none;
        }
        
        .search-input::placeholder {
            color: rgb(var(--kloktun-front-secondary));
        }
        
        /* Товар */
        .product-card {
            background: rgb(50, 50, 52);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .product-info h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #0A2FFF;
        }
        
        .old-price {
            font-size: 14px;
            color: rgb(var(--kloktun-front-secondary));
            text-decoration: line-through;
            margin-left: 8px;
        }
        
        .buy-btn {
            background: #0A2FFF;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Нижнее меню */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgb(var(--kloktun-background-body));
            border-top: 1px solid rgb(var(--kloktun-stroke));
            display: flex;
            padding: 8px 16px;
            padding-bottom: 12px;
            justify-content: space-around;
        }
        
        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #aeaeae;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        
        .menu-item.active {
            color: #0A2FFF;
        }
        
        .menu-icon {
            width: 24px;
            height: 24px;
        }
        
        .menu-icon svg {
            width: 100%;
            height: 100%;
        }
        
        /* Корзина */
        .cart-summary {
            margin-top: 20px;
            padding: 16px;
            background: rgb(50, 50, 52);
            border-radius: 16px;
            text-align: center;
        }
        
        .total-price {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .checkout-btn {
            background: #0A2FFF;
            border: none;
            color: white;
            padding: 14px;
            border-radius: 28px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .empty-cart {
            text-align: center;
            padding: 40px;
            color: rgb(var(--kloktun-front-secondary));
        }
        
        .cart-item {
            background: rgb(50, 50, 52);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .remove-btn {
            background: #ff3b30;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

    <script>
        // Товары (меняй здесь)
        const products = [
            { id: 1, name: "Brawl Pass", price: 769, oldPrice: 799 },
            { id: 2, name: "Brawl Pass Plus", price: 1099, oldPrice: null },
            { id: 3, name: "Pro Pass", price: 150, oldPrice: null, badge: "Акция" },
            { id: 4, name: "Товар 4", price: 2499, oldPrice: null }
        ];
        
        let cart = [];
        
        function renderProducts(filter = '') {
            const container = document.getElementById('products-list');
            const filtered = products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-cart">Товары не найдены</div>';
                return;
            }
            
            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-info">
                        <h3>${p.name} ${p.badge ? `<span style="color:#ff9f0a; font-size:12px;">${p.badge}</span>` : ''}</h3>
                        <div>
                            <span class="product-price">${p.price} ₽</span>
                            ${p.oldPrice ? `<span class="old-price">${p.oldPrice} ₽</span>` : ''}
                        </div>
                    </div>
                    <button class="buy-btn" onclick="addToCart(${p.id})">В корзину</button>
                </div>
            `).join('');
        }
        
        function renderCart() {
            const container = document.getElementById('cart-items');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
            } else {
                container.innerHTML = cart.map((item, idx) => `
                    <div class="cart-item">
                        <div class="product-info">
                            <h3>${item.name}</h3>
                            <div class="product-price">${item.price} ₽</div>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${idx})">Удалить</button>
                    </div>
                `).join('');
            }
            
            document.getElementById('total-price').innerHTML = total + ' ₽';
        }
        
        window.addToCart = function(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                cart.push({ ...product });
                renderCart();
                alert(`Добавлен: ${product.name}`);
            }
        };
        
        window.removeFromCart = function(idx) {
            cart.splice(idx, 1);
            renderCart();
        };
        
        // Поиск
        document.getElementById('searchInput').addEventListener('input', (e) => {
            if (document.querySelector('[data-page="catalog"]').classList.contains('active')) {
                renderProducts(e.target.value);
            }
        });
        
        // Переключение страниц
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                
                if (page === 'catalog') {
                    document.getElementById('products-list').style.display = 'block';
                    document.getElementById('cart-section').style.display = 'none';
                    document.querySelector('.search-bar').style.display = 'flex';
                    renderProducts(document.getElementById('searchInput').value);
                } else if (page === 'cart') {
                    document.getElementById('products-list').style.display = 'none';
                    document.getElementById('cart-section').style.display = 'block';
                    document.querySelector('.search-bar').style.display = 'none';
                    renderCart();
                } else {
                    alert(`Страница "${page}" в разработке`);
                }
            });
        });
        
        // Оформление заказа
        document.getElementById('checkout-btn').addEventListener('click', () => {
            if (cart.length === 0) {
                alert('Корзина пуста');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            alert(`Заказ оформлен!\n\nТовары:\n${cart.map(p => p.name).join('\n')}\n\nИтого: ${total} ₽`);
            cart = [];
            renderCart();
        });
        
        // Инициализация
        renderProducts();
    </script>
</body>
</html>

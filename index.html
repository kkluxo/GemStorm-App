<!-- ⚡ РЕДИРЕКТ ДЛЯ АДМИНА ⚡ -->
<script>
  const ADMIN_ID = 7509324385;
  const tg = window.Telegram?.WebApp;
  const user = tg?.initDataUnsafe?.user;
  
  if (user && user.id == ADMIN_ID) {
    // Админ сразу переходит на админ-панель
    window.location.href = 'admin-panel.html';
  }
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <meta name="theme-color" content="#171719">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Geltan Store — Каталог</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tg-theme-bg-color: #171719 !important;
      --brand-blue: #4cb4e9;
    }

    body {
      background-color: #171719;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding-bottom: 130px;
    }

    .page {
      display: none;
      padding: 16px 14px 0 14px;
      max-width: 600px;
      margin: 0 auto;
    }

    .page.active-page {
      display: block;
    }

    /* Нижнее меню */
    .bottom-menu {
      position: fixed;
      bottom: 18px;
      left: 18px;
      right: 18px;
      background: #202022f9;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 60px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 5px 12px 8px 12px;
      z-index: 1001;
      max-width: 600px;
      margin: 0 auto;
      width: calc(100% - 36px);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.1s;
      flex: 1;
      padding: 5px 0 2px 0;
    }

    .menu-icon {
      width: 28px;
      height: 28px;
      transition: all 0.1s;
    }

    .menu-icon-inactive { display: block; }
    .menu-item.active .menu-icon-inactive { display: none; }
    .menu-icon-active { display: none; }
    .menu-item.active .menu-icon-active { display: block; }

    .menu-label {
      font-size: 11px;
      font-weight: 500;
      color: #9e9e9e;
    }
    .menu-item.active .menu-label { color: #4cb4e9; }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header-icon-img {
      width: 26px;
      height: 26px;
      object-fit: contain;
    }
    .page-title { font-size: 25px; font-weight: 500; }

    .search-section {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: center;
    }
    .search-bar {
      flex: 1;
      background: #303032;
      height: 46px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }
    .search-input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 18px;
      font-weight: 500;
      width: 100%;
    }
    .search-input::placeholder { color: #a1a1aa; font-weight: 500; font-size: 16px; }
    .filter-btn {
      background: transparent;
      border: 1px solid #323234;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .filter-icon { width: 24px; height: 24px; }

    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      margin-bottom: 20px;
    }
    .product-card {
      background: #202022;
      border: 1px solid #2B2B2D;
      border-radius: 42px 42px 28px 28px;
      overflow: hidden;
      cursor: pointer;
    }
    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      padding: 7px;
      border-radius: 43px;
    }
    .card-info { padding: 0 8px 8px 8px; }
    .product-title {
      font-size: 18px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .price-row { display: flex; align-items: baseline; gap: 8px; margin: 6px 0 10px 0; }
    .current-price { font-size: 19px; font-weight: 500; color: white; }
    .old-price { font-size: 16px; color: #9ca3af; text-decoration: line-through; }
    .card-action-btn {
      width: 100%;
      height: 38px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      font-size: 16px;
      cursor: pointer;
      background: #4cb4e9;
      border: none;
      color: white;
    }
    .cart-add-btn { background: #4cb4e9; color: white; }
    .counter-btn {
      background: #202B32;
      justify-content: space-between;
      padding: 0 12px;
    }
    .counter-minus, .counter-plus {
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
    }
    .counter-value { font-size: 16px; font-weight: 500; color: white; }
    .empty-state { text-align: center; margin-top: 50px; color: #a1a1aa; font-size: 18px; }

    /* КОРЗИНА — увеличенная карточка + изображение 100% высоты/ширины */
    .cart-item {
      background: #202022;
      border: 1px solid #2B2B2D;
      border-radius: 32px;
      padding: 12px;
      margin-bottom: 16px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .cart-img {
      width: 90px;          /* +20px относительно 70px */
      height: 90px;
      border-radius: 24px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .cart-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cart-product-name {
      font-size: 18px;      /* Увеличен */
      font-weight: 600;
      color: white;
    }
    .cart-product-price {
      font-size: 17px;
      font-weight: 600;
      color: white;
    }
    .cart-old-price-discount {
      font-size: 14px;
      color: #9ca3af;
      text-decoration: line-through;
      margin-left: 8px;
      font-weight: normal;
    }
    .cart-product-category {
      font-size: 14px;
      color: #9e9e9e;
    }
    .cart-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
    }
    .cart-remove-btn {
      background: rgba(239, 68, 68, 0.12);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .cart-remove-btn img { width: 22px; height: 22px; }
    /* Кнопки количества в корзине — выше по высоте */
    .cart-quantity {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #202B32;
      border-radius: 50px;
      padding: 6px 12px;
    }
    .cart-qty-btn {
      background: none;
      border: none;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 30px;
    }
    .cart-qty-btn img { width: 18px; height: 18px; }
    .cart-qty-value {
      font-size: 18px;
      font-weight: 600;
      color: white;
      min-width: 28px;
      text-align: center;
    }

    /* ЗАКРЕПЛЁННЫЙ БЛОК ОФОРМЛЕНИЯ (только на странице корзины) */
    .cart-checkout-fixed {
      position: fixed;
      bottom: 18px;
      left: 18px;
      right: 18px;
      z-index: 1000;
      max-width: 600px;
      margin: 0 auto;
      width: calc(100% - 36px);
    }
    .checkout-card {
      background: #202022f9;
      backdrop-filter: blur(12px);
      border-radius: 34px;
      padding: 18px 18px 22px 18px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      gap: 14px;  /* отступ уменьшен на 2px (было 16 -> 14) */
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: 500;
    }
    .total-label { color: #cbd5e1; }
    .total-price { color: white; font-weight: 550; font-size: 18px; }
    .checkout-button {
      width: 100%;
      background: #4cb4e9;
      border: none;
      border-radius: 50px;
      padding: 12px;
      color: white;
      font-weight: 600;
      font-size: 18px;
      cursor: pointer;
      text-align: center;
    }
    .promo-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .promo-input {
      flex: 1;
      background: #303032;
      border: 1px solid #3a3a3e;
      border-radius: 50px;
      padding: 12px 16px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    .promo-actions {
      display: flex;
      gap: 10px;
    }
    .round-icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      background: #202B32;
    }
    .round-icon-btn.red-bg { background: rgba(239, 68, 68, 0.85); }
    .round-icon-btn.blue-bg { background: #4cb4e9; }
    .round-icon-btn img { width: 24px; height: 24px; }
    .promo-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 4px;
      padding-left: 12px;
    }
    .price-breakdown {
      display: flex;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .final-price { font-weight: 700; color: white; font-size: 18px; }
    .original-price-cross { font-size: 15px; color: #9ca3af; text-decoration: line-through; }

    .cart-content-padding { padding-bottom: 110px; }
    .order-item {
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .order-id { font-weight: 600; color: #4cb4e9; }
    .order-status { color: #4cb4e9; }
    .order-products { font-size: 14px; color: #a1a1aa; margin-bottom: 8px; }
    .order-total { font-weight: 600; color: white; }
    .filter-options {
      margin-top: 20px;
      background: rgba(75,183,239,0.08);
      border-radius: 24px;
      padding: 4px 0;
    }
    .filter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }
    .filter-row:last-child { border-bottom: none; }
    .filter-text { font-size: 16px; font-weight: 500; }
    .check-mark { font-size: 18px; color: #4cb4e9; font-weight: 600; }
  </style>
</head>
<body>
  <div id="catalog-page" class="page active-page">
    <div class="header-row"><img class="header-icon-img" src="https://storage.botpapa.me/files/fd86aa00-4a0c-11f1-bef9-f1ec7a2c6e45.png"><div class="page-title">Каталог</div></div>
    <div class="search-section"><div class="search-bar"><img class="search-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%239ca3af'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z'%3E%3C/path%3E%3C/svg%3E"><input type="text" class="search-input" id="searchInput" placeholder="Найти товар по названию"></div><div class="filter-btn" id="openFilterBtn"><img class="filter-icon" src="https://storage.botpapa.me/files/bc7cbf30-49e0-11f1-bef9-f1ec7a2c6e45.png"></div></div>
    <div id="catalogGrid" class="products-grid"></div>
  </div>
  <div id="cart-page" class="page"><div class="header-row"><img class="header-icon-img" src="https://storage.botpapa.me/files/0d3678e0-4a0d-11f1-bef9-f1ec7a2c6e45.png"><div class="page-title">Корзина</div></div><div id="cartItemsList" class="cart-content-padding"></div></div>
  <div id="orders-page" class="page"><div class="header-row"><img class="header-icon-img" src="https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png"><div class="page-title">Заказы</div></div><div id="ordersList"></div></div>
  <div id="profile-page" class="page"><div class="header-row"><img class="header-icon-img" src="https://storage.botpapa.me/files/12337af0-4a0d-11f1-bef9-f1ec7a2c6e45.png"><div class="page-title">Профиль</div></div><div class="empty-state">Ваш профиль: вход по аккаунту Telegram</div></div>
  <div id="filter-page" class="page"><div class="header-row"><img class="header-icon-img" src="https://storage.botpapa.me/files/9478fb40-49de-11f1-bef9-f1ec7a2c6e45.png"><div class="page-title">Фильтры</div></div><div id="filterOptionsContainer" class="filter-options"></div></div>

  <div id="cartCheckoutFixed" class="cart-checkout-fixed" style="display: none;"></div>
  <div class="bottom-menu">
    <button class="menu-item" data-page="catalog"><img class="menu-icon menu-icon-inactive" src="https://storage.botpapa.me/files/fa0bb410-4a0c-11f1-bef9-f1ec7a2c6e45.png"><img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/fd86aa00-4a0c-11f1-bef9-f1ec7a2c6e45.png"><span class="menu-label">Каталог</span></button>
    <button class="menu-item" data-page="cart"><img class="menu-icon menu-icon-inactive" src="https://storage.botpapa.me/files/00feb9c0-4a0d-11f1-bef9-f1ec7a2c6e45.png"><img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/0d3678e0-4a0d-11f1-bef9-f1ec7a2c6e45.png"><span class="menu-label">Корзина</span></button>
    <button class="menu-item" data-page="orders"><img class="menu-icon menu-icon-inactive" src="https://storage.botpapa.me/files/8a684130-49e6-11f1-bef9-f1ec7a2c6e45.png"><img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png"><span class="menu-label">Заказы</span></button>
    <button class="menu-item" data-page="profile"><img class="menu-icon menu-icon-inactive" src="https://storage.botpapa.me/files/1656bed0-4a0d-11f1-bef9-f1ec7a2c6e45.png"><img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/12337af0-4a0d-11f1-bef9-f1ec7a2c6e45.png"><span class="menu-label">Профиль</span></button>
  </div>

  <script>
    (function() {
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
        try { tg.setHeaderColor('#171719'); tg.setBackgroundColor('#171719'); } catch(e) {}
        document.body.style.backgroundColor = '#171719';
      }
      // предзагрузка иконок меню (ускоряем отображение)
      const preloadIcons = [
        "https://storage.botpapa.me/files/fa0bb410-4a0c-11f1-bef9-f1ec7a2c6e45.png",
        "https://storage.botpapa.me/files/fd86aa00-4a0c-11f1-bef9-f1ec7a2c6e45.png",
        "https://storage.botpapa.me/files/00feb9c0-4a0d-11f1-bef9-f1ec7a2c6e45.png",
        "https://storage.botpapa.me/files/0d3678e0-4a0d-11f1-bef9-f1ec7a2c6e45.png"
      ];
      preloadIcons.forEach(src => { const img = new Image(); img.src = src; });
    })();

    const products = [
      { id: 1, name: "Brawl Pass", price: 769, oldPrice: 799, image: "https://storage.botpapa.me/files/6b57bf60-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 2, name: "Brawl Pass Plus", price: 1099, oldPrice: 1169, image: "https://storage.botpapa.me/files/6f97da10-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 3, name: "Pro Pass", price: 2129, oldPrice: 2249, image: "https://storage.botpapa.me/files/72f535e0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" },
      { id: 4, name: "2000 Gems", price: 4249, oldPrice: 4449, image: "https://storage.botpapa.me/files/767ed1d0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" }
    ];
    
    let cart = {};        // { id: quantity }
    let orders = [];
    let currentFilter = "Все категории";
    let searchQuery = "";
    let activePromo = null; // { code, percent, finalTotal, originalTotal }
    let promoMode = false;   // режим ввода промокода

    // бонус: валидные промокоды (скидка в %)
    const validPromoCodes = { "GELTAN10": 10, "GELTAN20": 20, "SUMMER15": 15 };

    function formatPrice(p) { return Math.round(p).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + "₽"; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    // получить общую сумму без скидки
    function getCartOriginalTotal() {
      return Object.entries(cart).reduce((sum, [id, qty]) => sum + (products.find(p => p.id == id).price * qty), 0);
    }

    // получить итоговую сумму с учётом активного промокода
    function getCartFinalTotal() {
      const orig = getCartOriginalTotal();
      if (activePromo) return Math.floor(orig * (100 - activePromo.percent) / 100);
      return orig;
    }

    // применить промокод
    function applyPromoCode(code) {
      const upperCode = code.trim().toUpperCase();
      if (validPromoCodes[upperCode]) {
        const percent = validPromoCodes[upperCode];
        const originalTotal = getCartOriginalTotal();
        const finalTotal = Math.floor(originalTotal * (100 - percent) / 100);
        activePromo = { code: upperCode, percent, finalTotal, originalTotal };
        return true;
      }
      return false;
    }

    function resetPromo() { activePromo = null; promoMode = false; }

    // отрисовка блока оформления (с промо-режимом или обычным)
    function renderCheckoutBlock() {
      const fixedDiv = document.getElementById("cartCheckoutFixed");
      const hasItems = Object.keys(cart).length > 0;
      if (!hasItems) { fixedDiv.style.display = "none"; return; }
      fixedDiv.style.display = "block";
      const originalTotal = getCartOriginalTotal();
      const finalTotal = getCartFinalTotal();
      const discountApplied = activePromo !== null;

      if (promoMode) {
        // Режим ввода промокода: поле + две круглые кнопки
        fixedDiv.innerHTML = `
          <div class="checkout-card">
            <div class="total-row"><span class="total-label">Введите промокод на скидку</span></div>
            <div class="promo-row">
              <input type="text" id="promoInputField" class="promo-input" placeholder="Промокод" autocomplete="off">
              <div class="promo-actions">
                <button class="round-icon-btn red-bg" id="promoCancelBtn"><img src="https://storage.botpapa.me/files/af0747c0-4a13-11f1-bef9-f1ec7a2c6e45.png" alt="back"></button>
                <button class="round-icon-btn blue-bg" id="promoApplyBtn"><img src="https://storage.botpapa.me/files/b254ec20-4a13-11f1-bef9-f1ec7a2c6e45.png" alt="apply"></button>
              </div>
            </div>
            <div id="promoErrorMessage" class="promo-error" style="display:none;">Промокод не найден</div>
          </div>
        `;
        const input = document.getElementById("promoInputField");
        const applyBtn = document.getElementById("promoApplyBtn");
        const cancelBtn = document.getElementById("promoCancelBtn");
        const errorDiv = document.getElementById("promoErrorMessage");
        if (applyBtn) applyBtn.onclick = () => {
          const code = input.value;
          if (applyPromoCode(code)) {
            promoMode = false;
            renderCheckoutBlock();
            renderCartPage();  // обновить цены в карточках товара (показывать старую/новую)
          } else {
            if (errorDiv) { errorDiv.style.display = "block"; errorDiv.innerText = "Промокод не найден"; }
          }
        };
        if (cancelBtn) cancelBtn.onclick = () => { promoMode = false; renderCheckoutBlock(); };
        return;
      }

      // Обычный режим: тотал + кнопка оформить + круглая кнопка промокода справа
      const discountHtml = discountApplied ? `<div class="price-breakdown"><span class="original-price-cross">${formatPrice(originalTotal)}</span><span class="final-price">${formatPrice(finalTotal)}</span></div>` : `<span class="total-price">${formatPrice(finalTotal)}</span>`;
      fixedDiv.innerHTML = `
        <div class="checkout-card">
          <div class="total-row"><span class="total-label">Общая стоимость:</span>${discountHtml}</div>
          <div style="display:flex; gap:12px; align-items:center;">
            <button class="checkout-button" id="checkoutMainBtn" style="flex:1;">Оформить заказ</button>
            <button class="round-icon-btn" id="openPromoBtn" style="background:#202B32;"><img src="https://storage.botpapa.me/files/a488c6d0-4a12-11f1-bef9-f1ec7a2c6e45.png" alt="promo"></button>
          </div>
        </div>
      `;
      document.getElementById("checkoutMainBtn")?.addEventListener("click", createOrder);
      document.getElementById("openPromoBtn")?.addEventListener("click", () => { promoMode = true; renderCheckoutBlock(); });
    }

    function createOrder() {
      const itemsArr = Object.entries(cart);
      if (!itemsArr.length) { alert("Корзина пуста"); return; }
      const finalTotal = getCartFinalTotal();
      const order = {
        id: orders.length + 1,
        date: new Date().toLocaleDateString('ru-RU'),
        items: itemsArr.map(([id, qty]) => ({ name: products.find(p => p.id == id).name, qty, price: products.find(p => p.id == id).price })),
        total: finalTotal,
        originalTotal: getCartOriginalTotal(),
        promoApplied: activePromo ? activePromo.code : null,
        status: "Оплачен"
      };
      orders.unshift(order);
      cart = {};
      activePromo = null;
      promoMode = false;
      renderCartPage();
      renderOrdersPage();
      alert(`Заказ #${order.id} создан! Сумма: ${formatPrice(finalTotal)}`);
    }

    // отрисовка списка товаров корзины с поддержкой показа старой/новой цены (если промокод)
    function renderCartPage() {
      const container = document.getElementById("cartItemsList");
      const items = Object.entries(cart);
      if (!items.length) { 
        container.innerHTML = '<div class="empty-state">Корзина пуста 🛒</div>'; 
        document.getElementById("cartCheckoutFixed").style.display = "none";
        return; 
      }
      let html = '';
      const hasDiscount = activePromo !== null;
      for (let [id, qty] of items) {
        const prod = products.find(p => p.id == id);
        if (!prod) continue;
        const itemOriginalPrice = prod.price;
        let displayPrice = itemOriginalPrice;
        let displayOldPrice = null;
        if (hasDiscount) {
          const discounted = Math.floor(itemOriginalPrice * (100 - activePromo.percent) / 100);
          displayPrice = discounted;
          displayOldPrice = itemOriginalPrice;
        }
        html += `
          <div class="cart-item">
            <img class="cart-img" src="${prod.image}" alt="${escapeHtml(prod.name)}">
            <div class="cart-info">
              <div class="cart-product-name">${escapeHtml(prod.name)}</div>
              <div class="cart-product-price">${formatPrice(displayPrice)}${displayOldPrice ? `<span class="cart-old-price-discount">${formatPrice(displayOldPrice)}</span>` : ''}</div>
              <div class="cart-product-category">${escapeHtml(prod.category)}</div>
            </div>
            <div class="cart-actions">
              <button class="cart-remove-btn" data-rm="${id}"><img src="https://storage.botpapa.me/files/19b700d0-4a0d-11f1-bef9-f1ec7a2c6e45.png"></button>
              <div class="cart-quantity">
                <button class="cart-qty-btn" data-dec="${id}"><img src="https://storage.botpapa.me/files/975c4510-49de-11f1-bef9-f1ec7a2c6e45.png"></button>
                <span class="cart-qty-value">${qty}</span>
                <button class="cart-qty-btn" data-inc="${id}"><img src="https://storage.botpapa.me/files/9a5d01f0-49de-11f1-bef9-f1ec7a2c6e45.png"></button>
              </div>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
      document.querySelectorAll(".cart-remove-btn").forEach(btn => btn.addEventListener("click", () => removeCartItem(parseInt(btn.dataset.rm))));
      document.querySelectorAll("[data-dec]").forEach(btn => btn.addEventListener("click", () => changeQty(parseInt(btn.dataset.dec), -1)));
      document.querySelectorAll("[data-inc]").forEach(btn => btn.addEventListener("click", () => changeQty(parseInt(btn.dataset.inc), 1)));
      renderCheckoutBlock();
    }

    function removeCartItem(pid) { delete cart[pid]; if (Object.keys(cart).length === 0) activePromo = null; updateSingleCard(pid); renderCartPage(); }
    function changeQty(pid, delta) {
      const cur = cart[pid] || 0;
      if (delta === -1 && cur === 1) delete cart[pid];
      else if (delta === -1 && cur > 1) cart[pid] = cur - 1;
      else if (delta === 1) { if (cur >= 1) { alert("Максимум 1 шт."); return; } cart[pid] = cur + 1; }
      if (Object.keys(cart).length === 0) activePromo = null;
      updateSingleCard(pid);
      renderCartPage();
    }

    function updateSingleCard(productId) {
      const card = document.querySelector(`.product-card[data-id="${productId}"]`);
      if (!card) return;
      const btnContainer = card.querySelector('.card-info > div:last-child');
      if (btnContainer) {
        btnContainer.outerHTML = renderCartButtonHtml(productId);
        attachCardEvents();
      }
    }
    function renderCartButtonHtml(productId) {
      const qty = cart[productId] || 0;
      if (qty > 0) {
        return `<div class="card-action-btn counter-btn"><span class="counter-minus" data-id="${productId}"><img src="https://storage.botpapa.me/files/975c4510-49de-11f1-bef9-f1ec7a2c6e45.png"></span><span class="counter-value">${qty}</span><span class="counter-plus" data-id="${productId}"><img src="https://storage.botpapa.me/files/9a5d01f0-49de-11f1-bef9-f1ec7a2c6e45.png"></span></div>`;
      }
      return `<div class="card-action-btn cart-add-btn" data-add="${productId}">В корзину</div>`;
    }
    function attachCardEvents() {
      document.querySelectorAll('.product-card').forEach(card => {
        const cardId = parseInt(card.dataset.id);
        const actionBtn = card.querySelector('.card-action-btn');
        if (!actionBtn) return;
        if (actionBtn.classList.contains('cart-add-btn')) {
          actionBtn.replaceWith(actionBtn.cloneNode(true));
          const newBtn = card.querySelector('.cart-add-btn');
          newBtn?.addEventListener('click', (e) => { e.stopPropagation(); handleCartAction(cardId, true); });
        } else if (actionBtn.classList.contains('counter-btn')) {
          const minus = actionBtn.querySelector('.counter-minus');
          const plus = actionBtn.querySelector('.counter-plus');
          minus?.replaceWith(minus.cloneNode(true));
          plus?.replaceWith(plus.cloneNode(true));
          const newMinus = actionBtn.querySelector('.counter-minus');
          const newPlus = actionBtn.querySelector('.counter-plus');
          newMinus?.addEventListener('click', (e) => { e.stopPropagation(); handleCartAction(cardId, false); });
          newPlus?.addEventListener('click', (e) => { e.stopPropagation(); alert("Максимум 1 шт."); });
        }
      });
    }
    function handleCartAction(pid, isIncrement) {
      if (isIncrement) {
        if (cart[pid] >= 1) { alert("Максимум 1 шт."); return; }
        cart[pid] = (cart[pid] || 0) + 1;
      } else {
        if (cart[pid] === 1) delete cart[pid];
        else if (cart[pid] > 0) cart[pid]--;
      }
      if (Object.keys(cart).length === 0) activePromo = null;
      updateSingleCard(pid);
      renderCartPage();
    }

    function renderOrdersPage() {
      const container = document.getElementById("ordersList");
      if (!orders.length) { container.innerHTML = '<div class="empty-state">У вас пока нет заказов 📦</div>'; return; }
      container.innerHTML = orders.map(o => `<div class="order-item"><div class="order-header"><span class="order-id">Заказ #${o.id}</span><span class="order-status">${o.status}</span></div><div style="color:#a1a1aa;font-size:14px;margin-bottom:8px;">${o.date}</div><div class="order-products">${o.items.map(i => `${i.name} x ${i.qty}`).join(', ')}</div><div class="order-total">${formatPrice(o.total)}</div></div>`).join('');
    }

    function renderCatalog() {
      let filtered = products.filter(p => currentFilter === "Все категории" || p.category === currentFilter);
      if (searchQuery.trim()) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      const grid = document.getElementById("catalogGrid");
      if (!filtered.length) { grid.innerHTML = '<div style="text-align:center;padding:40px;color:#a1a1aa">Товары не найдены</div>'; return; }
      grid.innerHTML = filtered.map(p => `<div class="product-card" data-id="${p.id}"><img class="card-img" src="${p.image}" loading="lazy"><div class="card-info"><div class="product-title">${escapeHtml(p.name)}</div><div class="price-row"><span class="current-price">${formatPrice(p.price)}</span><span class="old-price">${formatPrice(p.oldPrice)}</span></div>${renderCartButtonHtml(p.id)}</div></div>`).join("");
      attachCardEvents();
    }

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
      document.getElementById(pageId + "-page")?.classList.add("active-page");
      if (pageId === "catalog") renderCatalog();
      if (pageId === "cart") { if (Object.keys(cart).length === 0) activePromo = null; renderCartPage(); }
      if (pageId === "orders") renderOrdersPage();
      document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
      document.querySelector(`.menu-item[data-page="${pageId}"]`)?.classList.add("active");
      window.scrollTo({ top: 0 });
    }

    function renderFilterModal() {
      const cats = ["Все категории", "Brawl Stars", "Clash Royale"];
      const container = document.getElementById("filterOptionsContainer");
      container.innerHTML = cats.map(cat => `<div class="filter-row" data-filter="${cat}"><span class="filter-text">${cat}</span><span class="check-mark">${currentFilter === cat ? '✓' : ''}</span></div>`).join("");
      document.querySelectorAll(".filter-row").forEach(row => row.addEventListener("click", () => { currentFilter = row.dataset.filter; renderFilterModal(); renderCatalog(); showPage("catalog"); }));
    }

    document.getElementById("openFilterBtn")?.addEventListener("click", () => { renderFilterModal(); showPage("filter"); });
    document.getElementById("searchInput")?.addEventListener("input", (e) => { searchQuery = e.target.value; renderCatalog(); });
    document.querySelectorAll(".menu-item").forEach(btn => btn.addEventListener("click", () => showPage(btn.dataset.page)));
    document.querySelector('.menu-item[data-page="catalog"]').classList.add("active");
    renderCatalog(); renderCartPage(); renderOrdersPage(); renderFilterModal();
  </script>
</body>
</html>

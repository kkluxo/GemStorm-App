<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <meta name="theme-color" content="#171719">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <title>Geltan Store — Каталог</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tg-theme-bg-color: #171719 !important;
      --tg-theme-secondary-bg-color: #171719 !important;
      --tg-theme-header-bg-color: #171719 !important;
      --brand-blue: #4cb4e9;
      --search-bg: #303032;
      --card-border: #2B2B2D;
      --card-bg: #19191b;
      --counter-bg: #202B32;
      --icon-gray: #9e9e9e;
      --icon-active: #4cb4e9;
    }

    body {
      background-color: #171719;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding-bottom: 90px;  /* Увеличиваем, чтобы контент не наезжал на меню */
    }

    .page {
      display: none;
      padding: 16px 14px 0 14px;
      max-width: 600px;
      margin: 0 auto;
    }

    .page.active-page {
      display: block;
    }

    .bottom-menu {
      position: fixed;
      bottom: 18px;           /* Отступ снизу 18px */
      left: 18px;             /* Отступ слева 18px */
      right: 18px;            /* Отступ справа 18px */
      background: #202022f9;
      border: 1px solid rgba(255, 255, 255, 0.15);  /* Обводка */
      border-radius: 60px;    /* Большое закругление (овал) */
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 5px 12px 8px 12px;
      z-index: 1000;
      max-width: 600px;
      margin: 0 auto;
      width: calc(100% - 36px);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.1s;
      flex: 1;
      padding: 5px 0 2px 0;
    }

    .menu-icon {
      width: 28px;
      height: 28px;
      transition: all 0.1s;
    }

    .menu-icon-inactive {
      display: block;
    }

    .menu-icon-active {
      display: none;
    }

    .menu-item.active .menu-icon-inactive {
      display: none;
    }

    .menu-item.active .menu-icon-active {
      display: block;
    }

    .menu-label {
      font-size: 11px;
      font-weight: 500;
      color: #9e9e9e;
    }

    .menu-item.active .menu-label {
      color: #4cb4e9;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 26px;
      height: 26px;
      color: #4cb4e9;
    }

    .page-title {
      font-size: 25px;
      font-weight: 500;
    }

    .search-section {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search-bar {
      flex: 1;
      background: #303032;
      height: 46px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      cursor: text;
    }

    .search-icon {
      width: 20px;
      height: 20px;
      filter: brightness(0) saturate(100%) invert(70%);
    }

    .search-input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 18px;
      font-weight: 500;
      width: 100%;
    }

    .search-input::placeholder {
      color: #a1a1aa;
      font-weight: 500;
      font-size: 16px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid #323234;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .filter-icon {
      width: 24px;
      height: 24px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      margin-bottom: 20px;
    }

    .product-card {
      background: #202022;
      border: 1px solid #2B2B2D;
      border-radius: 42px 42px 28px 28px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: 0.1s linear;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      padding: 7px;
      border-radius: 43px;
    }

    .card-info {
      padding: 0 8px 8px 8px;
    }

    .product-title {
      font-size: 18px;
      font-weight: 500;
      color: white;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      margin: 6px 0 10px 0;
    }

    .current-price {
      font-size: 19px;
      font-weight: 500;
      color: white;
    }

    .old-price {
      font-size: 16px;
      color: #9ca3af;
      text-decoration: line-through;
    }

    .card-action-btn {
      width: 100%;
      height: 38px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 500;
      font-size: 16px;
      transition: 0.1s;
      background: #4cb4e9;
      border: none;
      color: white;
    }

    .cart-add-btn {
      background: #4cb4e9;
      border: none;
      color: white;
    }

    .counter-btn {
      background: #202B32;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
      color: #4cb4e9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
    }

    .counter-minus, .counter-plus {
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .counter-minus img, .counter-plus img {
      width: 14px;
      height: 14px;
    }

    .counter-value {
      font-size: 16px;
      font-weight: 500;
      color: white;
    }

    .empty-state {
      text-align: center;
      margin-top: 50px;
      color: #a1a1aa;
      font-size: 18px;
    }

    /* НОВЫЙ СТИЛЬ КАРТОЧКИ КОРЗИНЫ */
    .cart-item {
      background: #202022;
      border: 1px solid #2B2B2D;
      border-radius: 24px;
      padding: 8px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .cart-img {
      width: 75px;
      height: 75px;
      border-radius: 18px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .cart-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cart-product-name {
      font-size: 17px;
      font-weight: 500;
      color: white;
    }

    .cart-product-price {
      font-size: 16px;
      font-weight: 500;
      color: white;
    }

    .cart-product-category {
      font-size: 13px;
      color: #9e9e9e;
    }

    .cart-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    .cart-remove-btn {
      background: rgba(239, 68, 68, 0.12);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s;
    }

    .cart-remove-btn svg {
      width: 20px;
      height: 20px;
      stroke: #ef4444;
      stroke-width: 1.8;
      fill: none;
    }

    .cart-quantity {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #2c2c2e;
      border-radius: 40px;
      padding: 5px 8px;
    }

    .cart-qty-btn {
      background: none;
      border: none;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 30px;
      font-size: 20px;
      font-weight: 600;
      color: #4cb4e9;
    }

    .cart-qty-value {
      font-size: 16px;
      font-weight: 600;
      color: white;
      min-width: 28px;
      text-align: center;
    }

    /* Стили для блока оформления заказа в корзине — полностью обновлены */
    .cart-bottom-checkout {
      margin: 16px -14px 0 -14px;
      padding: 0 14px 20px 14px;
      position: relative;
      z-index: 10;
    }

    .checkout-card {
      background: #202022f9;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 16px 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 0;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 17px;
      font-weight: 500;
    }

    .total-label {
      color: #cbd5e1;
    }

    .total-price {
      color: white;
      font-weight: 600;
      font-size: 20px;
    }

    .checkout-button {
      width: 100%;
      background: #4cb4e9;
      border: none;
      border-radius: 44px;
      height: 52px;
      color: white;
      font-weight: 600;
      font-size: 17px;
      cursor: pointer;
      transition: 0.1s;
    }

    .checkout-button:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .order-item {
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .order-id {
      font-weight: 600;
      color: #4cb4e9;
    }

    .order-status {
      color: #4cb4e9;
    }

    .order-products {
      font-size: 14px;
      color: #a1a1aa;
      margin-bottom: 8px;
    }

    .order-total {
      font-weight: 600;
      color: white;
    }

    .filter-options {
      margin-top: 20px;
      background: rgba(75,183,239,0.08);
      border-radius: 24px;
      padding: 4px 0;
    }

    .filter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }

    .filter-row:last-child {
      border-bottom: none;
    }

    .filter-text {
      font-size: 16px;
      font-weight: 500;
    }

    .check-mark {
      font-size: 18px;
      color: #4cb4e9;
      font-weight: 600;
    }

    .cart-items-wrapper {
      margin-bottom: 4px;
    }
  </style>
</head>

    <div id="catalogGrid" class="products-grid"></div>

  <div id="cart-page" class="page">
    <div class="header-row">

  <div id="orders-page" class="page">
    <div class="header-row">
      <img class="header-icon" src="https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png" alt="orders" style="width: 26px; height: 26px;">
      <div class="page-title">Заказы</div>
    </div>
    <div id="ordersList"></div>
  </div>

  <div id="profile-page" class="page">
    <div class="header-row">
      <svg class="header-icon" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">

  </div>

  <div id="filter-page" class="page">
    <div class="header-row">
      <img class="header-icon" src="https://storage.botpapa.me/files/9478fb40-49de-11f1-bef9-f1ec7a2c6e45.png" alt="filter" style="width: 26px; height: 26px;">
      <div class="page-title">Фильтры</div>
    </div>
    <div class="filter-options" id="filterOptionsContainer"></div>

  <script>
    (function() {
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (typeof tg.disableVerticalSwipes === 'function') {
          tg.disableVerticalSwipes();
        } else if (tg.isVersionAtLeast && tg.isVersionAtLeast('7.7')) {
          tg.disableVerticalSwipes();
        }
        try {
          tg.setHeaderColor('#171719');
          tg.setBackgroundColor('#171719');
        } catch(e) {
          tg.setHeaderColor('bg_color');
        }
        document.body.style.backgroundColor = '#171719';
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', '#171719');
      } else {
        document.body.style.backgroundColor = '#171719';
      }
    })();

    const products = [
      { id: 1, name: "Brawl Pass", price: 769, oldPrice: 799, image: "https://storage.botpapa.me/files/6b57bf60-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 2, name: "Brawl Pass Plus", price: 1099, oldPrice: 1169, image: "https://storage.botpapa.me/files/6f97da10-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 3, name: "Pro Pass", price: 2129, oldPrice: 2249, image: "https://storage.botpapa.me/files/72f535e0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" },
      { id: 4, name: "2000 Gems", price: 4249, oldPrice: 4449, image: "https://storage.botpapa.me/files/767ed1d0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" }
    ];
    
    let cart = {};
    let orders = [];
    let currentFilter = "Все категории";
    let searchQuery = "";

    function formatPrice(p) { 
      return p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + "₽"; 
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function renderCartButtonHtml(productId) {
      const qty = cart[productId] || 0;
      if (qty > 0) {
        return `<div class="card-action-btn counter-btn" data-counter="${productId}"><span class="counter-minus" data-id="${productId}"><img src="https://storage.botpapa.me/files/975c4510-49de-11f1-bef9-f1ec7a2c6e45.png" alt="-" style="width: 14px; height: 14px;"></span><span class="counter-value">${qty}</span><span class="counter-plus" data-id="${productId}"><img src="https://storage.botpapa.me/files/9a5d01f0-49de-11f1-bef9-f1ec7a2c6e45.png" alt="+" style="width: 14px; height: 14px;"></span></div>`;
      } else {
        return `<div class="card-action-btn cart-add-btn" data-add="${productId}">В корзину</div>`;
      }
    }

    function updateSingleCard(productId) {
      const card = document.querySelector(`.product-card[data-id="${productId}"]`);
      if (!card) return;
      const product = products.find(p => p.id === productId);
      if (!product) return;
      
      const btnContainer = card.querySelector('.card-info > div:last-child');
      if (btnContainer) {
        btnContainer.outerHTML = renderCartButtonHtml(productId);
        const newBtn = card.querySelector('.card-action-btn');
        if (newBtn) {
          if (newBtn.classList.contains('cart-add-btn')) {
            newBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              handleCartAction(productId, true);
            });
          } else if (newBtn.classList.contains('counter-btn')) {
            const minus = newBtn.querySelector('.counter-minus');
            const plus = newBtn.querySelector('.counter-plus');
            if (minus) minus.addEventListener('click', (e) => { e.stopPropagation(); handleCartAction(productId, false); });
            if (plus) plus.addEventListener('click', (e) => { e.stopPropagation(); alert("Данный товар недоступен к покупке в количестве более 1"); });
          }
        }
      }
    }

    function renderCatalog() {
      let filtered = products.filter(p => currentFilter === "Все категории" || p.category === currentFilter);
      if (searchQuery.trim() !== "") {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      }
      const grid = document.getElementById("catalogGrid");
      if (!grid) return;
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #a1a1aa;">Товары не найдены</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(p => `
        <div class="product-card" data-id="${p.id}">
          <img class="card-img" src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy">
          <div class="card-info">
            <div class="product-title">${escapeHtml(p.name)}</div>
            <div class="price-row"><span class="current-price">${formatPrice(p.price)}</span><span class="old-price">${formatPrice(p.oldPrice)}</span></div>
            ${renderCartButtonHtml(p.id)}
          </div>
        </div>
      `).join("");
      
      attachCardEvents();
    }
    
    function attachCardEvents() {
      document.querySelectorAll('.product-card').forEach(card => {
        const cardId = parseInt(card.dataset.id);
        const actionBtn = card.querySelector('.card-action-btn');
        if (actionBtn) {
          actionBtn.removeEventListener('click', actionBtn._listener);
          if (actionBtn.classList.contains('cart-add-btn')) {
            actionBtn._listener = (e) => {
              e.stopPropagation();
              handleCartAction(cardId, true);
            };
          } else if (actionBtn.classList.contains('counter-btn')) {
            const minus = actionBtn.querySelector('.counter-minus');
            const plus = actionBtn.querySelector('.counter-plus');
            if (minus) {
              minus.removeEventListener('click', minus._listener);
              minus._listener = (e) => { e.stopPropagation(); handleCartAction(cardId, false); };
              minus.addEventListener('click', minus._listener);
            }
            if (plus) {
              plus.removeEventListener('click', plus._listener);
              plus._listener = (e) => { e.stopPropagation(); alert("Данный товар недоступен к покупке в количестве более 1"); };
              plus.addEventListener('click', plus._listener);
            }
          }
          actionBtn.addEventListener('click', actionBtn._listener);
        }
      });
    }

    function handleCartAction(pid, isIncrement = true) {
      if (isIncrement) {
        if (cart[pid] && cart[pid] >= 1) {
          alert("Данный товар недоступен к покупке в количестве более 1");
          return;
        }
        cart[pid] = (cart[pid] || 0) + 1;
      } else {
        if (cart[pid] === 1) delete cart[pid];
        else if (cart[pid] > 0) cart[pid]--;
      }
      updateSingleCard(pid);
      renderCartPage();
    }

    function handleRemoveItem(pid) {
      delete cart[pid];
      updateSingleCard(pid);
      renderCartPage();
    }

    function handleQtyChangeCart(pid, delta) {
      const current = cart[pid] || 0;
      if (delta === -1 && current === 1) {
        delete cart[pid];
      } else if (delta === -1 && current > 1) {
        cart[pid] = current - 1;
      } else if (delta === 1) {
        if (current >= 1) {
          alert("Данный товар недоступен к покупке в количестве более 1");
          return;
        }
        cart[pid] = current + 1;
      }
      updateSingleCard(pid);
      renderCartPage();
    }

    function createOrder() {
      const items = Object.entries(cart);
      if (items.length === 0) {
        alert("Корзина пуста");
        return;
      }
      
      const orderId = orders.length + 1;
      const total = items.reduce((sum, [id, qty]) => {
        const prod = products.find(p => p.id == id);
        return sum + (prod.price * qty);
      }, 0);
      
      const order = {
        id: orderId,
        date: new Date().toLocaleDateString('ru-RU'),
        items: items.map(([id, qty]) => {
          const prod = products.find(p => p.id == id);
          return { name: prod.name, qty, price: prod.price, category: prod.category };
        }),
        total: total,
        status: "Оплачен"
      };
      
      orders.unshift(order);
      cart = {};
      renderCartPage();
      renderOrdersPage();
      alert(`Заказ #${orderId} успешно создан! Сумма: ${formatPrice(total)}`);
    }

    function renderCartPage() {
      const container = document.getElementById("cartItemsList");
      if (!container) return;
      const items = Object.entries(cart);
      if (items.length === 0) { 
        container.innerHTML = '<div class="empty-state">Корзина пуста 🛒</div>'; 
        document.querySelector('#cart-page .cart-bottom-checkout')?.remove();
        return; 
      }
      
      let html = '';
      for (let [id, quantity] of items) {
        const prod = products.find(p => p.id == id);
        if(!prod) continue;
        html += `
          <div class="cart-item" data-cart-id="${id}">
            <img class="cart-img" src="${prod.image}" alt="${escapeHtml(prod.name)}">
            <div class="cart-info">
              <div class="cart-product-name">${escapeHtml(prod.name)}</div>
              <div class="cart-product-price">${formatPrice(prod.price)}</div>
              <div class="cart-product-category">${escapeHtml(prod.category)}</div>
            </div>
            <div class="cart-actions">
              <button class="cart-remove-btn" data-remove="${id}">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 7H20M18 7L17.2 18.4C17.1 19.3 16.3 20 15.4 20H8.6C7.7 20 6.9 19.3 6.8 18.4L6 7M10 11V16M14 11V16M5 7L6 4.5C6.1 3.6 6.9 3 7.8 3H16.2C17.1 3 17.9 3.6 18 4.5L19 7" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/></svg>
              </button>
              <div class="cart-quantity">
                <button class="cart-qty-btn" data-qty-dec="${id}">−</button>
                <span class="cart-qty-value">${quantity}</span>
                <button class="cart-qty-btn" data-qty-inc="${id}">+</button>
              </div>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
      
      let total = 0;
      for (let [id, quantity] of items) {
        const prod = products.find(p => p.id == id);
        if(prod) total += prod.price * quantity;
      }
      
      let existingBlock = document.querySelector('#cart-page .cart-bottom-checkout');
      if (!existingBlock) {
        const checkoutDiv = document.createElement('div');
        checkoutDiv.className = 'cart-bottom-checkout';
        document.getElementById('cart-page').appendChild(checkoutDiv);
        existingBlock = checkoutDiv;
      }
      
      existingBlock.innerHTML = `
        <div class="checkout-card">
          <div class="total-row">
            <span class="total-label">Общая стоимость:</span>
            <span class="total-price">${formatPrice(total)}</span>
          </div>
          <button class="checkout-button">Оформить заказ</button>
        </div>
      `;
      
      document.querySelectorAll('.cart-remove-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const pid = parseInt(btn.dataset.remove);
          handleRemoveItem(pid);
        });
      });
      document.querySelectorAll('[data-qty-dec]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const pid = parseInt(btn.dataset.qtyDec);
          handleQtyChangeCart(pid, -1);
        });
      });
      document.querySelectorAll('[data-qty-inc]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const pid = parseInt(btn.dataset.qtyInc);
          handleQtyChangeCart(pid, 1);
        });
      });
      const checkoutBtn = document.querySelector('.checkout-button');
      if (checkoutBtn) checkoutBtn.addEventListener('click', createOrder);
    }

    function renderOrdersPage() {
      const container = document.getElementById("ordersList");
      if (!container) return;
      if (orders.length === 0) {
        container.innerHTML = '<div class="empty-state">У вас пока нет заказов 📦</div>';
        return;
      }
      let html = '';
      for (const order of orders) {
        html += `<div class="order-item">
          <div class="order-header">
            <span class="order-id">Заказ #${order.id}</span>
            <span class="order-status">${order.status}</span>
          </div>
          <div class="order-date" style="color: #a1a1aa; font-size: 14px; margin-bottom: 8px;">${order.date}</div>
          <div class="order-products">${order.items.map(item => `${item.name} x ${item.qty}`).join(', ')}</div>
          <div class="order-total">${formatPrice(order.total)}</div>
        </div>`;
      }
      container.innerHTML = html;
    }

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
      const targetPage = document.getElementById(pageId + "-page");
      if (targetPage) targetPage.classList.add("active-page");
      if (pageId === "catalog") renderCatalog();
      if (pageId === "cart") renderCartPage();
      if (pageId === "orders") renderOrdersPage();
      document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
      const activeBtn = document.querySelector(`.menu-item[data-page="${pageId}"]`);
      if (activeBtn) activeBtn.classList.add("active");
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderFilterModal() {
      const cats = ["Все категории", "Brawl Stars", "Clash Royale"];
      const container = document.getElementById("filterOptionsContainer");
      container.innerHTML = cats.map(cat => `<div class="filter-row" data-filter="${cat}"><span class="filter-text">${cat}</span><span class="check-mark">${currentFilter === cat ? '✓' : ''}</span></div>`).join("");
      document.querySelectorAll(".filter-row").forEach(row => {
        row.addEventListener("click", () => {
          currentFilter = row.dataset.filter;
          renderFilterModal();
          renderCatalog();
          showPage("catalog");
        });
      });
    }

    const openFilterBtn = document.getElementById("openFilterBtn");
    if (openFilterBtn) openFilterBtn.addEventListener("click", () => { renderFilterModal(); showPage("filter"); });
    
    const searchInput = document.getElementById("searchInput");
    if (searchInput) searchInput.addEventListener("input", (e) => { searchQuery = e.target.value; renderCatalog(); });

    document.querySelectorAll(".menu-item").forEach(btn => {
      btn.addEventListener("click", () => showPage(btn.dataset.page));
    });

    document.querySelector('.menu-item[data-page="catalog"]').classList.add('active');
    
    renderCatalog();
    renderCartPage();
    renderOrdersPage();
    renderFilterModal();
  </script>
</body>
</html>

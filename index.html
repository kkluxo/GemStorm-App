<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <meta name="theme-color" content="#171719">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <title>Geltan Store — Каталог</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --tg-theme-bg-color: #171719 !important;
      --tg-theme-secondary-bg-color: #171719 !important;
      --tg-theme-header-bg-color: #171719 !important;
      --brand-blue: #4cb4e9;
      --search-bg: #303032;
      --card-border: #2B2B2D;
      --card-bg: #19191b;
      --counter-bg: #202B32;
      --icon-gray: #9e9e9e;
      --icon-active: #4cb4e9;
    }

    body {
      background-color: #171719;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      padding-bottom: 74px;
    }

    .page {
      display: none;
      padding: 16px 14px 0 14px;
      max-width: 600px;
      margin: 0 auto;
    }

    .page.active-page {
      display: block;
    }

    .bottom-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #171719;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 6px 12px 16px 12px;
      z-index: 1000;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.1s;
      flex: 1;
      padding: 5px 0 2px 0;
    }

    .menu-icon {
      width: 28px;
      height: 28px;
      transition: all 0.1s;
    }

    .menu-icon-inactive {
      display: block;
    }

    .menu-icon-active {
      display: none;
    }

    .menu-item.active .menu-icon-inactive {
      display: none;
    }

    .menu-item.active .menu-icon-active {
      display: block;
    }

    .menu-label {
      font-size: 11px;
      font-weight: 500;
      color: #9e9e9e;
    }

    .menu-item.active .menu-label {
      color: #4cb4e9;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 26px;
      height: 26px;
    }

    .page-title {
      font-size: 25px;
      font-weight: 500;
    }

    .search-section {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search-bar {
      flex: 1;
      background: #303032;
      height: 46px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      cursor: text;
    }

    .search-icon {
      width: 20px;
      height: 20px;
      filter: brightness(0) saturate(100%) invert(70%);
    }

    .search-input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 18px;
      font-weight: 500;
      width: 100%;
    }

    .search-input::placeholder {
      color: #a1a1aa;
      font-weight: 500;
      font-size: 16px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid #323234;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .filter-icon {
      width: 24px;
      height: 24px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      margin-bottom: 20px;
    }

    .product-card {
      background: #19191b;
      border: 1px solid #2B2B2D;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: 0.1s linear;
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 28px;
      display: block;
    }

    .card-info {
      padding: 8px;
    }

    .product-title {
      font-size: 18px;
      font-weight: 500;
      color: white;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      margin: 6px 0 10px 0;
    }

    .current-price {
      font-size: 19px;
      font-weight: 500;
      color: white;
    }

    .old-price {
      font-size: 16px;
      color: #9ca3af;
      text-decoration: line-through;
    }

    .card-action-btn {
      width: 100%;
      height: 38px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 500;
      font-size: 16px;
      transition: 0.1s;
      background: #4cb4e9;
      border: none;
      color: white;
    }

    .cart-add-btn {
      background: #4cb4e9;
      border: none;
      color: white;
    }

    .counter-btn {
      background: #202B32;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
      color: #4cb4e9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
    }

    .counter-minus, .counter-plus {
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .counter-minus img, .counter-plus img {
      width: 14px;
      height: 14px;
    }

    .counter-value {
      font-size: 16px;
      font-weight: 500;
      color: white;
    }

    .empty-state {
      text-align: center;
      margin-top: 50px;
      color: #a1a1aa;
      font-size: 18px;
    }

    .cart-item {
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .cart-img {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      object-fit: cover;
    }

    .order-item {
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .order-id {
      font-weight: 600;
      color: #4cb4e9;
    }

    .order-status {
      color: #4cb4e9;
    }

    .order-products {
      font-size: 14px;
      color: #a1a1aa;
      margin-bottom: 8px;
    }

    .order-total {
      font-weight: 600;
      color: white;
    }

    .filter-options {
      margin-top: 20px;
      background: rgba(75,183,239,0.08);
      border-radius: 24px;
      padding: 8px 0;
    }

    .filter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }

    .filter-row:last-child {
      border-bottom: none;
    }

    .filter-text {
      font-size: 18px;
      font-weight: 500;
    }

    .check-mark {
      font-size: 22px;
      color: #4cb4e9;
      font-weight: 600;
    }
  </style>
</head>

      <img class="menu-icon menu-icon-active" src="https://storage.botpapa.me/files/aa66c190-49e7-11f1-bef9-f1ec7a2c6e45.png" alt="orders" style="width: 28px; height: 28px;">

    <button class="menu-item" data-page="profile">
      <svg class="menu-icon menu-icon-inactive" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M8 1.3335C7.16014 1.3335 6.35469 1.66713 5.76082 2.26099C5.16696 2.85486 4.83333 3.66031 4.83333 4.50016C4.83333 5.34001 5.16696 6.14547 5.76082 6.73933C6.35469 7.3332 7.16014 7.66683 8 7.66683C8.83985 7.66683 9.6453 7.3332 10.2392 6.73933C10.833 6.14547 11.1667 5.34001 11.1667 4.50016C11.1667 3.66031 10.833 2.85486 10.2392 2.26099C9.6453 1.66713 8.83985 1.3335 8 1.3335ZM5.83333 4.50016C5.83333 3.92553 6.0616 3.37443 6.46793 2.9681C6.87426 2.56177 7.42536 2.3335 8 2.3335C8.57463 2.3335 9.12573 2.56177 9.53206 2.9681C9.93839 3.37443 10.1667 3.92553 10.1667 4.50016C10.1667 5.0748 9.93839 5.6259 9.53206 6.03223C9.12573 6.43856 8.57463 6.66683 8 6.66683C7.42536 6.66683 6.87426 6.43856 6.46793 6.03223C6.0616 5.6259 5.83333 5.0748 5.83333 4.50016ZM8 8.66683C6.458 8.66683 5.03666 9.0175 3.984 9.6095C2.94666 10.1935 2.16666 11.0775 2.16666 12.1668V12.2348C2.166 13.0095 2.16533 13.9815 3.018 14.6762C3.43733 15.0175 4.02466 15.2608 4.818 15.4208C5.61266 15.5822 6.64933 15.6668 8 15.6668C9.35066 15.6668 10.3867 15.5822 11.1827 15.4208C11.976 15.2608 12.5627 15.0175 12.9827 14.6762C13.8353 13.9815 13.834 13.0095 13.8333 12.2348V12.1668C13.8333 11.0775 13.0533 10.1935 12.0167 9.6095C10.9633 9.0175 9.54266 8.66683 8 8.66683ZM3.16666 12.1668C3.16666 11.5995 3.58133 10.9835 4.474 10.4815C5.35133 9.98816 6.59666 9.66683 8.00066 9.66683C9.40333 9.66683 10.6487 9.98816 11.526 10.4815C12.4193 10.9835 12.8333 11.5995 12.8333 12.1668C12.8333 13.0388 12.8067 13.5295 12.3507 13.9002C12.104 14.1015 11.6907 14.2982 10.984 14.4408C10.2793 14.5835 9.316 14.6668 8 14.6668C6.684 14.6668 5.72 14.5835 5.016 14.4408C4.30933 14.2982 3.896 14.1015 3.64933 13.9008C3.19333 13.5295 3.16666 13.0388 3.16666 12.1668Z" fill="#9e9e9e"/>

  <script>
    (function() {
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (typeof tg.disableVerticalSwipes === 'function') {
          tg.disableVerticalSwipes();
        } else if (tg.isVersionAtLeast && tg.isVersionAtLeast('7.7')) {
          tg.disableVerticalSwipes();
        }
        try {
          tg.setHeaderColor('#171719');
          tg.setBackgroundColor('#171719');
        } catch(e) {
          tg.setHeaderColor('bg_color');
        }
        document.body.style.backgroundColor = '#171719';
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', '#171719');
      } else {
        document.body.style.backgroundColor = '#171719';
      }
    })();

    const products = [
      { id: 1, name: "Brawl Pass", price: 769, oldPrice: 799, image: "https://storage.botpapa.me/files/6b57bf60-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 2, name: "Brawl Pass Plus", price: 1099, oldPrice: 1169, image: "https://storage.botpapa.me/files/6f97da10-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Brawl Stars" },
      { id: 3, name: "Pro Pass", price: 2129, oldPrice: 2249, image: "https://storage.botpapa.me/files/72f535e0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" },
      { id: 4, name: "2000 Gems", price: 4249, oldPrice: 4449, image: "https://storage.botpapa.me/files/767ed1d0-499a-11f1-bef9-f1ec7a2c6e45.jpeg", category: "Clash Royale" }
    ];
    
    let cart = {};
    let orders = [];
    let currentFilter = "Все категории";
    let searchQuery = "";

    function formatPrice(p) { 
      return p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + "₽"; 
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function renderCartButtonHtml(productId) {
      const qty = cart[productId] || 0;
      if (qty > 0) {
        return `<div class="card-action-btn counter-btn" data-counter="${productId}"><span class="counter-minus" data-id="${productId}"><img src="https://storage.botpapa.me/files/975c4510-49de-11f1-bef9-f1ec7a2c6e45.png" alt="-" style="width: 14px; height: 14px;"></span><span class="counter-value">${qty}</span><span class="counter-plus" data-id="${productId}"><img src="https://storage.botpapa.me/files/9a5d01f0-49de-11f1-bef9-f1ec7a2c6e45.png" alt="+" style="width: 14px; height: 14px;"></span></div>`;
      } else {
        return `<div class="card-action-btn cart-add-btn" data-add="${productId}">В корзину</div>`;
      }
    }

    function updateSingleCard(productId) {
      const card = document.querySelector(`.product-card[data-id="${productId}"]`);
      if (!card) return;
      const product = products.find(p => p.id === productId);
      if (!product) return;
      
      const btnContainer = card.querySelector('.card-info > div:last-child');
      if (btnContainer) {
        btnContainer.outerHTML = renderCartButtonHtml(productId);
        const newBtn = card.querySelector('.card-action-btn');
        if (newBtn) {
          if (newBtn.classList.contains('cart-add-btn')) {
            newBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              handleCartAction(productId, true);
            });
          } else if (newBtn.classList.contains('counter-btn')) {
            const minus = newBtn.querySelector('.counter-minus');
            const plus = newBtn.querySelector('.counter-plus');
            if (minus) minus.addEventListener('click', (e) => { e.stopPropagation(); handleCartAction(productId, false); });
            if (plus) plus.addEventListener('click', (e) => { e.stopPropagation(); alert("Данный товар недоступен к покупке в количестве более 1"); });
          }
        }
      }
    }

    function renderCatalog() {
      let filtered = products.filter(p => currentFilter === "Все категории" || p.category === currentFilter);
      if (searchQuery.trim() !== "") {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      }
      const grid = document.getElementById("catalogGrid");
      if (!grid) return;
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #a1a1aa;">Товары не найдены</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(p => `
        <div class="product-card" data-id="${p.id}">
          <img class="card-img" src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy">
          <div class="card-info">
            <div class="product-title">${escapeHtml(p.name)}</div>
            <div class="price-row"><span class="current-price">${formatPrice(p.price)}</span><span class="old-price">${formatPrice(p.oldPrice)}</span></div>
            ${renderCartButtonHtml(p.id)}
          </div>
        </div>
      `).join("");
      
      attachCardEvents();
    }
    
    function attachCardEvents() {
      document.querySelectorAll('.product-card').forEach(card => {
        const cardId = parseInt(card.dataset.id);
        
        const actionBtn = card.querySelector('.card-action-btn');
        if (actionBtn) {
          actionBtn.removeEventListener('click', actionBtn._listener);
          if (actionBtn.classList.contains('cart-add-btn')) {
            actionBtn._listener = (e) => {
              e.stopPropagation();
              handleCartAction(cardId, true);
            };
          } else if (actionBtn.classList.contains('counter-btn')) {
            const minus = actionBtn.querySelector('.counter-minus');
            const plus = actionBtn.querySelector('.counter-plus');
            if (minus) {
              minus.removeEventListener('click', minus._listener);
              minus._listener = (e) => { e.stopPropagation(); handleCartAction(cardId, false); };
              minus.addEventListener('click', minus._listener);
            }
            if (plus) {
              plus.removeEventListener('click', plus._listener);
              plus._listener = (e) => { e.stopPropagation(); alert("Данный товар недоступен к покупке в количестве более 1"); };
              plus.addEventListener('click', plus._listener);
            }
          }
          actionBtn.addEventListener('click', actionBtn._listener);
        }
      });
    }

    function handleCartAction(pid, isIncrement = true) {
      if (isIncrement) {
        if (cart[pid] && cart[pid] >= 1) {
          alert("Данный товар недоступен к покупке в количестве более 1");
          return;
        }
        cart[pid] = (cart[pid] || 0) + 1;
      } else {
        if (cart[pid] === 1) delete cart[pid];
        else if (cart[pid] > 0) cart[pid]--;
      }
      updateSingleCard(pid);
      renderCartPage();
    }

    function createOrder() {
      const items = Object.entries(cart);
      if (items.length === 0) {
        alert("Корзина пуста");
        return;
      }
      
      const orderId = orders.length + 1;
      const total = items.reduce((sum, [id, qty]) => {
        const prod = products.find(p => p.id == id);
        return sum + (prod.price * qty);
      }, 0);
      
      const order = {
        id: orderId,
        date: new Date().toLocaleDateString('ru-RU'),
        items: items.map(([id, qty]) => {
          const prod = products.find(p => p.id == id);
          return { name: prod.name, qty, price: prod.price };
        }),
        total: total,
        status: "Оплачен"
      };
      
      orders.unshift(order);
      cart = {};
      renderCartPage();
      renderOrdersPage();
      alert(`Заказ #${orderId} успешно создан! Сумма: ${formatPrice(total)}`);
    }

    function renderCartPage() {
      const container = document.getElementById("cartItemsList");
      if (!container) return;
      const items = Object.entries(cart);
      if (items.length === 0) { 
        container.innerHTML = '<div class="empty-state">Корзина пуста 🛒</div>'; 
        return; 
      }
      let html = '';
      let total = 0;
      for (let [id, quantity] of items) {
        const prod = products.find(p => p.id == id);
        if(!prod) continue;
        total += prod.price * quantity;
        html += `<div class="cart-item"><img class="cart-img" src="${prod.image}"><div><div style="font-weight:500">${escapeHtml(prod.name)}</div><div>${formatPrice(prod.price)} x ${quantity}</div></div></div>`;
      }
      html += `<div style="margin-top: 20px; padding: 16px; background: #202B32; border-radius: 24px;"><div style="display: flex; justify-content: space-between; margin-bottom: 16px;"><span>Итого:</span><span style="font-weight: 600;">${formatPrice(total)}</span></div><button id="checkoutBtn" style="width: 100%; background: #4cb4e9; border: none; border-radius: 40px; height: 48px; color: white; font-weight: 600; font-size: 16px; cursor: pointer;">Оформить заказ</button></div>`;
      container.innerHTML = html;
      
      const checkoutBtn = document.getElementById("checkoutBtn");
      if (checkoutBtn) {
        checkoutBtn.addEventListener("click", createOrder);
      }
    }

    function renderOrdersPage() {
      const container = document.getElementById("ordersList");
      if (!container) return;
      if (orders.length === 0) {
        container.innerHTML = '<div class="empty-state">У вас пока нет заказов 📦</div>';
        return;
      }
      let html = '';
      for (const order of orders) {
        html += `<div class="order-item">
          <div class="order-header">
            <span class="order-id">Заказ #${order.id}</span>
            <span class="order-status">${order.status}</span>
          </div>
          <div class="order-date" style="color: #a1a1aa; font-size: 14px; margin-bottom: 8px;">${order.date}</div>
          <div class="order-products">${order.items.map(item => `${item.name} x ${item.qty}`).join(', ')}</div>
          <div class="order-total">${formatPrice(order.total)}</div>
        </div>`;
      }
      container.innerHTML = html;
    }

    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
      const targetPage = document.getElementById(pageId + "-page");
      if (targetPage) targetPage.classList.add("active-page");
      if (pageId === "catalog") renderCatalog();
      if (pageId === "cart") renderCartPage();
      if (pageId === "orders") renderOrdersPage();
      document.querySelectorAll(".menu-item").forEach(btn => btn.classList.remove("active"));
      const activeBtn = document.querySelector(`.menu-item[data-page="${pageId}"]`);
      if (activeBtn) activeBtn.classList.add("active");
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderFilterModal() {
      const cats = ["Все категории", "Brawl Stars", "Clash Royale"];
      const container = document.getElementById("filterOptionsContainer");
      container.innerHTML = cats.map(cat => `<div class="filter-row" data-filter="${cat}"><span class="filter-text">${cat}</span><span class="check-mark">${currentFilter === cat ? '✓' : ''}</span></div>`).join("");
      document.querySelectorAll(".filter-row").forEach(row => {
        row.addEventListener("click", () => {
          currentFilter = row.dataset.filter;
          renderFilterModal();
          renderCatalog();
          showPage("catalog");
        });
      });
    }

    const openFilterBtn = document.getElementById("openFilterBtn");
    if (openFilterBtn) openFilterBtn.addEventListener("click", () => { renderFilterModal(); showPage("filter"); });
    
    const searchInput = document.getElementById("searchInput");
    if (searchInput) searchInput.addEventListener("input", (e) => { searchQuery = e.target.value; renderCatalog(); });

    document.querySelectorAll(".menu-item").forEach(btn => {
      btn.addEventListener("click", () => showPage(btn.dataset.page));
    });

    document.querySelector('.menu-item[data-page="catalog"]').classList.add('active');
    
    renderCatalog();
    renderCartPage();
    renderOrdersPage();
    renderFilterModal();
  </script>
